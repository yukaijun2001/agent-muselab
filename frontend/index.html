            <span class="settings-save-mode live" x-text="t('set.mode.live')"></span>
          </div>
          <div class="settings-row">
            <label x-text="lang==='zh' ? '任务完成时通知我' : 'Notify me when tasks finish'"></label>
            <label class="switch">
              <input type="checkbox" x-model="notifyEnabled"
                     @change="onNotifyToggle($event)" />
              <span class="switch-slider"></span>
            </label>
          </div>
          <div class="settings-hint"
               x-text="lang==='zh'
                 ? '覆盖普通会话回复完成 + 定时任务完成。前台震动 + 后台推送通知；正在使用 muselab 时不打扰。iOS 需把 muselab 添加到主屏（PWA）才能在后台收推送。'
                 : 'Covers chat replies AND scheduled tasks. Foreground vibration + background Web Push; suppressed while you are actively using muselab. iOS requires adding muselab to home screen (PWA) for background push.'"></div>
          <div class="settings-row">
            <label x-text="lang==='zh' ? '推送链路自检' : 'Push self-check'"></label>
            <button class="btn-ghost sm" @click="pushTest()"
                    x-text="lang==='zh' ? '发送测试推送' : 'Send test push'"></button>
          </div>
          <div class="settings-hint"
               x-text="lang==='zh'
                 ? '向所有已订阅设备各发一条测试通知，无视「正在使用时不打扰」。设备没收到说明该设备的订阅已失效——在对应设备上把开关关掉重开即可重新订阅。'
                 : 'Sends one test notification to every subscribed device, ignoring the do-not-disturb-while-active rule. A device that stays silent has a stale subscription — toggle the switch off and on again on that device to re-subscribe.'"></div>
        </div>

        <div class="settings-section" data-page="skills"
             x-show="settings.activePage === 'skills'">
          <div class="settings-section-title">
            <span x-text="t('set.sec.skills')"></span>
            <span class="settings-save-mode live" x-text="t('set.mode.live')"></span>
          </div>
          <!-- Auto-detection notice: tells the user muselab automatically
               pulled in skills from their Claude Code setup. No setup
               needed — the SDK already loaded them. -->
          <div class="skills-meta" x-show="settings.skills.length">
            <span class="skills-count" x-text="t('set.skills.count', { n: settings.skills.length })"></span>
            <span class="skills-meta-sep">·</span>
            <span class="skills-source-hint" x-text="t('set.skills.source_hint')"></span>
          </div>
          <input type="text" class="skills-filter" x-model="settings.skillFilter"
                 :placeholder="lang==='zh' ? '过滤 skill（名字 / 描述）...' : 'Filter skills (name or description)…'"
                 x-show="settings.skills.length">
          <div x-show="!settings.skills.length" class="settings-empty"
               x-text="t('set.skills.empty')"></div>
          <!-- Card grid — no per-skill emoji (skills are dynamic, can't
               hardcode icons). Single generic 🧩 marker, scope tag tells
               where it came from. "Try this" pre-fills the chat input
               with a starter prompt; for the 7 hand-crafted ones we use
               a concrete demo prompt, others get a generic seed. -->
          <div class="skills-grid">
            <template x-for="sk in filteredSkills()" :key="sk.scope + ':' + sk.name + ':' + (sk.source || '')">
              <!-- 2026-05-23: scope/source chip removed. 用户反馈"显示来源
                   反而提升理解成本" —— project/user/plugin/marketplace 这套
                   分类对普通用户是噪音。如需溯源，hover skill name 的 title
                   或去 Settings → Skills 看完整路径。-->
              <div class="skill-card" :title="sk.source || ''">
                <div class="skill-card-head">
                  <span class="skill-card-icon"><svg><use href="#i-puzzle"/></svg></span>
                  <span class="skill-card-name mono" x-text="sk.name"></span>
                </div>
                <div class="skill-card-desc" x-text="sk.description || (lang==='zh' ? '（无描述）' : '(no description)')"></div>
                <div class="skill-card-actions">
                  <button class="skill-card-try" @click="trySkill(sk)"
                          x-text="t('set.skills.try')"></button>
                </div>
              </div>
            </template>
          </div>
        </div>

        <div class="settings-section" data-page="mcp"
             x-show="settings.activePage === 'mcp'">
          <div class="settings-section-title">
            <span x-text="t('set.sec.mcp')"></span>
            <span class="settings-save-mode live" x-text="t('set.mode.live')"></span>
          </div>
          <div class="settings-hint" x-text="t('set.mcp.hint')"></div>

          <div x-show="!settings.mcpServers.length && !settings.mcpExamples.length"
               class="settings-empty" x-text="t('set.mcp.empty')"></div>

          <template x-for="s in settings.mcpServers" :key="s.name">
            <div class="mcp-server-row">
              <div class="mcp-server-main">
                <div class="mcp-server-name">
                  <span class="mcp-server-dot" :class="{ active: !s.disabled }"></span>
                  <span class="mono" x-text="s.name"></span>
                  <span class="mcp-server-tag" x-show="s.type === 'http' || s.type === 'sse' || s.url"
                        x-text="t('set.mcp.transport_remote')"></span>
                  <span class="mcp-server-tag" x-show="s.disabled" x-text="t('set.mcp.disabled')"></span>
                </div>
                <div class="mcp-server-cmd mono"
                     x-text="(s.type === 'http' || s.type === 'sse' || s.url) ? s.url : (s.command + (s.args.length ? ' ' + s.args.join(' ') : ''))"></div>
              </div>
              <div class="mcp-server-actions">
                <label class="switch sm" :title="t('set.mcp.toggle_title')">
                  <input type="checkbox" :checked="!s.disabled"
                         @change="toggleMcp(s.name, !$event.target.checked)" />
                  <span class="switch-slider"></span>
                </label>
                <button class="icon-btn sm" :title="t('set.mcp.delete')"
                        @click="deleteMcp(s.name)">
                  <svg><use href="#i-trash"/></svg>
                </button>
              </div>
            </div>
          </template>

          <div class="mcp-preset-row" x-show="settings.mcpExamples.length">
            <span class="settings-sub-label" x-text="t('set.mcp.presets')"></span>
            <template x-for="ex in settings.mcpExamples" :key="ex.name">
              <button class="mcp-preset-chip"
                      :disabled="settings.mcpServers.some(s => s.name === ex.name)"
                      @click="installMcpPreset(ex)">
                <span class="mono" x-text="ex.name"></span>
                <span x-show="ex.description" class="mcp-preset-desc" x-text="ex.description"></span>
              </button>
            </template>
          </div>

          <div class="settings-row mcp-add-row">
            <button class="btn-ghost sm" @click="settings.mcpDraft.show = !settings.mcpDraft.show"
                    x-text="settings.mcpDraft.show ? t('btn.cancel') : t('set.mcp.add')"></button>
          </div>
          <div x-show="settings.mcpDraft.show" class="mcp-add-form">
            <!-- Transport: local stdio subprocess vs remote http/sse connector. -->
            <div class="settings-row">
              <label x-text="t('set.mcp.transport')"></label>
              <div class="seg-toggle">
                <button type="button" class="seg-btn"
                        :class="{ 'seg-active': settings.mcpDraft.transport === 'stdio' }"
                        @click="settings.mcpDraft.transport = 'stdio'"
                        x-text="t('set.mcp.transport_local')"></button>
                <button type="button" class="seg-btn"
                        :class="{ 'seg-active': settings.mcpDraft.transport === 'remote' }"
                        @click="settings.mcpDraft.transport = 'remote'"
                        x-text="t('set.mcp.transport_remote')"></button>
              </div>
            </div>
            <div class="settings-row">
              <label x-text="t('set.mcp.name')"></label>
              <input class="settings-input" x-model="settings.mcpDraft.name" placeholder="fetch" />
            </div>
            <!-- stdio fields -->
            <template x-if="settings.mcpDraft.transport === 'stdio'">
              <div>
                <div class="settings-row">
                  <label x-text="t('set.mcp.command')"></label>
                  <input class="settings-input" x-model="settings.mcpDraft.command" placeholder="uvx" />
                </div>
                <div class="settings-row">
                  <label x-text="t('set.mcp.args')"></label>
                  <input class="settings-input" x-model="settings.mcpDraft.argsStr"
                         placeholder="mcp-server-fetch" />
                </div>
              </div>
            </template>
            <!-- remote fields -->
            <template x-if="settings.mcpDraft.transport === 'remote'">
              <div>
                <div class="settings-row">
                  <label x-text="t('set.mcp.url')"></label>
                  <input class="settings-input" x-model="settings.mcpDraft.url"
                         placeholder="https://mcp.example.com/sse" />
                </div>
                <div class="settings-row">
                  <label x-text="t('set.mcp.auth_header')"></label>
                  <input class="settings-input" x-model="settings.mcpDraft.authHeader"
                         placeholder="Bearer sk-…" />
                </div>
                <p class="settings-hint" x-text="t('set.mcp.remote_hint')"></p>
              </div>
            </template>
            <div class="settings-row">
              <button class="btn-primary sm" @click="addMcpFromDraft()" x-text="t('set.mcp.add')"></button>
            </div>
          </div>
        </div>
        </div><!-- /.settings-content -->

      </div>
      <div class="modal-foot">
        <button @click="logout()" class="btn-ghost" style="margin-right:auto;color:var(--c-danger)" x-text="t('btn.logout')"></button>
        <button @click="settings.show=false" class="btn-ghost" x-text="t('btn.cancel')"></button>
        <button @click="saveSettings()" class="btn-primary" x-text="t('btn.save')"></button>
      </div>
    </div>
  </div>

  <!-- ============ Keyboard cheat-sheet ============ -->
  <!-- Triggered by `?` keypress outside any input. Lists all global
       shortcuts so users discover them without reading the README. -->
  <div class="modal-backdrop" x-show="cheatSheet.show"
       @click.self="cheatSheet.show=false">
    <div class="modal cheatsheet-modal"
         @keydown.escape.window="cheatSheet.show=false"
         role="dialog" aria-modal="true">
      <div class="modal-head">
        <span class="modal-title">⌨ <span x-text="lang==='zh' ? '键盘快捷键' : 'Keyboard shortcuts'"></span></span>
        <button class="modal-close" @click="cheatSheet.show=false"
                :title="lang==='zh' ? '关闭' : 'Close'"
                aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <table class="cheatsheet-table">
          <tbody>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">K</span></td>
              <td x-text="lang==='zh' ? '命令面板（搜索文件 / 会话 / 操作）' : 'Command palette (files, sessions, actions)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">T</span></td>
              <td x-text="lang==='zh' ? '新建会话' : 'New chat'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">W</span></td>
              <td x-text="lang==='zh' ? '关闭当前 tab' : 'Close current tab'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">Tab</span></td>
              <td x-text="lang==='zh' ? '下一个 tab（Shift 反向）' : 'Next tab (Shift = previous)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">1</span>–<span class="kbd">9</span></td>
              <td x-text="lang==='zh' ? '跳到第 N 个 tab' : 'Jump to Nth tab'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">S</span></td>
              <td x-text="lang==='zh' ? '保存当前文件（编辑模式）' : 'Save file (in edit mode)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">C</span> / <span class="kbd">⌘</span><span class="kbd">V</span></td>
              <td x-text="lang==='zh' ? '在文件树：复制选中文件 / 粘贴为 .bak（仅文件树有选中且焦点不在输入框时生效）' : 'In file tree: copy selected file / paste as .bak (only fires when a tree file is selected and focus is outside any input)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">Z</span></td>
              <td x-text="lang==='zh' ? '图片标注编辑器：撤销上一笔' : 'Image annotator: undo last stroke'"></td>
            </tr>
            <tr>
              <td><span class="kbd">Enter</span></td>
              <td x-text="lang==='zh' ? '发送消息（桌面）；移动端是换行' : 'Send (desktop); newline on mobile'"></td>
            </tr>
            <tr>
              <td><span class="kbd">Shift</span><span class="kbd">Enter</span></td>
              <td x-text="lang==='zh' ? '输入框换行（光标处插入）' : 'Newline at caret'"></td>
            </tr>
            <tr>
              <td><span class="kbd">Ctrl</span><span class="kbd">Enter</span> / <span class="kbd">⌘</span><span class="kbd">Enter</span></td>
              <td x-text="lang==='zh' ? '输入框换行（光标处插入）' : 'Newline at caret'"></td>
            </tr>
            <tr>
              <td><span class="kbd">@</span></td>
              <td x-text="lang==='zh' ? '在输入框引用 archive 文件（自动补全）' : 'Mention archive file in input (autocomplete)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">/</span></td>
              <td x-text="lang==='zh' ? '在输入框开头：slash 命令（/help /compact ...）' : 'At input start: slash commands (/help /compact …)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">↑</span></td>
              <td x-text="lang==='zh' ? '空输入框时：唤回上一条用户消息（重编辑 / 重发）' : 'In empty input: recall last user message (edit & resend)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">Esc</span></td>
              <td x-text="lang==='zh' ? '关闭弹窗 / 取消编辑 / 停止流式' : 'Close modal / exit edit / stop stream'"></td>
            </tr>
            <tr>
              <td><span class="kbd">?</span></td>
              <td x-text="lang==='zh' ? '打开这个面板' : 'Open this cheat sheet'"></td>
            </tr>
          </tbody>
        </table>
        <div class="cheatsheet-hint"
             x-text="lang==='zh'
               ? 'Mac 用 ⌘，Windows / Linux 用 Ctrl'
               : 'Mac uses ⌘, Windows / Linux uses Ctrl'"></div>
      </div>
    </div>
  </div>

  <!-- ============ Skills drawer ============
       Card grid of every discoverable skill (project + user + plugin
       scopes). Opens from the 🧩 button in the chat toolbar. Clicking a
       card pre-fills the input with a seed prompt and focuses the
       textarea — works regardless of whether the user is on the empty
       chat or mid-conversation. -->
  <!-- MCP drawer — chat-input 🔌 entry point. Read-only list of every MCP
       server muselab will actually mount on the next turn (merged view:
       muselab's mcp.json + Claude Code's standard config files). Each row
       shows source badge (where it came from) + enabled toggle + reconnect
       button. For full editing (add / delete / edit env), link to Settings.
       2026-05-23 replaces the top-bar mcp-badge with this richer view. -->
  <div class="skills-drawer-overlay" x-show="mcpDrawerOpen"
       @click.self="mcpDrawerOpen = false"
       @keydown.escape.window="mcpDrawerOpen = false"
       x-cloak>
    <div class="skills-drawer">
      <div class="skills-drawer-head">
        <div>
          <div class="skills-drawer-title"
               x-text="(lang==='zh'?'MCP 服务':'MCP servers') + ' · ' + mcp.servers.length"></div>
          <!-- Unicode curly apostrophes (U+2019) instead of straight `'`
               so the JS string literal stays valid inside an HTML double-
               quoted attribute. Earlier `muselab\\'s` was wrong: HTML
               doesn't escape backslashes, so JS saw `\\` → literal `\` +
               then `'` closed the string early → SyntaxError: Unexpected
               identifier 's'. Lesson: never put straight ASCII apostrophes
               inside Alpine x-text JS strings — use U+2019 (which is the
               proper typographic apostrophe anyway). -->
          <div class="skills-drawer-subtitle"
               x-text="lang==='zh'
                 ? '已合并 muselab 自有配置 + Claude Code 标准配置位置（~/.claude.json / .mcp.json）'
                 : 'Merged: muselab’s own config + Claude Code’s standard MCP files'"></div>
        </div>
        <button class="skills-drawer-close" @click="mcpDrawerOpen = false"
                :title="lang==='zh' ? '关闭' : 'Close'" aria-label="Close">×</button>
      </div>
      <div class="skills-drawer-body">
        <div x-show="!mcp.servers.length" class="settings-empty"
             x-text="lang==='zh'
               ? '没有配置 MCP 服务。可去 Settings → MCP 添加，或在 ~/.claude.json mcpServers 里加（会自动合并）。'
               : 'No MCP servers configured. Add via Settings → MCP, or edit ~/.claude.json mcpServers (auto-merged).'"></div>
        <div class="skills-grid">
          <template x-for="s in mcp.servers" :key="s.name + ':' + (s.source || 'muselab')">
            <!-- Source chip removed 2026-05-23 同 skills 卡片，详细溯源信息
                 通过外层 div :title 提供给好奇的用户 hover 即可。-->
            <div class="skill-card" :class="{'is-disabled': s.disabled}"
                 :title="mcpSourceLabel(s.source) + (s.disabled ? (lang==='zh' ? ' · 已禁用' : ' · disabled') : '')">
              <div class="skill-card-head">
                <span class="skill-card-icon"><svg><use href="#i-plug"/></svg></span>
                <span class="skill-card-name mono" x-text="s.name"></span>
              </div>
              <div class="skill-card-desc mono"
                   x-text="(s.command || '(remote)') + (s.args && s.args.length ? ' ' + s.args.join(' ') : '')"></div>
              <div class="skill-card-actions">
                <!-- "Try" mirrors skill cards: pre-fill chat input with a
                     seed prompt referencing this MCP server's name, so the
                     model picks an appropriate tool from that server on
                     the first turn. Disabled MCPs can't be tried — the
                     SDK won't have mounted them this turn. -->
                <button class="skill-card-try"
                        :disabled="s.disabled"
                        @click="tryMcp(s)"
                        x-text="t('set.skills.try')"></button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <div class="skills-drawer-overlay" x-show="skillsDrawerOpen"
       @click.self="skillsDrawerOpen = false"
       @keydown.escape.window="skillsDrawerOpen = false"
       x-cloak>
    <div class="skills-drawer">
      <div class="skills-drawer-head">
        <div>
          <div class="skills-drawer-title" x-text="t('set.skills.drawer_title') + ' · ' + settings.skills.length"></div>
          <div class="skills-drawer-subtitle" x-text="t('set.skills.drawer_subtitle')"></div>
        </div>
        <button class="skills-drawer-close" @click="skillsDrawerOpen = false"
                :title="lang==='zh' ? '关闭' : 'Close'" aria-label="Close">×</button>
      </div>
      <input type="text" class="skills-filter" x-model="settings.skillFilter"
             :placeholder="lang==='zh' ? '过滤 skill...' : 'Filter skills…'">
      <div class="skills-drawer-body">
        <div x-show="!settings.skills.length" class="settings-empty"
             x-text="t('set.skills.empty')"></div>
        <div class="skills-grid">
          <template x-for="sk in filteredSkills()" :key="sk.scope + ':' + sk.name + ':' + (sk.source || '')">
            <!-- scope chip removed 2026-05-23, 同 Settings → Skills 卡片 —— 见
                 那段注释。-->
            <div class="skill-card" :title="sk.source || ''">
              <div class="skill-card-head">
                <span class="skill-card-icon"><svg><use href="#i-puzzle"/></svg></span>
                <span class="skill-card-name mono" x-text="sk.name"></span>
              </div>
              <div class="skill-card-desc" x-text="sk.description || (lang==='zh' ? '（无描述）' : '(no description)')"></div>
              <div class="skill-card-actions">
                <button class="skill-card-try" @click="trySkill(sk)"
                        x-text="t('set.skills.try')"></button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ Modal ============ -->
  <!-- Claude Auth Connect modal — instructions + polling.
       Stays open until /status reports logged_in === true, then auto-closes. -->
  <div class="modal-backdrop" x-show="claudeAuthModal.open"
       @click.self="closeClaudeAuthModal()"
       x-transition.opacity.duration.120ms>
    <div class="modal claude-auth-modal" @keydown.escape.window="closeClaudeAuthModal()"
         role="dialog" aria-modal="true">
      <div class="modal-head">
        <span class="modal-title" x-text="t('claude_auth.modal_title')"></span>
        <button class="modal-close" @click="closeClaudeAuthModal()"
                :title="lang==='zh' ? '关闭' : 'Close'" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <!-- Step 1: CLI install command -->
        <div class="claude-auth-step">
          <div class="claude-auth-step-text" x-text="t('claude_auth.modal_step1')"></div>
          <div class="claude-auth-cmd-row">
            <code class="claude-auth-cmd" x-text="t('claude_auth.cli_install_cmd')"></code>
            <button class="btn-ghost sm" @click="copyClaudeAuthCmd('install')"
                    x-text="claudeAuthModal.copyToast === 'install' ? t('claude_auth.copied') : '📋'"></button>
          </div>
        </div>
        <!-- Step 2: claude login -->
        <div class="claude-auth-step">
          <div class="claude-auth-step-text" x-text="t('claude_auth.modal_step2')"></div>
          <div class="claude-auth-cmd-row">
            <code class="claude-auth-cmd">claude login</code>
            <button class="btn-ghost sm" @click="copyClaudeAuthCmd('login')"
                    x-text="claudeAuthModal.copyToast === 'login' ? t('claude_auth.copied') : '📋'"></button>
          </div>
        </div>
        <!-- Step 3: browser auth -->
        <div class="claude-auth-step">
          <div class="claude-auth-step-text" x-text="t('claude_auth.modal_step3')"></div>
        </div>
        <!-- Polling indicator -->
        <div class="claude-auth-waiting" x-show="claudeAuthModal.polling">
          <span class="spinner-sm"></span>
          <span x-text="t('claude_auth.modal_waiting')"></span>
        </div>
        <!-- Docker hint -->
        <div class="claude-auth-tip" x-text="t('claude_auth.modal_docker_tip')"></div>
      </div>
      <div class="modal-foot">
        <button @click="closeClaudeAuthModal()" class="btn-ghost"
                x-text="t('claude_auth.modal_close')"></button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop confirm-backdrop" x-show="modal.show" @click.self="modal.cancel && modal.cancel()">
    <div class="modal confirm-modal" @keydown.escape.window="modal.cancel && modal.cancel()"
         role="alertdialog" aria-modal="true">
      <div class="modal-head">
        <span class="modal-title" x-text="modal.title"></span>
        <button class="modal-close" @click="modal.cancel && modal.cancel()"
                :title="lang==='zh' ? '关闭' : 'Close'" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <!-- x-show: an empty body still rendered an empty <div> whose line
             box left a blank band above the input (visible in prompts that
             pass body:""). -->
        <div x-show="modal.body" x-text="modal.body"></div>
        <input x-show="modal.input !== null" x-model="modal.input"
               :placeholder="modal.placeholder || ''"
               x-ref="modalInput" @keydown.enter="modal.confirm?.()" />
        <div x-show="modal.choices && modal.choices.length" class="modal-choices">
          <template x-for="(c, ci) in (modal.choices || [])" :key="ci">
            <button type="button" class="modal-choice" @click="modal.pick && modal.pick(c.value)">
              <span class="modal-choice-label" x-text="c.label"></span>
              <span class="modal-choice-sub" x-show="c.sub" x-text="c.sub"></span>
            </button>
          </template>
        </div>
      </div>
      <div class="modal-foot">
        <button @click="modal.cancel && modal.cancel()" class="btn-ghost" x-text="modal.cancelText || t('btn.cancel')"></button>
        <button x-show="!(modal.choices && modal.choices.length)"
                @click="modal.confirm && modal.confirm()" :class="modal.danger ? 'btn-danger' : 'btn-primary'" x-text="modal.okText || t('btn.confirm')"></button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       Trash modal — list of soft-deleted files/dirs with restore +
       permanent-purge per item, plus "Empty all". Opens from the
       trash icon at the bottom of the files pane. Loads /trash/list
       on each open so the view is always fresh.
       ============================================================ -->
  <div class="modal-backdrop" x-show="trash.modalOpen"
       @click.self="closeTrashModal()"
       x-transition.opacity.duration.120ms>
    <div class="modal trash-modal" @keydown.escape.window="closeTrashModal()"
         role="dialog" aria-modal="true">
      <div class="modal-head">
        <span class="modal-title">
          <span class="icon" style="display:inline-flex;width:18px;height:18px;vertical-align:-3px;"><svg><use href="#i-trash"/></svg></span>
          <span x-text="lang==='zh' ? '垃圾桶' : 'Trash'"></span>
          <span class="modal-title-count" x-show="trash.items.length > 0"
                x-text="'(' + trash.items.length + ')'"></span>
        </span>
        <button class="modal-close" @click="closeTrashModal()"
                :title="lang==='zh' ? '关闭' : 'Close'" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <template x-if="trash.loading">
          <div class="hint-row" x-text="lang==='zh' ? '加载中…' : 'Loading…'"></div>
        </template>
        <template x-if="!trash.loading && !trash.items.length">
          <div class="hint-row" x-text="lang==='zh' ? '垃圾桶是空的' : 'Trash is empty'"></div>
        </template>
        <template x-if="!trash.loading && trash.items.length">
          <div class="trash-list">
            <template x-for="it in trash.items" :key="it.trash_id">
              <div class="trash-row">
                <span class="trash-kind-icon">
                  <svg><use :href="it.kind === 'dir' ? '#i-folder' : '#i-file'"/></svg>
                </span>
                <div class="trash-meta">
                  <div class="trash-name" x-text="it.original_name"></div>
                  <div class="trash-sub">
                    <span class="trash-path" x-text="it.original_path"></span>
                    <span class="trash-sep">·</span>
                    <span x-text="trashItemTime(it)"></span>
                    <span class="trash-sep">·</span>
                    <span x-text="trashItemSize(it)"></span>
                  </div>
                </div>
                <div class="trash-actions">
                  <button class="btn-ghost sm" @click="restoreTrash(it.trash_id)"
                          x-text="lang==='zh' ? '恢复' : 'Restore'"></button>
                  <button class="btn-ghost sm danger" @click="purgeTrash(it.trash_id)"
                          x-text="lang==='zh' ? '彻底删除' : 'Delete'"></button>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
      <div class="modal-foot">
        <button @click="closeTrashModal()" class="btn-ghost"
                x-text="lang==='zh' ? '关闭' : 'Close'"></button>
        <button @click="emptyTrash()" class="btn-danger"
                :disabled="!trash.items.length"
                x-text="lang==='zh' ? '清空垃圾桶' : 'Empty trash'"></button>
      </div>
    </div>
  </div>

  <!-- Scheduled-tasks drawer — modal listing tasks + create form +
       recent run history. Opens on bell click; ack-zeros the unread
       count on open. -->
  <div class="modal-backdrop" x-show="scheduler.show"
       x-transition.opacity.duration.120ms
       @click.self="closeScheduler()">
    <div class="modal sched-modal" @keydown.escape.window="closeScheduler()">
      <div class="modal-head">
        <span class="modal-title"><svg class="modal-title-icon"><use href="#i-clock"/></svg><span x-text="lang==='zh' ? '定时任务' : 'Scheduled tasks'"></span></span>
        <button class="modal-close" @click="closeScheduler()"
                :title="lang==='zh' ? '关闭' : 'Close'" aria-label="Close">×</button>
      </div>
      <div class="modal-body sched-body">
        <!-- Create form — labeled rows, grid-aligned, supports daily /
             weekly / monthly / once with the time picker always
             precise to the minute. Doubles as the edit form when
             scheduler.draft.editingId is set (see editSchedTask). -->
        <div class="sched-create" :class="{ 'is-editing': scheduler.draft.editingId }">
          <div class="sched-edit-banner" x-show="scheduler.draft.editingId">
            <span x-text="(lang==='zh' ? '编辑中：' : 'Editing: ') + scheduler.draft.name"></span>
            <button class="btn-text sm" @click="cancelEditSched()"
                    x-text="lang==='zh' ? '取消编辑' : 'Cancel edit'"></button>
          </div>
          <div class="sched-field">
            <label class="sched-label" x-text="lang==='zh' ? '任务名' : 'Name'"></label>
            <input class="settings-input sched-input-name"
                   x-model="scheduler.draft.name"
                   :placeholder="lang==='zh' ? '例：每日复盘' : 'e.g. Daily review'" />
          </div>
          <!-- Trigger block — groups all schedule-shape inputs (frequency,
               variant rows, time) inside a subtle inset card so the user
               reads it as "WHEN this runs", distinct from name / prompt
               / model which are "WHAT it does". -->
          <div class="sched-trigger-block">
            <div class="sched-field">
              <label class="sched-label" x-text="lang==='zh' ? '频率' : 'Repeat'"></label>
              <div class="sched-freq">
                <template x-for="k in ['daily','weekly','monthly','once']" :key="k">
                  <button type="button" class="sched-freq-btn"
                          :class="{ active: scheduler.draft.kind === k }"
                          @click="scheduler.draft.kind = k"
                          x-text="lang==='zh'
                            ? ({daily:'每天',weekly:'每周',monthly:'每月',once:'一次'})[k]
                            : ({daily:'Daily',weekly:'Weekly',monthly:'Monthly',once:'Once'})[k]"></button>
                </template>
              </div>
            </div>

            <!-- Weekday picker — only visible for weekly. -->
            <div class="sched-field" x-show="scheduler.draft.kind === 'weekly'">
              <label class="sched-label" x-text="lang==='zh' ? '星期几' : 'Weekdays'"></label>
              <div class="sched-weekdays">
                <template x-for="(wd, idx) in (lang==='zh'
                    ? ['一','二','三','四','五','六','日']
                    : ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'])" :key="idx">
                  <button type="button" class="sched-weekday"
                          :class="{ active: scheduler.draft.weekdays.includes(idx) }"
                          @click="toggleDraftWeekday(idx)"
                          x-text="wd"></button>
                </template>
              </div>
            </div>

            <!-- Day-of-month — only for monthly. -->
            <div class="sched-field" x-show="scheduler.draft.kind === 'monthly'">
              <label class="sched-label" x-text="lang==='zh' ? '每月第' : 'Day of month'"></label>
              <div class="sched-monthly">
                <input type="number" min="1" max="31" class="settings-input sched-day-input"
                       x-model.number="scheduler.draft.day" />
                <span class="sched-monthly-suffix"
                      x-text="lang==='zh' ? '日（超过月底自动顺延到月底当天）' : '(falls back to last day for short months)'"></span>
              </div>
            </div>

            <!-- Once: date picker. -->
            <div class="sched-field" x-show="scheduler.draft.kind === 'once'">
              <label class="sched-label" x-text="lang==='zh' ? '日期' : 'Date'"></label>
              <input type="date" class="settings-input sched-input-date"
                     x-model="scheduler.draft.onceDate" />
            </div>

            <!-- Time slot list. Always rendered as a list (draft.times is
                 always length >= 1), but the +/- affordances only appear
                 for `daily` since weekly/monthly/once are conceptually
                 single-time-per-occurrence. Each row is a native HTML5
                 time picker bound to its slot via updateDraftTime(i, val). -->
            <div class="sched-field sched-field-times">
              <label class="sched-label" x-text="lang==='zh' ? '时间' : 'Time'"></label>
              <div class="sched-times">
                <template x-for="(t, i) in scheduler.draft.times" :key="i">
                  <div class="sched-times-row">
                    <input type="time" class="settings-input sched-input-time"
                           :value="padTime(t.hour, t.minute)"
                           @input="updateDraftTime(i, $event.target.value)" />
                    <button type="button" class="sched-times-del"
                            x-show="scheduler.draft.kind === 'daily' && scheduler.draft.times.length > 1"
                            @click="removeDraftTime(i)"
                            :title="lang==='zh' ? '删除此时段' : 'Remove this time'"
                            :aria-label="lang==='zh' ? '删除' : 'Remove'">×</button>
                  </div>
                </template>
                <button type="button" class="sched-times-add"
                        x-show="scheduler.draft.kind === 'daily' && scheduler.draft.times.length < 24"
                        @click="addDraftTime()"
                        x-text="lang==='zh' ? '+ 添加时段' : '+ Add time'"></button>
                <div class="sched-times-hint"
                     x-show="scheduler.draft.kind === 'daily' && scheduler.draft.times.length > 1"
                     x-text="lang==='zh'
                       ? '每天将在以上每个时段各执行一次'
                       : 'Will fire once at each time, every day'"></div>
              </div>
            </div>
          </div>

          <!-- Model selector — without this, draft.model stays empty
               and the scheduler falls back to SDK default, which doesn't
               match the user's UI model. -->
          <div class="sched-field">
            <label class="sched-label" x-text="lang==='zh' ? '模型' : 'Model'"></label>
            <select class="settings-input sched-input-model"
                    x-model="scheduler.draft.model">
              <option value="" x-text="lang==='zh' ? '跟随默认' : 'Default'"></option>
              <template x-for="m in availableModels" :key="m.model">
                <option :value="m.model" x-text="m.label || m.model"></option>
              </template>
            </select>
          </div>

          <div class="sched-field sched-field-prompt">
            <label class="sched-label" x-text="lang==='zh' ? 'Prompt' : 'Prompt'"></label>
            <textarea class="sched-create-prompt"
                      x-model="scheduler.draft.prompt"
                      rows="3"
                      :placeholder="lang==='zh'
                        ? '例：总结过去 24 小时 archive 的改动，列出值得关注的三件事'
                        : 'e.g. Summarize what changed in my archive in the last 24h and flag the 3 worth my attention'"></textarea>
          </div>

          <!-- Session mode — added 2026-05-28. Reuses the .sched-freq-btn
               segmented-control look so the form has a consistent feel
               with the frequency picker above. Default "fresh" reflects
               the cronjob mental model; users can switch to "reuse" for
               日报续写 / 长期跟踪 tasks where context accumulation matters.
               NB: segmented-control + hint live INSIDE a single wrapper
               div so the .sched-field grid (78px label + 1fr content)
               treats them as one grid item. Without the wrapper the
               hint became a separate grid cell and got crushed into the
               78px label column on the next row (2026-05-28 user
               screenshot caught the broken layout). -->
          <div class="sched-field sched-field-mode">
            <label class="sched-label"
                   x-text="lang==='zh' ? '会话模式' : 'Session mode'"></label>
            <div class="sched-mode-col">
              <div class="sched-freq">
                <button type="button" class="sched-freq-btn"
                        :class="{ active: scheduler.draft.session_mode === 'fresh' }"
                        @click="scheduler.draft.session_mode = 'fresh'"
                        x-text="lang==='zh' ? '每次新开' : 'Fresh'"></button>
                <button type="button" class="sched-freq-btn"
                        :class="{ active: scheduler.draft.session_mode === 'reuse' }"
                        @click="scheduler.draft.session_mode = 'reuse'"
                        x-text="lang==='zh' ? '持续会话' : 'Reuse'"></button>
              </div>
              <div class="sched-times-hint sched-mode-hint"
                   x-text="scheduler.draft.session_mode === 'fresh'
                     ? (lang==='zh'
                         ? '每次跑都新建一个 session，互不干扰。适合周报 / 调研类。'
                         : 'Each run spins up a new session. Good for weekly reports / one-shot research.')
                     : (lang==='zh'
                         ? '所有运行都接在同一个 session 里，Muse 看得到历史。适合日报续写 / 长期跟踪。'
                         : 'All runs append to one bound session — Muse sees prior history. Good for daily-report threads.')"></div>
            </div>
          </div>

          <div class="sched-create-foot">
            <!-- Fresh 模式下这句与上方 mode-hint 重复（都在说「每次新建
                 session」），只在 Reuse 模式显示——此时它补充了 mode-hint
                 没讲的「自动创建的同名 session」增量信息。 -->
            <span class="sched-create-hint" x-show="scheduler.draft.session_mode !== 'fresh'"
                  x-text="lang==='zh'
                    ? '运行结果发送到自动创建的同名 session'
                    : 'Output streams into an auto-created session of the same name'"></span>
            <button class="btn-ghost" x-show="scheduler.draft.editingId"
                    @click="cancelEditSched()"
                    x-text="lang==='zh' ? '取消' : 'Cancel'"></button>
            <button class="btn-primary" @click="createSchedTask()"
                    x-text="scheduler.draft.editingId
                      ? (lang==='zh' ? '保存修改' : 'Save changes')
                      : (lang==='zh' ? '+ 添加任务' : '+ Add task')"></button>
          </div>
        </div>

        <!-- Tasks list -->
        <div class="sched-section">
          <div class="sched-section-title">
            <svg class="sched-section-icon"><use href="#i-list"/></svg>
            <span x-text="lang==='zh'
                ? `已配置（${scheduler.tasks.length}）`
                : `Configured (${scheduler.tasks.length})`"></span>
          </div>
          <div class="sched-empty" x-show="!scheduler.tasks.length"
               x-text="lang==='zh' ? '还没有任务。在上方添加一个。'
                                   : 'No tasks yet. Add one above.'"></div>
          <template x-for="t in scheduler.tasks" :key="t.id">
            <div class="sched-task-card"
                 :class="{ 'has-runs-open': scheduler.taskRuns[t.id]?.open }">
              <div class="sched-row sched-row-clickable"
                   :class="{ disabled: !t.enabled }"
                   @click="openSchedTaskSession(t)"
                   :title="lang==='zh' ? '点击打开最近一次运行的 session' : 'Click to open the most recent run session'">
                <div class="sched-row-main">
                  <div class="sched-row-name">
                    <span x-text="t.name"></span>
                    <span class="sched-row-time"
                          x-text="' · ' + fmtSchedule(t.schedule)"></span>
                    <!-- Mode badge — only shown when explicit fresh; reuse is
                         the historical default and would clutter every row
                         if labelled. Old tasks without session_mode read as
                         "reuse" (no badge), matching backend fallback. -->
                    <span class="sched-row-mode" x-show="t.session_mode === 'fresh'"
                          :title="lang==='zh' ? '每次新开 session' : 'Fresh session per run'"
                          x-text="lang==='zh' ? '每次新开' : 'fresh'"></span>
                  </div>
                  <div class="sched-row-prompt" x-text="t.prompt"></div>
                  <div class="sched-row-meta">
                    <span x-show="t.last_run"
                          x-text="(lang==='zh' ? '上次: ' : 'last: ') + fmtSchedTime(t.last_run)"></span>
                    <span x-show="t.next_run"
                          :class="{ 'sched-time-muted': !t.enabled }"
                          x-text="(lang==='zh' ? '下次: ' : 'next: ') + fmtSchedTime(t.next_run)"></span>
                  </div>
                </div>
                <!-- All in-row controls .stop so they don't trigger the
                     row-level click → openSchedTaskSession. -->
                <div class="sched-row-actions" @click.stop>
                  <label class="switch sm" :title="lang==='zh' ? '启用 / 暂停' : 'Enable / pause'"
                         @click.stop>
                    <input type="checkbox" :checked="t.enabled"
                           @change="toggleSchedEnabled(t)" />
                    <span class="switch-slider"></span>
                  </label>
                  <button class="icon-btn sm" @click.stop="toggleTaskRuns(t.id)"
                          :class="{ active: scheduler.taskRuns[t.id]?.open }"
                          :title="lang==='zh' ? '历史运行' : 'Past runs'">
                    <svg><use href="#i-history"/></svg>
                  </button>
                  <!-- NO :disabled here. A stuck schedRunning[t.id] used to
                       leave the native disabled attribute on, so the button
                       showed `not-allowed` and ate the click ("鼠标一挪上去就是
                       禁用的标志，点不了", 2026-06-09). Double-fire is now
                       guarded by a timestamp in runSchedTaskNow; schedRunning
                       only drives the cosmetic spinner (paper-plane → spinning
                       refresh glyph, see .icon-btn.is-running in styles.css). -->
                  <button class="icon-btn sm" @click.stop="runSchedTaskNow(t)"
                          :class="{ 'is-running': schedRunning[t.id] }"
                          :title="schedRunning[t.id]
                                    ? (lang==='zh' ? '运行中…' : 'Running…')
                                    : (lang==='zh' ? '立即运行一次' : 'Run now')">
                    <svg><use :href="schedRunning[t.id] ? '#i-refresh' : '#i-send'"/></svg>
                  </button>
                  <button class="icon-btn sm" @click.stop="editSchedTask(t)"
                          :class="{ active: scheduler.draft.editingId === t.id }"
                          :title="lang==='zh' ? '编辑' : 'Edit'">
                    <svg><use href="#i-edit"/></svg>
                  </button>
                  <button class="icon-btn sm" @click.stop="deleteSchedTask(t)"
                          :title="lang==='zh' ? '删除' : 'Delete'">
                    <svg><use href="#i-trash"/></svg>
                  </button>
                </div>
              </div>
              <!-- Collapsible "past runs" panel — lazily loaded on first
                   expand. Each entry links to its own session (fresh) or
                   the same bound session (reuse). Shown only when open. -->
              <div class="sched-task-runs" x-show="scheduler.taskRuns[t.id]?.open"
                   x-transition.opacity.duration.120ms>
                <div class="sched-task-runs-loading"
                     x-show="scheduler.taskRuns[t.id]?.loading"
                     x-text="lang==='zh' ? '加载中…' : 'Loading…'"></div>
                <div class="sched-task-runs-empty"
                     x-show="scheduler.taskRuns[t.id]?.open
                           && !scheduler.taskRuns[t.id]?.loading
                           && !(scheduler.taskRuns[t.id]?.runs?.length)"
                     x-text="lang==='zh' ? '还没有运行记录。' : 'No runs yet.'"></div>
                <template x-for="run in (scheduler.taskRuns[t.id]?.runs || [])"
                          :key="run.ts + ':' + (run.session_id || '')">
                  <div class="sched-task-run sched-row-clickable"
                       :class="{ err: !run.ok }"
                       @click="run.session_id && openTab(run.session_id)"
                       :title="run.session_id
                         ? (lang==='zh' ? '点击打开此次运行的 session' : 'Open this run session')
                         : ''">
                    <div class="sched-task-run-head">
                      <span class="sched-task-run-time"
                            x-text="fmtSchedTime(run.ts)"></span>
                      <span class="sched-task-run-status" x-show="run.ok"
                            x-text="lang==='zh' ? '成功' : 'OK'"></span>
                      <span class="sched-task-run-status err" x-show="!run.ok"
                            x-text="lang==='zh' ? '失败' : 'Error'"></span>
                    </div>
                    <div class="sched-task-run-body"
                         x-text="run.ok ? (run.reply_preview || '—') : (run.error || '—')"></div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>

        <!-- Recent runs -->
        <div class="sched-section">
          <div class="sched-section-head">
            <div class="sched-section-title">
              <svg class="sched-section-icon"><use href="#i-history"/></svg>
              <span x-text="lang==='zh'
                  ? `最近运行（${scheduler.history.length}）`
                  : `Recent runs (${scheduler.history.length})`"></span>
            </div>
            <!-- Clear-all only shown when history is non-empty (otherwise
                 the button is dead weight). Sits at the section head as
                 a single "bulk action" affordance; per-row × is below. -->
            <button class="btn-text sm sched-hist-clear"
                    x-show="scheduler.history.length"
                    @click="clearAllSchedHistory()"
                    x-text="lang==='zh' ? '清空' : 'Clear all'"></button>
          </div>
          <div class="sched-empty" x-show="!scheduler.history.length"
               x-text="lang==='zh' ? '还没有运行记录。'
                                   : 'No runs yet.'"></div>
          <!-- Use ts+task_id as :key (not array index) so Alpine doesn't
               re-render the wrong row when one is deleted mid-list. With
               index keys, optimistic delete of row 2 in a 3-row list
               would make row 3's DOM slot inherit row 2's :class/x-text
               binding until the next refetch — surfaces as the "wrong
               row got crossed out" bug. -->
          <template x-for="h in scheduler.history" :key="h.ts + ':' + (h.task_id || '')">
            <div class="sched-hist-row sched-row-clickable"
                 :class="{ err: !h.ok }"
                 @click="openSchedTaskSession(h)"
                 :title="lang==='zh' ? '点击打开对应会话查看完整回复' : 'Click to open the bound session for the full reply'">
              <div class="sched-hist-head">
                <span class="sched-hist-name" x-text="h.task_name"></span>
                <span class="sched-hist-time" x-text="fmtSchedTime(h.ts)"></span>
                <button class="btn-text sm sched-hist-retry"
                        x-show="!h.ok && scheduler.tasks.find(t => t.id === h.task_id)"
                        :disabled="schedRunning[h.task_id]"
                        @click.stop="retrySchedHistory(h)"
                        x-text="schedRunning[h.task_id]
                          ? (lang==='zh' ? '执行中…' : 'Running…')
                          : (lang==='zh' ? '重试' : 'Retry')"></button>
                <!-- Per-row delete. No confirm — single-row delete is
                     cheap to undo (just re-run the task) and a confirm
                     modal per × would be noisy on a long history list,
                     especially on phones. -->
                <button class="sched-hist-del"
                        @click.stop="deleteSchedHistoryEntry(h)"
                        :title="lang==='zh' ? '删除这条记录' : 'Delete this entry'"
                        :aria-label="lang==='zh' ? '删除' : 'Delete'">×</button>
              </div>
              <div class="sched-hist-body"
                   x-text="h.ok ? h.reply_preview : ('Error: ' + (h.error || 'unknown'))"></div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- Image annotation editor — full-screen modal for drawing on a pending
       image attachment. Opens via the ✎ button on an .img-chip in the chat
       composer. Tools: pen (freedraw), rect (outline), arrow, eraser.
       Undo: multi-level via dataURL frame stack (capped at 15 frames).
       Save flow: canvas.toBlob → new File → swap entry.file → re-upload via
       the same /api/chat/upload-image endpoint the original used.
       Cancel just closes; no destructive ops on the original chip. -->
  <!-- Cmd/Ctrl+Z bound on the backdrop. NOTE: x-show keeps the element in
       the DOM even when the editor is closed, so this window listener is
       ALWAYS attached. We must NOT use Alpine's `.prevent` modifier here —
       it calls preventDefault() unconditionally (before the expression),
       which would swallow Cmd/Ctrl+Z everywhere and break the chat
       textarea's native undo. Instead we preventDefault() inside the
       handler only while the editor is actually open. -->
  <div class="img-editor-backdrop" x-show="imageEditor.show"
       x-transition.opacity.duration.120ms
       @keydown.escape.window="closeImageEditor(false)"
       @keydown.window.ctrl.z="if (imageEditor.show) { $event.preventDefault(); if (!imageEditor._drawing) undoImageEdit(); }"
       @keydown.window.meta.z="if (imageEditor.show) { $event.preventDefault(); if (!imageEditor._drawing) undoImageEdit(); }"
       @click.self="closeImageEditor(false)">
    <div class="img-editor" @click.stop>
      <div class="img-editor-head">
        <span class="img-editor-title"
              x-text="lang==='zh' ? '画笔编辑' : 'Annotate'"></span>
        <button class="modal-close" @click="closeImageEditor(false)"
                :aria-label="lang==='zh' ? '关闭' : 'Close'">×</button>
      </div>
      <div class="img-editor-canvas-wrap">
        <canvas x-ref="imgEditorCanvas" class="img-editor-canvas"></canvas>
      </div>
      <div class="img-editor-toolbar">
        <!-- Tool group -->
        <div class="img-editor-tool-group">
          <button class="img-editor-tool"
                  :class="{ active: imageEditor.tool === 'pen' }"
                  @click="imageEditor.tool = 'pen'"
                  :title="lang==='zh' ? '画笔' : 'Pen'">
            <svg><use href="#i-pen"/></svg>
          </button>
          <button class="img-editor-tool"
                  :class="{ active: imageEditor.tool === 'rect' }"
                  @click="imageEditor.tool = 'rect'"
                  :title="lang==='zh' ? '矩形' : 'Rectangle'">
            <svg><use href="#i-square"/></svg>
          </button>
          <button class="img-editor-tool"
                  :class="{ active: imageEditor.tool === 'arrow' }"
                  @click="imageEditor.tool = 'arrow'"
                  :title="lang==='zh' ? '箭头' : 'Arrow'">
            <svg><use href="#i-arrow-ur"/></svg>
          </button>
          <button class="img-editor-tool"
                  :class="{ active: imageEditor.tool === 'eraser' }"
                  @click="imageEditor.tool = 'eraser'"
                  :title="lang==='zh' ? '橡皮（恢复原图）' : 'Eraser (restore original)'">
            <svg><use href="#i-eraser"/></svg>
          </button>
        </div>
        <!-- Color group -->
        <div class="img-editor-color-group">
          <template x-for="c in ['#ef4444','#22c55e','#facc15','#3b82f6','#111827']" :key="c">
            <button class="img-editor-color"
                    :class="{ active: imageEditor.color === c }"
                    :style="'background:' + c"
                    @click="imageEditor.color = c"
                    :aria-label="c"></button>
          </template>
        </div>
        <!-- Size group -->
        <div class="img-editor-size-group">
          <template x-for="s in [3, 6, 12]" :key="s">
            <button class="img-editor-size"
                    :class="{ active: imageEditor.size === s }"
                    @click="imageEditor.size = s"
                    :title="lang==='zh' ? '粗细 ' + s : 'Size ' + s">
              <span class="img-editor-size-dot"
                    :style="'width:' + s + 'px;height:' + s + 'px;'"></span>
            </button>
          </template>
        </div>
        <!-- Action group — wraps undo (and future redo) into its own
             container with a leading divider, so it reads as "global
             action", not "5th tool". `margin-left: auto` on the group
             (not the button) pushes the whole group right; the divider
             gives a clean visual break from size pickers. Undo reuses
             the .img-editor-tool class for visual parity with pen/rect/
             arrow/eraser — same 36×36 footprint + same hover/disabled
             treatment. It can never become .active so no risk of
             confusion with the soft-accent selected state. -->
        <div class="img-editor-action-group">
          <span class="img-editor-divider" aria-hidden="true"></span>
          <button class="img-editor-tool"
                  @click="undoImageEdit()"
                  :disabled="!canUndoImageEdit()"
                  :title="(lang==='zh' ? '撤销' : 'Undo') + ' (⌘Z / Ctrl+Z)'">
            <svg><use href="#i-undo"/></svg>
          </button>
        </div>
      </div>
      <div class="img-editor-foot">
        <button class="btn-ghost" @click="closeImageEditor(false)"
                x-text="lang==='zh' ? '取消' : 'Cancel'"></button>
        <button class="btn-primary" @click="closeImageEditor(true)"
                x-text="lang==='zh' ? '保存' : 'Save'"></button>
      </div>
    </div>
  </div>

  <!-- Command palette — Cmd/Ctrl+K opens, Esc closes. Fuzzy match across
       quick actions, open sessions, and currently-loaded file tree nodes.
       Backdrop click-out closes. Keyboard nav (↑/↓/Enter) handled in
       onGlobalKeyDown so the same flow works whether focus is in the
       input or anywhere else. -->
  <div class="cmd-palette-backdrop" x-show="palette.show"
       x-transition.opacity.duration.120ms
       @click.self="closePalette()">
    <div class="cmd-palette" @click.stop>
      <div class="cmd-palette-search">
        <span class="cmd-palette-search-icon">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
               stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="cmd-palette-input"
               type="text"
               x-model="palette.query"
               @input="palette.activeIndex = 0"
               @input.debounce.300ms="_fetchPaletteFiles(); _fetchPaletteMessages();"
               :placeholder="lang==='zh'
                 ? '搜索动作 / 会话 / 文件 / 历史消息…'
                 : 'Search actions / sessions / files / messages…'"
               autocomplete="off"
               autocorrect="off"
               autocapitalize="off"
               spellcheck="false" />
        <kbd class="cmd-palette-kbd-esc">esc</kbd>
      </div>
      <div class="cmd-palette-list">
        <template x-for="(item, i) in paletteItems()" :key="item.type + ':' + item.label + ':' + i">
          <div class="cmd-palette-item"
               :class="{ active: i === palette.activeIndex }"
               @mouseenter="palette.activeIndex = i"
               @click="paletteRun(item)">
            <span class="cmd-palette-item-type"
                  :class="'type-' + item.type"
                  x-text="item.type === 'act' ? (lang==='zh' ? '操作' : 'act')
                        : item.type === 'session' ? (lang==='zh' ? '会话' : 'sess')
                        : item.type === 'message' ? (lang==='zh' ? '消息' : 'msg')
                        : (lang==='zh' ? '文件' : 'file')"></span>
            <span class="cmd-palette-item-label" x-text="item.label"></span>
            <span class="cmd-palette-item-hint" x-text="item.hint || ''"></span>
          </div>
        </template>
        <div class="cmd-palette-empty"
             x-show="paletteItems().length === 0"
             x-text="lang==='zh' ? '没有匹配项' : 'No matches'"></div>
      </div>
      <div class="cmd-palette-foot">
        <span><kbd>↑</kbd><kbd>↓</kbd> <span x-text="lang==='zh' ? '导航' : 'navigate'"></span></span>
        <span><kbd>enter</kbd> <span x-text="lang==='zh' ? '执行' : 'select'"></span></span>
        <span><kbd>esc</kbd> <span x-text="lang==='zh' ? '关闭' : 'close'"></span></span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
