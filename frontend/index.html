                   elsewhere. Sibling to the streaming dot but mutually
                   exclusive — streaming has priority since "still running"
                   is the more urgent visual state. -->
              <span class="chat-tab-unread-dot"
                    x-show="isTabUnread(tid)"
                    :title="lang==='zh' ? '该会话有新回复' : 'New reply ready'"></span>
              <!-- x-show, not x-if — keeps both nodes mounted so a blur on the
                   <input> doesn't unmount the very element dispatching the
                   event (which trips an Alpine null.node bug). -->
              <span class="chat-tab-name ellipsis"
                    x-show="renamingTabId !== tid"
                    x-text="(sessions.find(s => s.id === tid)?.name) || '…'"></span>
              <input class="chat-tab-rename-input" type="text" x-model="renameDraft"
                     :data-tid="tid"
                     x-show="renamingTabId === tid"
                     @click.stop @dblclick.stop
                     @blur="commitRenameTab()"
                     @keydown.enter.prevent="commitRenameTab()"
                     @keydown.escape.prevent="cancelRenameTab()" />
              <!-- Kebab menu — only shown on mobile (CSS @media). Desktop uses
                   right-click which mobile browsers don't reliably synthesize. -->
              <button class="chat-tab-kebab" @click="showTabMenu($event, tid)"
                      :title="lang==='zh' ? '更多操作' : 'More'">⋮</button>
              <button class="chat-tab-close" @click="closeChatTab(tid, $event)"
                      :title="lang==='zh' ? '关闭 tab（中键也可）' : 'Close tab (middle-click also)'">×</button>
            </div>
          </template>
        </div>
        <div class="chat-tabs-actions">
          <!-- Per user request: top bar reduced to "history (left) + tabs
               strip (middle) + new (right)". Removed current-session chip
               (redundant once strip is visible) and outline button (moved
               to chat-pane FAB that aligns with .jump-bottom). -->
          <button class="chat-tab-new" @click="newSession()"
                  :title="t('btn.new_session')">+</button>
        </div>
      </div>

      <!-- Tab context menu (right-click). Stored in `tabCtxMenu` to avoid
           clashing with the file-tree's `ctxMenu` data (different shape). -->
      <template x-if="tabCtxMenu">
        <div class="tab-ctx-menu"
             :style="tabCtxMenuStyle()"
             @click.outside="closeTabMenu()"
             @keydown.escape.window="closeTabMenu()">
          <button @click="menuRename(tabCtxMenu && tabCtxMenu.id)"
                  x-text="lang==='zh' ? '重命名' : 'Rename'"></button>
          <button @click="menuEditPrompt(tabCtxMenu && tabCtxMenu.id)"
                  x-text="lang==='zh' ? '编辑 system prompt' : 'Edit system prompt'"></button>
          <button @click="menuClose(tabCtxMenu && tabCtxMenu.id)"
                  x-text="lang==='zh' ? '关闭 tab' : 'Close tab'"></button>
          <button @click="menuExportMarkdown(tabCtxMenu && tabCtxMenu.id)"
                  x-text="lang==='zh' ? '导出为 Markdown' : 'Export as Markdown'"></button>
          <hr/>
          <button class="danger" @click="menuDelete(tabCtxMenu && tabCtxMenu.id)"
                  x-text="lang==='zh' ? '删除会话' : 'Delete session'"></button>
        </div>
      </template>

      <!-- The legacy .session-bar (model + permission + thinking selectors)
           moved to the chat-input toolbar at the bottom (VSCode-style). -->

      <div class="chat-scroll-wrap">
        <div class="chat-body" x-ref="chatBody" @scroll="onChatScroll()" @wheel.passive="_userScrollIntent()" @touchmove.passive="_userScrollIntent()" @pointerdown.passive="_userScrollIntent()" @click="onChatClick($event)" :class="{ 'msgs-hidden': !messagesReady && messages.length }">
          <!-- Shimmer skeleton while loadSession is in-flight. Without
               this, switching to a long-history session briefly shows the
               brand-empty onboarding cards as if it were a new session. -->
          <div x-show="(messagesLoading && !messages.length) || (!messagesReady && messages.length)" class="chat-skeleton" aria-hidden="true">
            <template x-for="i in 3" :key="i">
              <div class="chat-skeleton-msg">
                <div class="chat-skeleton-avatar"></div>
                <div class="chat-skeleton-bubble">
                  <div class="chat-skeleton-line"></div>
                  <div class="chat-skeleton-line"></div>
                  <div class="chat-skeleton-line"></div>
                </div>
              </div>
            </template>
          </div>
          <div x-show="!messages.length && !messagesLoading" class="brand-empty chat-empty">
            <div class="chat-empty-typewriter"
                 x-show="!contextInfo._fetched || contextInfo.has_any_provider"
                 aria-label="我们先从哪里开始呢？">我们先从哪里开始呢？</div>
            <span class="muse-mascot lg" hidden aria-hidden="true" style="display:none"
                  :class="{'greet': mascotGreet}" @click="cycleMascot()">
              <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
            </span>
            <div class="brand-logo small" hidden aria-hidden="true" style="display:none">Muse · <span x-text="lang==='zh' ? mascot().zhName : mascot().greek"></span></div>
            <div class="brand-tagline" hidden aria-hidden="true" style="display:none">
              <span class="muse-domain" x-text="lang==='zh' ? mascot().domain.zh : mascot().domain.en"></span>
              · <span x-text="t('chat.runs_on')"></span> <span x-text="currentModelLabel()"></span>
            </div>

            <!-- Provider warn — first-priority blocker. Stays visible until
                 the user enables at least one provider in Settings. -->
            <template x-if="contextInfo._fetched && !contextInfo.has_any_provider">
              <div class="onboard-card warn">
                <div class="onboard-card-title" x-text="t('onboard.no_provider_title')"></div>
                <div class="onboard-card-body" x-text="t('onboard.no_provider_body')"></div>
                <button class="btn-primary" @click="openSettings()" x-text="t('onboard.no_provider_cta')"></button>
              </div>
            </template>

            <!-- ★ Muse opener — UI-only first bubble, state-aware (see
                 museOpener() in app.js). Doesn't go into session history,
                 doesn't cost tokens. Hides the moment the user starts
                 typing so it never competes with their own first message. -->
            <template x-if="contextInfo._fetched && contextInfo.has_any_provider && museOpener() && !input">
              <div class="muse-opener" x-transition.opacity.duration.300ms>
                <span class="muse-mascot sm">
                  <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                </span>
                <div class="muse-opener-bubble">
                  <div class="muse-opener-text" x-text="museOpener()"></div>
                  <template x-if="museOpenerAction()">
                    <button class="muse-opener-action" @click="museOpenerAction().handler()"
                            x-text="museOpenerAction().label"></button>
                  </template>
                </div>
              </div>
            </template>

            <!-- Archive subdir hints — kept as informational chips, only
                 when the user has a profile but no docs yet. Distinct from
                 the Muse opener (which is conversational); these are a
                 visual map of "where to drop your stuff". -->
            <template x-if="contextInfo.has_any_provider && contextInfo.claude_md_meaningfully_filled && contextInfo.archive_empty">
              <div class="onboard-card calm onboard-subdirs-card">
                <div class="onboard-card-body" x-text="t('onboard.empty_archive_body')"></div>
                <div class="onboard-subdirs">
                  <template x-for="sub in onboardingSubdirs()" :key="sub.name">
                    <div class="onboard-subdir">
                      <span class="onboard-subdir-name mono" x-text="sub.name + '/'"></span>
                      <span class="onboard-subdir-hint" x-text="sub.hint"></span>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- ★ Nine Muses 3×3 grid — visible whenever a provider is
                 configured, regardless of archive state. Each cell is a
                 conversation entry point: click → switch mascot + prefill
                 her invite line into the chat input. -->
            <template x-if="contextInfo._fetched && contextInfo.has_any_provider">
              <div class="muse-grid-wrap" x-show="!input"
                   x-transition.opacity.duration.300ms>
                <div class="muse-grid-divider">
                  <span x-text="t('muse_opener.divider')"></span>
                </div>
                <div class="muse-grid">
                  <template x-for="(m, i) in MASCOTS" :key="m.id">
                    <button class="muse-cell" :class="{'active': mascotIdx === i}"
                            @click="pickMascotAndAsk(i)"
                            :title="lang==='zh' ? m.zhName + '・' + m.domain.zh : m.greek + ' · ' + m.domain.en">
                      <span class="muse-cell-icon">
                        <svg viewBox="0 0 24 24"><use :href="'#m-' + m.id"/></svg>
                      </span>
                      <span class="muse-cell-name"
                            x-text="lang==='zh' ? m.zhName : m.greek"></span>
                      <span class="muse-cell-domain"
                            x-text="lang==='zh' ? m.domain.zh : m.domain.en"></span>
                      <span class="muse-cell-invite"
                            x-text="lang==='zh' ? m.invite.zh : m.invite.en"></span>
                    </button>
                  </template>
                </div>
                <!-- Skill chips — kept as a thin row below the grid for
                     users with loaded skills. Hidden when no skills. -->
                <template x-if="settings.skills && settings.skills.length">
                  <div class="onboard-skills">
                    <div class="onboard-skills-label">
                      <span x-text="t('onboard.skill_hint_count', { n: settings.skills.length })"></span>
                      <button class="onboard-skills-seeall" @click="toggleSkillsDrawer()"
                              x-text="lang==='zh' ? '查看全部 →' : 'See all →'"></button>
                    </div>
                    <div class="onboard-skills-chips">
                      <template x-for="sk in skillSuggestions()" :key="sk.name">
                        <button class="skill-chip" @click="useSuggestedPrompt(sk.prompt)"
                                :title="sk.description">
                          <span class="skill-chip-icon"><svg><use href="#i-puzzle"/></svg></span>
                          <span x-text="sk.label"></span>
                        </button>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <div class="brand-tips" x-show="input" x-transition.opacity.duration.200ms>
              <div class="brand-tip"><span x-text="t('chat.empty_tip1')"></span> <span class="kbd">Enter</span> <span x-text="t('chat.empty_tip1b')"></span></div>
              <div class="brand-tip"><span class="kbd">@</span><span x-text="t('chat.empty_tip2')"></span></div>
              <div class="brand-tip" x-text="t('chat.empty_tip3')"></div>
              <div class="brand-tip"><span class="kbd">?</span><span x-text="t('chat.empty_tip4')"></span></div>
            </div>
          </div>
          <!-- (The dedicated conv-outline-wrap I added here in eafb7ad has
               been removed in favor of the project's pre-existing
               msg-outline-modal — that's the floating round button users
               actually click. outlineMessages() now reads the same
               _backendOutline cache to stay accurate on lazy-loaded
               sessions.) -->

          <!-- Lazy-loaded history controls — sits above the message loop.
               Only shown when loadSession() deferred older messages because
               history exceeds INITIAL_LOAD. Clicking pages back in batches
               (LOAD_MORE_BATCH = 50) while preserving scroll position. -->
          <div x-show="messagesReady && (hasMoreHistory() || historyTruncated())"
               class="load-earlier-wrap">
            <button x-show="hasMoreHistory()"
                    class="load-earlier-btn"
                    @click="loadEarlierMessages()"
                    x-text="t('history.load_earlier', { n: earlierMessageCount() })"></button>
            <div x-show="historyTruncated() && !hasMoreHistory()"
                 class="load-earlier-truncated-note"
                 x-text="t('history.truncated_note')"></div>
          </div>
          <!-- Per-message rendering — Alpine 3's reactivity worked
               reliably on this flat messages x-for. The "group into
               assistant turns" experiment broke streaming reactivity
               (text chunks stopped triggering re-render unless the
               user switched tabs), so we render each msg standalone
               and use CSS adjacent selectors at the end of styles.css
               to hide the avatar on all but the FIRST assistant-side
               msg in a run — visually the same "one avatar per turn"
               result without a derived data structure. -->
          <!-- P1 (chat-perf-redesign): per-tab DOM persistence. One message
               list is rendered per OPEN tab; switching toggles x-show instead
               of swapping the array backing a single x-for (which forced a
               full Alpine teardown+rebuild of the whole subtree on every
               switch). The single message template below is UNCHANGED — it's
               just wrapped in a per-tab pane and bound to paneMessages(tid).
               For the visible pane paneMessages(currentId) === this.messages
               by identity, so every `messages`-reading binding inside stays
               correct; hidden panes are display:none so their (stale)
               result is never seen. -->
          <template x-for="tid in residentPaneIds()" :key="tid">
          <div class="msg-pane" x-show="tid === currentId">
          <template x-for="(m, i) in paneMessages(tid)" :key="m._k || m.uuid || ('m-' + i)">
            <div :class="'msg ' + (m._is_compact_summary ? 'compact' : m.role) + (isMsgRenderable(m, i) ? '' : ' is-hidden') + (m._noAnim ? ' no-anim' : '')"
                 :data-uuid="m.uuid || ''"
                 :style="'contain-intrinsic-size: auto ' + estIntrinsicH(m) + 'px'">
              <!-- compact-summary pill -->
              <template x-if="m._is_compact_summary">
                <div class="compact-summary-pill">
                  <span x-text="lang==='zh' ? '📦 上方对话已压缩 · 以下为摘要' : '📦 Conversation compacted · summary below'"></span>
                </div>
              </template>

              <!-- user message -->
              <template x-if="m.role === 'user' && !m._is_compact_summary">
                <div>
                  <div class="msg-row">
                    <span class="msg-avatar user-avatar" x-text="userAvatarText()"></span>
                    <div class="bubble user-bubble" @click="onUserBubbleClick(m)">
                      <template x-if="(m.images && m.images.length) || (m.docs && m.docs.length)">
                        <div class="user-msg-imgs">
                          <template x-for="(im, ii) in (m.images || [])" :key="'i'+ii">
                            <!-- Single root element required by x-for.
                                 imgSrc(): blob URL (live) → base64 thumb (reload) → placeholder.
                                 IMPORTANT: render the <img> ONLY when we have a real source.
                                 With :src="" the browser resolves it to the current page URL
                                 and triggers a real network request that fails (was firing
                                 [muse-capture] resource-load-failed errors in console). -->
                            <span class="user-msg-img-wrap">
                              <template x-if="im.preview || im.thumb || im.url">
                                <!-- in-bubble thumbnail prefers preview (live blob URL,
                                     freshest) > thumb (base64 thumbnail in JSONL); only
                                     falls back to full url if neither is available.
                                     Lightbox click PREFERS url (full-res original
                                     served from disk) > preview > thumb — that's the
                                     fix for "click to enlarge shows blurry upscale". -->
                                <img class="user-msg-img"
                                     :src="im.preview || (im.thumb ? 'data:image/jpeg;base64,' + im.thumb : (im.url ? im.url + '?token=' + encodeURIComponent(token) : ''))"
                                     :alt="im.name || 'image'"
                                     @click="openLightbox(
                                        im.url ? im.url + '?token=' + encodeURIComponent(token)
                                          : (im.preview || 'data:image/jpeg;base64,' + im.thumb),
                                        im.name)"
                                     :title="lang==='zh'?'点击放大':'Click to enlarge'"
                                     @error="$el.style.display='none'; $el.nextElementSibling && ($el.nextElementSibling.style.display='inline-flex')" />
                              </template>
                              <span class="user-msg-img-placeholder"
                                    :style="(im.preview || im.thumb) ? 'display:none' : 'display:inline-flex'"
                                    :title="im.mime || 'image'">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                              </span>
                            </span>
                          </template>
                          <template x-for="(doc, di) in (m.docs || [])" :key="'d'+di">
                            <span class="user-msg-doc" :title="doc.name">
                              <svg><use href="#i-file-text"/></svg>
                              <span x-text="doc.name"></span>
                            </span>
                          </template>
                        </div>
                      </template>
                      <template x-if="m._editing">
                        <div class="edit-msg-wrap">
                          <textarea class="edit-msg-ta"
                                    x-model="m._editText"
                                    x-init="$el.style.height='auto'; $el.style.height=$el.scrollHeight+'px'; $nextTick(() => { $el.focus(); const l=$el.value.length; $el.setSelectionRange(l,l); })"
                                    @input="$el.style.height='auto'; $el.style.height=$el.scrollHeight+'px'"
                                    @keydown.ctrl.enter.prevent="commitEditMessage(m)"
                                    @keydown.meta.enter.prevent="commitEditMessage(m)"
                                    @keydown.escape.prevent="cancelEditMessage(m)"></textarea>
                          <div class="edit-msg-footer">
                            <button class="btn-ghost xs" @click.stop="cancelEditMessage(m)" x-text="t('btn.cancel')"></button>
                            <button class="btn-primary xs" @click.stop="commitEditMessage(m)" x-text="t('btn.send')"></button>
                          </div>
                        </div>
                      </template>
                      <template x-if="!m._editing">
                        <span class="user-msg-text" x-html="userTextHtml(m.text)"></span>
                      </template>
                    </div>
                  </div>
                  <div class="msg-actions">
                    <button @click="copyMsg(m)" class="icon-btn sm"
                            :class="{ 'copied-flash': m._copied }"
                            :title="m._copied ? (lang==='zh'?'已复制':'Copied') : (lang==='zh'?'复制':'Copy')">
                      <svg x-show="!m._copied"><use href="#i-copy"/></svg>
                      <svg x-show="m._copied"><use href="#i-check"/></svg>
                    </button>
                    <button x-show="!streaming && !m._editing"
                            @click="startEditMessage(m)" class="icon-btn sm"
                            :title="t('btn.edit')">
                      <svg><use href="#i-edit"/></svg>
                    </button>
                    <button x-show="m._failed"
                            @click="retryFailedMessage(m)" class="icon-btn sm retry-btn"
                            :title="lang==='zh' ? '重试发送' : 'Retry'">
                      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/>
                      </svg>
                    </button>
                  </div>
                </div>
                <!-- Failed-message error card with classified CTA — only shows
                     when the backend sent kind/cta classification (modern
                     backend). Old-backend failures still get the bare ↻
                     button above. -->
                <template x-if="m._failed && m._error_cta && m._error_cta !== 'retry'">
                  <div class="err-card"
                       :class="'err-kind-' + (m._error_kind || 'unknown')">
                    <div class="err-card-body">
                      <div class="err-card-msg" x-text="m._error_text || ''"></div>
                      <div class="err-card-actions">
                        <button class="btn-primary xs"
                                @click="errorCtaInvoke(m)"
                                x-text="errorCtaLabel(m._error_kind, m._error_cta)"></button>
                        <button x-show="m._error_retryable"
                                class="btn-ghost xs"
                                @click="retryFailedMessage(m)"
                                x-text="lang==='zh' ? '直接重试' : 'Retry as-is'"></button>
                      </div>
                    </div>
                  </div>
                </template>
              </template>

              <!-- assistant text bubble — has avatar; subsequent
                   non-user msgs in the same run hide theirs via CSS. -->
              <template x-if="m.role === 'assistant' && !m._is_compact_summary">
                <div class="asst-msg-wrap">
                  <div class="msg-row">
                    <span class="msg-avatar assistant-avatar"
                          :class="{ 'is-streaming-avatar': isStreamingTurnAvatar(i) }"
                          :title="mascotLabel()">
                      <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                    </span>
                    <div class="bubble"
                         :class="{ 'is-streaming-bubble': streaming && i === messages.length - 1 }"
                         x-html="m.html || ''"></div>
                  </div>
                  <!-- Per-bubble footer removed. Time + streaming dots
                       are rendered once per turn in the turn-footer
                       at the end of the row's root div (see below) so
                       a turn made up of thinking + tool_use + tool_
                       result + assistant gets ONE timestamp at the
                       bottom, not three. -->
                  <!-- msg-actions-assistant: the assistant copy bar stays
                       visible on touch devices (no hover, no bubble-tap
                       fallback like user msgs get) — see styles.css. -->
                  <div class="msg-actions msg-actions-assistant">
                    <button @click="copyMsg(m)" class="icon-btn sm"
                            :class="{ 'copied-flash': m._copied }"
                            :title="m._copied ? (lang==='zh'?'已复制':'Copied') : (lang==='zh'?'复制':'Copy')">
                      <svg x-show="!m._copied"><use href="#i-copy"/></svg>
                      <svg x-show="m._copied"><use href="#i-check"/></svg>
                    </button>
                  </div>
                </div>
              </template>

              <!-- thinking — wrap in msg-row + spacer avatar so the
                   CSS-hidden avatar still occupies the same 32px gutter
                   and the block lines up with assistant text blocks. -->
              <template x-if="m.role === 'thinking'">
                <div class="msg-row">
                  <span class="msg-avatar assistant-avatar"
                        :class="{ 'is-streaming-avatar': isStreamingTurnAvatar(i) }"
                        :title="mascotLabel()">
                    <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                  </span>
                  <div :class="thinkingClass(i, m)">
                    <div class="thinking-head"
                         @click.stop="toggleMsgExpanded(m, i)"
                         :title="lang==='zh' ? '点击展开/折叠' : 'Click to expand / collapse'">
                      <span class="thinking-chevron">
                        <svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2">
                          <path :d="isMsgExpanded(i, m) ? 'M4 6l4 4 4-4' : 'M6 4l4 4-4 4'"/>
                        </svg>
                      </span>
                      <span class="icon"><svg><use href="#i-brain"/></svg></span>
                      <span class="thinking-label-text">thinking</span>
                      <span x-show="!isMsgExpanded(i, m)" class="thinking-preview" x-text="thinkingPreview(m)"></span>
                    </div>
                    <pre x-show="isMsgExpanded(i, m)" x-text="m.text"></pre>
                  </div>
                </div>
              </template>

              <!-- TodoWrite -->
              <template x-if="m.role === 'tool_use' && m.name === 'TodoWrite'">
                <div class="msg-row">
                  <span class="msg-avatar assistant-avatar"
                        :class="{ 'is-streaming-avatar': isStreamingTurnAvatar(i) }"
                        :title="mascotLabel()">
                    <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                  </span>
                  <div class="todo-card">
                    <div class="todo-card-head">
                      <span class="todo-card-icon"><svg><use href="#i-check-circle"/></svg></span>
                      <span class="todo-card-title" x-text="t('todo.title')"></span>
                      <span class="todo-card-count"
                            x-text="(m.todos || []).filter(td => td.status==='completed').length + ' / ' + (m.todos || []).length"></span>
                    </div>
                    <ul class="todo-list">
                      <template x-for="(td, tdi) in (m.todos || [])" :key="tdi">
                        <li :class="'todo-item todo-' + (td.status || 'pending')">
                          <span class="todo-status">
                            <svg x-show="td.status==='completed'"><use href="#i-check"/></svg>
                            <span x-show="td.status==='in_progress'" class="todo-spinner"></span>
                            <span x-show="td.status!=='completed' && td.status!=='in_progress'" class="todo-dot"></span>
                          </span>
                          <span class="todo-text" x-text="td.content || td.subject || td.description || ''"></span>
                          <span x-show="td.status==='in_progress'" class="todo-tag" x-text="t('todo.doing')"></span>
                        </li>
                      </template>
                    </ul>
                  </div>
                </div>
              </template>

              <!-- Task subagent ("Agent" is the SDK's current tool name, "Task" the legacy one) -->
              <template x-if="m.role === 'tool_use' && (m.name === 'Task' || m.name === 'Agent')">
                <div class="msg-row">
                  <span class="msg-avatar assistant-avatar"
                        :class="{ 'is-streaming-avatar': isStreamingTurnAvatar(i) }"
                        :title="mascotLabel()">
                    <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                  </span>
                  <div class="subagent-card">
                    <div class="subagent-head">
                      <span class="subagent-icon"><svg><use href="#i-tool"/></svg></span>
                      <span class="subagent-label" x-text="t('subagent.label')"></span>
                      <span class="subagent-type" x-text="(m.task && m.task.subagent_type) || 'agent'"></span>
                    </div>
                    <div class="subagent-desc" x-text="(m.task && m.task.description) || ''"></div>
                    <details class="subagent-prompt" x-show="m.task && m.task.prompt">
                      <summary x-text="t('subagent.prompt_toggle')"></summary>
                      <pre x-text="m.task && m.task.prompt"></pre>
                    </details>
                    <!-- SDK-native background-task status (run_in_background=
                         true). The task_started/progress/notification SSE
                         handlers stamp m.task_status via tool_use_id. Renders
                         ⏳ running → ✅/❌, with the SDK summary + an open-result
                         link (best-effort openByPathToasted on output_file). -->
                    <template x-if="m.task_status">
                      <div class="subagent-task"
                           :class="'is-' + (m.task_status.state || 'running')">
                        <span class="subagent-task-badge"
                              x-text="taskStatusLabel(m.task_status.state)"></span>
                        <span class="subagent-task-summary"
                              x-show="m.task_status.summary"
                              x-text="m.task_status.summary"></span>
                        <a class="subagent-task-open" href="#"
                           x-show="m.task_status.output_file"
                           @click.prevent="openTaskOutput(m.task_status)"
                           x-text="t('subagent.open_result')"></a>
                        <!-- Stop button — only while running. Backed by the
                             SDK-native stop_task control request; the card
                             flips to ⏹ when the CLI's status='stopped'
                             notification round-trips the settle path. -->
                        <a class="subagent-task-stop" href="#"
                           x-show="(m.task_status.state || 'running') === 'running' && m.task_status.task_id"
                           @click.prevent="stopBackgroundTask(m.task_status)"
                           x-text="'⏹ ' + t('subagent.stop_task')"></a>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- ExitPlanMode -->
              <template x-if="m.role === 'tool_use' && m.name === 'ExitPlanMode'">
                <div class="msg-row">
                  <span class="msg-avatar assistant-avatar"
                        :class="{ 'is-streaming-avatar': isStreamingTurnAvatar(i) }"
                        :title="mascotLabel()">
                    <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                  </span>
                  <div class="plan-card">
                    <div class="plan-head">
                      <span class="plan-icon"><svg><use href="#i-check-circle"/></svg></span>
                      <span class="plan-title" x-text="t('plan.title')"></span>
                    </div>
                    <div class="plan-body markdown-body" x-html="renderMd(m.plan || '')"></div>
                  </div>
                </div>
              </template>

              <!-- Task* family (TaskCreate / TaskUpdate / TaskStop) —
                   collapsed to single log line. Pure queries (TaskList /
                   TaskGet / TaskOutput) are hidden entirely. Adjacent task
                   lines visually fuse into a "plan panel" via CSS sibling
                   selectors (see .task-log-line + .task-log-line). -->
              <template x-if="m.role === 'tool_use' && isTaskTool(m) && shouldRenderTaskLine(m)">
                <div class="task-log-line" :class="taskLogLine(m)?.colorClass">
                  <span class="task-log-icon" x-text="taskLogLine(m)?.icon"></span>
                  <span class="task-log-verb" x-text="taskLogLine(m)?.verb"></span>
                  <span class="task-log-ref" x-show="taskLogLine(m)?.ref"
                        x-text="taskLogLine(m)?.ref"></span>
                  <span class="task-log-subject" x-show="taskLogLine(m)?.subject"
                        x-text="taskLogLine(m)?.subject"></span>
                </div>
              </template>

              <!-- default tool bubble -->
              <template x-if="m.role === 'tool_use' && m.name !== 'TodoWrite' && m.name !== 'Task' && m.name !== 'Agent' && m.name !== 'ExitPlanMode' && !isTaskTool(m)">
                <div class="msg-row">
                  <span class="msg-avatar assistant-avatar"
                        :class="{ 'is-streaming-avatar': isStreamingTurnAvatar(i) }"
                        :title="mascotLabel()">
                    <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                  </span>
                  <div class="tool"
                       :class="{ 'tool-mcp': m.name && m.name.startsWith('mcp__'), 'tool-skill': m.name === 'Skill' }">
                    <!-- MCP enhanced: emoji per known server + server · tool layout -->
                    <template x-if="m.name && m.name.startsWith('mcp__') && mcpServerInfo(m.name)">
                      <span class="tool-name">
                        <span class="tool-prefix-icon mcp-emoji"
                              x-text="mcpServerInfo(m.name).icon"></span>
                        <span class="mcp-server-label"
                              x-text="mcpServerInfo(m.name).serverLabel"></span>
                        <span class="mcp-sep">·</span>
                        <span class="mcp-tool-label"
                              x-text="mcpServerInfo(m.name).toolLabel"></span>
                      </span>
                    </template>
                    <!-- Non-MCP: original simple label -->
                    <template x-if="!(m.name && m.name.startsWith('mcp__'))">
                      <span class="tool-name">
                        <span x-show="m.name === 'Skill'" class="tool-prefix-icon"><svg><use href="#i-puzzle"/></svg></span>
                        <span x-text="renderToolName(m.name)"></span>
                      </span>
                    </template>
                    <template x-if="toolFilePath(m)">
                      <a class="tool-arg file-link" href="#"
                         :data-path="toolFilePath(m)"
                         :title="toolFilePath(m)"
                         x-text="toolFilePath(m)"></a>
                    </template>
                    <!-- MCP input preview: compact key:val · key:val list -->
                    <template x-if="!toolFilePath(m) && m.name && m.name.startsWith('mcp__') && mcpInputPreview(m)">
                      <span class="tool-arg mcp-input-preview" x-text="mcpInputPreview(m)"></span>
                    </template>
                    <template x-if="!toolFilePath(m) && !(m.name && m.name.startsWith('mcp__'))">
                      <span class="tool-arg" x-text="m.summary"></span>
                    </template>
                    <!-- SDK-native background-task status for non-subagent
                         tools (Bash run_in_background=true). Same task_status
                         contract as the subagent card: task_started/progress/
                         notification SSE handlers stamp m.task_status via
                         tool_use_id; renders ⏳ running → ✅/❌ + summary +
                         open-result link. Without this, a background Bash card
                         never flips (only the Task/Agent template had it). -->
                    <template x-if="m.task_status">
                      <span class="tool-task"
                            :class="'is-' + (m.task_status.state || 'running')">
                        <span class="tool-task-badge"
                              x-text="taskStatusLabel(m.task_status.state)"></span>
                        <span class="tool-task-summary"
                              x-show="m.task_status.summary"
                              x-text="m.task_status.summary"></span>
                        <a class="tool-task-open" href="#"
                           x-show="m.task_status.output_file"
                           @click.prevent="openTaskOutput(m.task_status)"
                           x-text="t('subagent.open_result')"></a>
                        <!-- Stop button — same contract as the subagent
                             card's: visible only while running, settles via
                             the CLI's status='stopped' notification. -->
                        <a class="tool-task-stop" href="#"
                           x-show="(m.task_status.state || 'running') === 'running' && m.task_status.task_id"
                           @click.prevent="stopBackgroundTask(m.task_status)"
                           x-text="'⏹ ' + t('subagent.stop_task')"></a>
                      </span>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Diff strip under Edit / MultiEdit / Write — code-review
                   style with red/green row backgrounds, default expanded
                   so users see the actual change immediately. Header is
                   still clickable to collapse for users who want a
                   scannable stream.
                   IMPORTANT: this template is a SIBLING of the "default tool
                   bubble" template above (not a child) because Alpine
                   <template x-if> only renders its first root element —
                   nesting two roots in one x-if silently drops the second.
                   The role guard here recovers what the parent x-if used to
                   filter for. -->
              <template x-if="m.role === 'tool_use' && ['Edit','MultiEdit','Write'].includes(m.name) && m.input && (m.input.old_string || m.input.new_string || m.input.edits || m.input.content)">
                <div class="diff-strip diff-strip-cr"
                     :class="{ 'is-collapsed': !isMsgExpanded(i, m, isLatestEditTool(i, m)) }">
                  <div class="diff-strip-head" @click.stop="toggleMsgExpanded(m, i)">
                    <span class="thinking-chevron">
                      <svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2">
                        <path :d="isMsgExpanded(i, m, isLatestEditTool(i, m)) ? 'M4 6l4 4 4-4' : 'M6 4l4 4-4 4'"/>
                      </svg>
                    </span>
                    <span class="diff-strip-label" x-text="lang==='zh' ? '改动预览' : 'diff'"></span>
                    <template x-if="editDiffStats(m)">
                      <span class="diff-strip-stats">
                        <span x-show="(editDiffStats(m)?.plus ?? 0) > 0"
                              class="diff-strip-plus" x-text="'+' + (editDiffStats(m)?.plus ?? 0)"></span>
                        <span x-show="(editDiffStats(m)?.minus ?? 0) > 0"
                              class="diff-strip-minus" x-text="'−' + (editDiffStats(m)?.minus ?? 0)"></span>
                      </span>
                    </template>
                  </div>
                  <div x-show="isMsgExpanded(i, m, isLatestEditTool(i, m))" class="diff-body diff-body-cr">
                    <template x-for="(op, oi) in editDiffOps(m)" :key="oi">
                      <div :class="'diff-line diff-' + op.op">
                        <span class="diff-sign" x-text="op.op === 'ins' ? '+' : op.op === 'del' ? '−' : op.op === 'sep' ? '⋯' : ' '"></span>
                        <span class="diff-text" x-text="op.text"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- tool_result — suppressed for:
                   - Task*       (log line above already shows state change)
                   - Edit / Write / MultiEdit on success (diff strip shows
                     the change; "File has been updated successfully" is
                     pure noise to the user).
                   Failures (is_error) always render so the user sees
                   what broke + the errorFixHint banner. -->
              <template x-if="m.role === 'tool_result' && !shouldHideToolResult(m)">
                <div class="msg-row">
                  <span class="msg-avatar assistant-avatar"
                        :class="{ 'is-streaming-avatar': isStreamingTurnAvatar(i) }"
                        :title="mascotLabel()">
                    <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                  </span>
                  <div :class="toolResultClass(i, m)">
                    <div class="tool-result-head"
                         @click.stop="toggleMsgExpanded(m, i)"
                         :title="lang==='zh' ? '点击展开/折叠' : 'Click to expand / collapse'">
                      <span class="thinking-chevron">
                        <svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2">
                          <path :d="isMsgExpanded(i, m) ? 'M4 6l4 4 4-4' : 'M6 4l4 4-4 4'"/>
                        </svg>
                      </span>
                      <span x-show="!isMsgExpanded(i, m)" class="tool-result-summary"
                            x-text="toolResultSummary(m, i)"></span>
                    </div>
                    <!-- Error hint banner — shown for failed tool calls when
                         we can detect a common pattern + give a fix. Only
                         visible when the user explicitly expands the result;
                         collapsed state should stay quiet. -->
                    <template x-if="m.is_error && errorFixHint(m) && isMsgExpanded(i, m)">
                      <div class="tool-error-hint">
                        <span class="tool-error-hint-icon">💡</span>
                        <span class="tool-error-hint-text" x-text="errorFixHint(m)"></span>
                      </div>
                    </template>
                    <!-- expanded body: per-tool renderer takes precedence,
                         falls back to plain text for unknown tool types -->
                    <template x-if="isMsgExpanded(i, m)">
                      <div class="tool-result-body">
                        <!-- Bash: terminal-style w/ stdout / stderr split -->
                        <template x-if="toolResultKind(m) === 'bash'">
                          <div class="bash-term">
                            <template x-if="bashResultText(m).stdout">
                              <pre class="bash-stdout" x-text="bashResultText(m).stdout"></pre>
                            </template>
                            <template x-if="bashResultText(m).stderr">
                              <pre class="bash-stderr" x-text="bashResultText(m).stderr"></pre>
                            </template>
                            <template x-if="bashResultText(m).interrupted">
                              <div class="bash-meta interrupted">
                                <svg class="bash-meta-icon"><use href="#i-alert-triangle"/></svg>
                                <span x-text="lang==='zh' ? '被打断' : 'interrupted'"></span>
                              </div>
                            </template>
                            <template x-if="typeof bashResultText(m).exit_code === 'number'">
                              <div class="bash-meta" :class="{ ok: bashResultText(m).exit_code === 0, err: bashResultText(m).exit_code !== 0 }"
                                   x-text="(lang==='zh' ? '退出码 ' : 'exit ') + bashResultText(m).exit_code"></div>
                            </template>
                          </div>
                        </template>
                        <!-- Read: line-numbered gutter -->
                        <template x-if="toolResultKind(m) === 'read'">
                          <div class="read-gutter">
                            <template x-for="(row, ri) in readResultLines(m)" :key="ri">
                              <div class="read-row">
                                <span class="read-lineno" x-text="row.n || ''"></span>
                                <span class="read-code" x-text="row.content"></span>
                              </div>
                            </template>
                          </div>
                        </template>
                        <!-- WebFetch / WebSearch: card w/ source badge on top -->
                        <template x-if="toolResultKind(m) === 'web'">
                          <div class="web-card">
                            <template x-if="findToolUseFor(m, i) && webSourceUrl(findToolUseFor(m, i))">
                              <div class="web-source">
                                <span class="web-source-icon"
                                      x-text="webIsUrl(webSourceUrl(findToolUseFor(m, i))) ? '🔗' : '🔍'"></span>
                                <template x-if="webIsUrl(webSourceUrl(findToolUseFor(m, i)))">
                                  <a class="web-source-link"
                                     :href="webSourceUrl(findToolUseFor(m, i))"
                                     target="_blank" rel="noopener"
                                     x-text="webSourceDomain(webSourceUrl(findToolUseFor(m, i)))"></a>
                                </template>
                                <template x-if="!webIsUrl(webSourceUrl(findToolUseFor(m, i)))">
                                  <span class="web-source-query"
                                        x-text="webSourceUrl(findToolUseFor(m, i))"></span>
                                </template>
                              </div>
                            </template>
                            <div class="web-card-body" x-html="toolResultMd(m)"></div>
                          </div>
                        </template>
                        <!-- Glob / Grep: parsed hits with clickable file paths -->
                        <template x-if="toolResultKind(m) === 'search'">
                          <div class="search-hits-list">
                            <template x-for="(hit, hi) in searchHitsFor(m).slice(0, 100)" :key="hi">
                              <div class="search-hit">
                                <template x-if="hit.path">
                                  <a class="search-hit-path file-link" href="#"
                                     :data-path="hit.path"
                                     :title="hit.path"
                                     x-text="hit.path"></a>
                                </template>
                                <template x-if="hit.lineno !== null">
                                  <span class="search-hit-lineno" x-text="':' + hit.lineno"></span>
                                </template>
                                <template x-if="hit.content">
                                  <span class="search-hit-content" x-text="hit.content"></span>
                                </template>
                                <template x-if="!hit.path && !hit.content">
                                  <span class="search-hit-raw" x-text="hit.raw"></span>
                                </template>
                              </div>
                            </template>
                            <template x-if="searchHitsFor(m).length > 100">
                              <div class="search-hit-truncated"
                                   x-text="(lang==='zh' ? '… 还有 ' : '… ') + (searchHitsFor(m).length - 100) + (lang==='zh' ? ' 项匹配未显示' : ' more matches not shown')"></div>
                            </template>
                          </div>
                        </template>
                        <!-- MCP tool: smart render based on detected result shape.
                             - Array of objects → bullet list of compact JSON
                             - Object → pretty-printed JSON block
                             - Plain text → markdown-rendered card (a lot of
                               MCP servers return human prose, not data) -->
                        <template x-if="toolResultKind(m) === 'mcp'">
                          <div class="mcp-result-wrap">
                            <template x-if="mcpResultFormatted(m).kind === 'array'">
                              <ul class="mcp-result-list">
                                <template x-for="(item, idx) in mcpResultFormatted(m).value.slice(0, 50)" :key="idx">
                                  <li class="mcp-result-item">
                                    <span class="mcp-result-idx" x-text="'#' + (idx + 1)"></span>
                                    <pre class="mcp-result-item-body" x-text="typeof item === 'string' ? item : JSON.stringify(item, null, 2)"></pre>
                                  </li>
                                </template>
                                <template x-if="mcpResultFormatted(m).value.length > 50">
                                  <li class="mcp-result-truncated"
                                      x-text="(lang==='zh' ? '… 还有 ' : '… ') + (mcpResultFormatted(m).value.length - 50) + (lang==='zh' ? ' 条结果未显示' : ' more results not shown')"></li>
                                </template>
                              </ul>
                            </template>
                            <template x-if="mcpResultFormatted(m).kind === 'object'">
                              <pre class="mcp-result mcp-result-json" x-text="mcpResultFormatted(m).value"></pre>
                            </template>
                            <template x-if="mcpResultFormatted(m).kind === 'text'">
                              <div class="mcp-result-text" x-html="mdRender(mcpResultFormatted(m).value)"></div>
                            </template>
                          </div>
                        </template>
                        <!-- Fallback: plain text body -->
                        <template x-if="!toolResultKind(m)">
                          <pre x-text="toolResultBodyText(m)"></pre>
                        </template>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- system_note -->
              <template x-if="m.role === 'system_note'">
                <div class="sys-note" x-text="m.text"></div>
              </template>

              <!-- ask_user_question -->
              <template x-if="m.role === 'ask_user_question'">
                <div class="msg-row">
                  <span class="msg-avatar assistant-avatar"
                        :class="{ 'is-streaming-avatar': isStreamingTurnAvatar(i) }"
                        :title="mascotLabel()">
                    <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                  </span>
                  <div class="ask-question">
                    <div class="ask-header">
                      <span class="ask-title" x-text="t('ask.title')"></span>
                      <span x-show="m.submitted" class="ask-submitted-tag" x-text="t('ask.submitted')"></span>
                    </div>
                    <template x-for="(q, qIdx) in (m.questions || [])" :key="qIdx">
                      <div class="ask-question-block">
                        <div class="ask-question-head">
                          <span x-show="q.header" class="ask-question-chip" x-text="q.header"></span>
                          <span class="ask-question-text" x-text="q.question"></span>
                          <span x-show="q.multiSelect" class="ask-multi-tag" x-text="t('ask.multi')"></span>
                        </div>
                        <!-- Render normalized options. The label is computed
                             via askOptionLabel() instead of `opt.label` directly
                             so an old backend (pre-normalize) that forwarded
                             raw model output as `["a","b"]` / `[{text:"a"}]`
                             still produces clickable buttons. New backends
                             normalize this in ask_user_question.py — this is
                             belt+suspenders for "user is running new frontend
                             against old backend" scenarios. -->
                        <div class="ask-options">
                          <!-- role="button" instead of <button> tag because
                               the option may contain a markdown <div> preview;
                               <button><div></div></button> is invalid HTML5
                               (button only allows phrasing content) and some
                               browsers / touch contexts intermittently swallow
                               the click — symptom: card renders, click does
                               nothing, user "can't select" (reproduced
                               2026-05-21 / 2026-05-23). Div + role="button" +
                               keydown handlers preserve a11y while avoiding
                               the nesting trap. -->
                          <template x-for="(opt, optIdx) in (q.options || [])" :key="optIdx">
                            <div class="ask-option"
                                 role="button"
                                 :tabindex="m.submitted ? -1 : 0"
                                 :aria-disabled="m.submitted"
                                 :aria-pressed="isAskOptionPicked(m, qIdx, askOptionLabel(opt))"
                                 :class="{ picked: isAskOptionPicked(m, qIdx, askOptionLabel(opt)), disabled: m.submitted, 'has-preview': !!(opt && opt.preview) }"
                                 @click="m.submitted ? null : (q.multiSelect ? toggleAskOption(m, qIdx, askOptionLabel(opt)) : pickAskOption(m, qIdx, askOptionLabel(opt)))"
                                 @keydown.enter.prevent="m.submitted ? null : (q.multiSelect ? toggleAskOption(m, qIdx, askOptionLabel(opt)) : pickAskOption(m, qIdx, askOptionLabel(opt)))"
                                 @keydown.space.prevent="m.submitted ? null : (q.multiSelect ? toggleAskOption(m, qIdx, askOptionLabel(opt)) : pickAskOption(m, qIdx, askOptionLabel(opt)))">
                              <div class="ask-option-label" x-text="askOptionLabel(opt)"></div>
                              <div x-show="askOptionDesc(opt)" class="ask-option-desc" x-text="askOptionDesc(opt)"></div>
                              <!-- Optional preview (markdown / mockup / code).
                                   Model can attach rich context via the SDK's
                                   AskUserQuestion.options[].preview field; we
                                   render it as a collapsed footnote that opens
                                   in place when the option is focused / hovered. -->
                              <div x-show="opt && opt.preview"
                                   class="ask-option-preview"
                                   x-html="mdRender(opt && opt.preview || '')"></div>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                    <div x-show="(m.questions || []).some(q => q.multiSelect) && !m.submitted && !m.askOtherOpen" class="ask-submit-row">
                      <button class="btn-primary" @click="submitAskAnswers(m)" x-text="t('ask.submit')"></button>
                    </div>
                    <!-- Free-text fallback. The MCP tool only lets the model
                         offer 2-4 fixed options; sometimes none fit and the
                         user wants to say something else. Claude Code's
                         AskUserQuestion has an implicit "Other" for the same
                         reason — without it the question is a forced choice
                         and the user has to either pick a wrong-ish option
                         or wait 10 min for the 600 s timeout to bail. Click
                         "其他" → inline textarea → submit routes the text
                         through /api/chat/answer the same way the buttons do,
                         so the model sees it as a normal tool result. -->
                    <div class="ask-other-section" x-show="!m.submitted">
                      <button x-show="!m.askOtherOpen"
                              class="ask-other-toggle"
                              @click="openAskOther(m)"
                              x-text="lang==='zh' ? '其他（自由输入）' : 'Other (custom answer)'"></button>
                      <div x-show="m.askOtherOpen" class="ask-other-form">
                        <textarea x-model="m.askOtherText"
                                  class="ask-other-textarea"
                                  rows="3"
                                  :placeholder="lang==='zh' ? '直接写你的回复…' : 'Type your reply…'"
                                  @keydown.escape.stop="cancelAskOther(m)"
                                  @keydown.meta.enter.prevent="submitAskOther(m)"
                                  @keydown.ctrl.enter.prevent="submitAskOther(m)"></textarea>
                        <div class="ask-other-actions">
                          <button class="ask-other-cancel" @click="cancelAskOther(m)"
                                  x-text="lang==='zh' ? '取消' : 'Cancel'"></button>
                          <button class="btn-primary" @click="submitAskOther(m)"
                                  :disabled="!(m.askOtherText || '').trim()"
                                  x-text="lang==='zh' ? '提交' : 'Submit'"></button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </template>

              <!-- permission_request -->
              <template x-if="m.role === 'permission_request'">
                <div class="msg-row">
                  <span class="msg-avatar assistant-avatar"
                        :class="{ 'is-streaming-avatar': isStreamingTurnAvatar(i) }"
                        :title="mascotLabel()">
                    <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                  </span>
                  <div class="perm-request" :class="{ resolved: m.resolved }">
                    <!-- Compact tool card: tool name + decision tag on top
                         line (mirrors Read/Grep/Edit tool bubble layout),
                         summary below. The previous `.perm-header` row
                         (containing "Muse 想用一个工具" + a hero wrench
                         icon) was hero-treatment overkill — especially in
                         bypass mode where the card lands in the stream
                         already resolved and the user doesn't need a big
                         decision prompt. See plan
                         ~/.claude/plans/permission-claude-smooth-codd.md. -->
                    <div class="perm-body">
                      <div class="perm-tool">
                        <span class="perm-tool-name" x-text="m.tool"></span>
                        <span x-show="m.resolved" class="perm-decision-tag"
                              :class="'perm-decision-' + m.decision"
                              x-text="t('perm.decision_' + m.decision)"></span>
                      </div>
                      <pre class="perm-summary" x-text="m.summary"></pre>
                    </div>
                    <div class="perm-actions" x-show="!m.resolved">
                      <button class="btn-deny" @click="decidePermission(m, 'deny')" x-text="t('perm.deny')"></button>
                      <button class="btn-allow" @click="decidePermission(m, 'allow')" x-text="t('perm.allow')"></button>
                      <button class="btn-always" @click="decidePermission(m, 'always')" x-text="t('perm.always')"></button>
                    </div>
                  </div>
                </div>
              </template>

              <!-- Per-turn footer. A "turn" here = a contiguous run of
                   muse-side messages between two user messages. The
                   tail message of that run carries the footer; every
                   other message has it display:none. The footer hosts
                   BOTH the streaming dots (while in flight) and the
                   HH:MM completion stamp (once done) — so a multi-
                   block turn (thinking + tool_use + assistant + …)
                   shows ONE indicator at the bottom of the whole run,
                   not one per block.

                   Uses x-show (not <template x-if>) intentionally:
                   nesting x-if inside x-for had reactivity glitches
                   where isTurnTail() wasn't re-evaluated on push to
                   the messages array, leaving previous turn-tails
                   stuck "showing" or new ones never appearing. x-show
                   keeps the DOM node always present and only toggles
                   display, which Alpine handles reliably per-frame. -->
              <!-- Inline expression instead of method call so Alpine
                   tracks reactive deps (m.role / messages[i+1].role /
                   messages.length) directly — method calls aren't
                   guaranteed to wire up reactivity inside x-for. -->
              <div class="turn-footer"
                   x-show="m.role !== 'user' && (i === messages.length - 1 || (messages[i + 1] && messages[i + 1].role === 'user'))"
                   aria-hidden="true">
                <span x-show="streaming && i === messages.length - 1"
                      class="thinking-dots">
                  <span></span><span></span><span></span>
                </span>
                <!-- Elapsed counter next to the streaming dots — kicks in
                     after 1s so fast replies don't flash a "0s" label.
                     Format: 12s / 2m50s / 1h05m (see fmtStreamElapsed). -->
                <span x-show="streaming && i === messages.length - 1 && streamElapsed >= 1"
                      class="stream-elapsed"
                      x-text="fmtStreamElapsed(streamElapsed)"></span>
                <span x-show="m.ts && !(streaming && i === messages.length - 1)"
                      class="msg-ts" :title="m.model || ''"
                      x-text="fmtTurnTime(m.ts)"></span>
                <!-- Total elapsed kept after done so the user can
                     reference back how long the turn took (esp. useful
                     for long agentic runs). Stamped in _markDone next
                     to .ts; only shown when both exist and m.elapsed
                     >= 1s (sub-second replies don't need the noise). -->
                <span x-show="m.elapsed && m.ts && !(streaming && i === messages.length - 1)"
                      class="msg-elapsed"
                      x-text="'· ' + fmtStreamElapsed(m.elapsed)"></span>
              </div>
            </div>
          </template>
          </div>
          </template>
          <!-- /P1 per-tab message panes. Siblings below (pending bubble,
               pending queue, banners) stay single-instance with active-tab
               semantics — they read currentId / this.messages / streaming,
               which already track the active tab. -->
          <!-- Pending "Muse 正在思考" bubble — only while we're waiting for
               the very first chunk. Once a streaming assistant message has
               started accumulating text (its bubble is already rendered
               above via the x-for), this pending placeholder must hide or
               we get two stacked bubbles with overlapping model labels. -->
          <!-- Pending bubble: shown only when streaming AND there's no
               assistant-side msg yet (i.e. last msg is the user's
               input, or the message list is empty). Simpler than the
               old "role NOT in [assistant, tool_use, tool_result,
               thinking]" exclusion list — that list missed ask_user_
               question / permission_request / system_note, leaving
               the pending bubble's avatar duplicated next to those
               msgs' own avatars. Now: any non-user last msg already
               has its own avatar — suppress pending. -->
          <div x-show="streaming && (!messages.length
                                       || messages[messages.length-1].role === 'user')"
               class="msg assistant">
            <div class="msg-row">
              <span class="msg-avatar assistant-avatar is-streaming-avatar" :title="mascotLabel()">
                <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
              </span>
              <div class="bubble pending">
                <span class="thinking-dots"><span></span><span></span><span></span></span>
                <span class="thinking-label">
                  <span x-text="t('chat.thinking') + ' · ' + modelLabel(streamingModel)"></span>
                  <!-- 2026-05-23: 用统一 fmtStreamElapsed（"12s"/"2m50s"/"1h05m"），
                       跟下方 turn-footer 一致；之前是 `12.3s` 一种格式，长 turn
                       会变 187.4s 这种难读的大数字。-->
                  <span x-show="streamElapsed > 1" class="stream-elapsed"
                        x-text="' · ' + fmtStreamElapsed(streamElapsed)"></span>
                </span>
              </div>
            </div>
          </div>

          <!-- Standalone .streaming-tail removed — its job is now done
               by .turn-footer inside the x-for loop, which renders on
               the tail block of each turn and shows dots while
               streaming + HH:MM once done. -->

          <!-- Pending queue: messages the user sent while Muse was still
               replying (or while a compact was running). They auto-drain on
               the next done event / compact-finally / activateTab. Faded
               + dashed border distinguishes them from real user bubbles. -->
          <template x-for="(q, qi) in (tabState[currentId] && tabState[currentId].pendingQueue || [])"
                    :key="q.id">
            <div class="msg user queued">
              <div class="msg-row queued-row">
                <div class="bubble user-bubble queued-bubble">
                  <div class="queued-header">
                    <span class="queued-icon"><svg><use href="#i-clock"/></svg></span>
                    <!-- "/N" uses _currentQueueLen() (which guards
                         tabState[currentId] being undefined) instead of
                         tabState[currentId].pendingQueue.length directly:
                         during a tab switch, Alpine briefly re-evaluates
                         this child binding while currentId already points
                         at a fresh-but-uninitialized tabState entry,
                         which threw "undefined is not an object" in the
                         wild (reported via /api/log/client-error
                         2026-05-22). -->
                    <span class="queued-label"
                          x-text="(lang==='zh' ? '已排队 ' : 'Queued ') + (qi+1) + ' / '
                                   + _currentQueueLen()"></span>
                    <span style="flex:1"></span>
                    <button class="queued-act icon-btn sm"
                            @click="editPendingQueueItem(currentId, qi)"
                            :title="lang==='zh' ? '编辑' : 'Edit'">
                      <svg><use href="#i-edit"/></svg>
                    </button>
                    <button class="queued-act icon-btn sm"
                            @click="removePendingQueueItem(currentId, qi)"
                            :title="lang==='zh' ? '移除' : 'Remove'">
                      <svg><use href="#i-x"/></svg>
                    </button>
                  </div>
                  <div class="queued-text" x-show="q.text" x-text="q.text"></div>
                  <!-- FIX ③: the server resolves queued upload IDs against its
                       in-memory store, so we can render real image thumbnails
                       and named doc chips here — matching how a SENT message
                       looks, instead of the old neutral "含附件" marker.
                       Expired uploads (TTL) show a muted "附件已过期" chip. -->
                  <div class="queued-attach" x-show="q.hasAttach">
                    <template x-for="(im, ii) in (q.images || [])" :key="'qimg'+ii">
                      <img class="queued-thumb" :src="im.src" loading="lazy" alt=""
                           @error="$el.style.display='none'" />
                    </template>
                    <template x-for="(d, di) in (q.docs || [])" :key="'qdoc'+di">
                      <span class="queued-doc-chip" :title="d.name + ' · ' + d.kind">
                        <svg><use href="#i-file-text"/></svg>
                        <span x-text="d.name"></span>
                      </span>
                    </template>
                    <span class="queued-doc-chip queued-attach-expired"
                          x-show="q.expiredCount > 0">
                      <svg><use href="#i-alert-triangle"/></svg>
                      <span x-text="lang==='zh' ? '附件已过期' : 'attachment expired'"></span>
                    </span>
                    <!-- Fallback: ids present but metadata not yet resolved
                         (e.g. mid tab-switch before the queue sync lands). -->
                    <span class="queued-doc-chip"
                          x-show="!(q.images && q.images.length) && !(q.docs && q.docs.length) && !q.expiredCount">
                      <svg><use href="#i-paperclip"/></svg>
                      <span x-text="lang==='zh' ? '含附件' : 'has attachment'"></span>
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <!-- Idle-with-items banner. Shows whenever the queue has items but
               nothing is running on this session (not streaming, not
               compacting, not mid-reattach). Two reasons this happens:
                 1. An error / interrupt paused the queue server-side
                    (_queuePaused) — the user fixes the root cause then resumes.
                 2. Items left dormant after a process restart — the server
                    intentionally does NOT auto-resume draining on boot, so
                    they wait here for an explicit Resume.
               While a turn is running, items just auto-drain server-side and
               this banner stays hidden. -->
          <div x-show="tabState[currentId]
                        && tabState[currentId].pendingQueue
                        && tabState[currentId].pendingQueue.length
                        && !streaming
                        && !(tabState[currentId].compacting)
                        && !(tabState[currentId]._draining)"
               class="queue-paused-banner">
            <span class="queue-paused-icon"><svg><use href="#i-alert-triangle"/></svg></span>
            <span class="queue-paused-text"
                  x-text="((tabState[currentId] && tabState[currentId]._queuePaused)
                            ? (lang==='zh' ? '上一条中断，队列已暂停（' : 'Queue paused (')
                            : (lang==='zh' ? '队列等待中（' : 'Queue waiting (' ))
                          + ((tabState[currentId] && tabState[currentId].pendingQueue
                              && tabState[currentId].pendingQueue.length) || 0)
                          + (lang==='zh' ? ' 条）' : ' waiting)')"></span>
            <button class="queue-paused-btn primary"
                    @click="resumeQueueDrain(currentId)"
                    x-text="lang==='zh' ? '继续执行' : 'Resume'"></button>
            <button class="queue-paused-btn"
                    @click="discardQueue(currentId)"
                    x-text="lang==='zh' ? '清空队列' : 'Discard'"></button>
          </div>

          <!-- Compact-in-progress placeholder bubble. Mirrors the streaming
               pending bubble above so the user sees a familiar "something is
               working" cue at the bottom of the chat (not just the silent
               shimmer in the top ctx-meter). Appears for the full window
               between native-compact POST and loadSession completing — can
               be ~20-60s on a long session. -->
          <div x-show="tabState[currentId] && tabState[currentId].compacting" class="msg assistant compact-pending">
            <div class="msg-row">
              <span class="msg-avatar assistant-avatar is-streaming-avatar" :title="mascotLabel()">
                <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
              </span>
              <div class="bubble pending">
                <span class="compact-pending-icon"><svg><use href="#i-package"/></svg></span>
                <span class="thinking-dots"><span></span><span></span><span></span></span>
                <span class="thinking-label" x-text="lang==='zh' ? '压缩对话中…' : 'Compacting conversation…'"></span>
              </div>
            </div>
          </div>
        </div>
        <button class="jump-bottom" x-show="!atBottom" @click="scrollToBottom(true)" :title="lang==='zh'?'最新':'Jump to latest'" :aria-label="lang==='zh' ? '跳到最新消息' : 'Jump to latest'"><svg><use href="#i-arrow-down"/></svg></button>
        <!-- Outline FAB — sits right above jump-bottom in the same chat
             pane. Same visibility rule as jump-bottom (x-show="!atBottom")
             so the two appear/disappear together as a pair. -->
        <button class="chat-outline-fab" x-show="!atBottom"
                @click="msgOutlineOpen = true"
                :title="lang==='zh' ? '会话目录' : 'Outline'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <circle cx="4" cy="6" r="1" fill="currentColor"/>
            <circle cx="4" cy="12" r="1" fill="currentColor"/>
            <circle cx="4" cy="18" r="1" fill="currentColor"/>
          </svg>
        </button>
        <!-- Prev-user FAB — top of the chat-pane stack, sits 46px above
             the outline FAB. Steps the viewport up to the previous user
             message so you can walk back through your own turns. Shares
             the trio's x-show="!atBottom" visibility. -->
        <button class="chat-prevuser-fab" x-show="!atBottom" @click="jumpToPrevUser()"
                :title="lang==='zh' ? '上一条提问' : 'Previous message'"
                :aria-label="lang==='zh' ? '跳到上一条用户消息' : 'Jump to previous user message'"><svg><use href="#i-arrow-up"/></svg></button>
      </div>

      <div class="chat-input">
        <!-- / slash command palette -->
        <div class="mention-pop slash-pop" x-show="slashShow" x-transition.opacity>
          <div class="mention-hint" x-text="t('slash.hint')"></div>
          <template x-for="(c, i) in slashResults" :key="c.name">
            <div :class="'mention-item ' + (slashIdx===i?'sel':'')"
                 @mousedown.prevent="pickSlash(i)" @mouseenter="slashIdx=i">
              <span class="slash-name mono" x-text="'/' + c.name"></span>
              <span class="slash-desc" x-text="c.desc[lang] || c.desc.zh"></span>
            </div>
          </template>
          <div class="hint-row" x-show="!slashResults.length" x-text="t('slash.none')"></div>
        </div>
        <!-- @ mention -->
        <div class="mention-pop" x-show="mentionShow" x-transition.opacity>
          <div class="mention-hint" x-html="lang==='zh' ? '<span class=&quot;kbd&quot;>↑↓</span> 选 · <span class=&quot;kbd&quot;>Enter</span> 插入 · <span class=&quot;kbd&quot;>Esc</span> 关' : '<span class=&quot;kbd&quot;>↑↓</span> nav · <span class=&quot;kbd&quot;>Enter</span> insert · <span class=&quot;kbd&quot;>Esc</span> close'"></div>
          <template x-for="(f, i) in mentionResults" :key="f.path">
            <div :class="'mention-item ' + (mentionIdx===i?'sel':'') + (f._open?' is-open':'')"
                 :title="f.path"
                 @mousedown.prevent="pickMention(i)" @mouseenter="mentionIdx=i">
              <span class="icon"><svg><use :href="iconRef(f)"/></svg></span>
              <div class="body">
                <div class="name-row">
                  <span class="name ellipsis" x-text="f.name"></span>
                  <span x-show="f._open" class="mention-open-badge"
                        x-text="lang==='zh' ? '已打开' : 'open'"></span>
                </div>
                <div class="path-hint ellipsis" x-text="f.path"></div>
              </div>
            </div>
          </template>
          <div class="hint-row" x-show="!mentionResults.length" x-text="t('files.empty_search')"></div>
        </div>
        <!-- Attachment preview row (above input). -->
        <!-- Pending attachment chips. Upload starts eagerly the moment the
             file is picked / pasted / dropped — by the time the user finishes
             typing it's almost always done. We deliberately DON'T render an
             "uploading…" spinner: the spinner used to make the chip feel like
             a separate uploading step before send, when in fact send-time
             auto-wait (sendMessage) already handles the rare case where the
             upload is still in flight. Only the .error state gets a visual —
             a red border via .img-chip.error / .doc-chip.error in styles.css. -->
        <div class="img-attachments" x-show="pendingImages.length || pendingDocs.length">
          <template x-for="(img, i) in pendingImages" :key="img.id || ('i'+i)">
            <div class="img-chip" :class="{ uploading: img.uploading, error: img.error }">
              <!-- empty :src would resolve to page URL and fail (see queued-img guard) -->
              <img :src="img.preview || 'data:image/gif;base64,R0lGODlhAQABAAAAACw='"
                   alt="" :style="img.preview ? '' : 'opacity:0.3'" />
