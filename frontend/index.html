              <!-- "Annotate" button — opens the image editor over this image.
                   Disabled while the chip is still uploading so we don't lose
                   the user's edits if the upload errors out mid-edit. -->
              <button class="img-chip-edit icon-btn sm"
                      @click="openImageEditor(i)"
                      :disabled="img.uploading || !img.file"
                      :title="lang==='zh' ? '画笔编辑' : 'Annotate'">
                <svg><use href="#i-pen"/></svg>
              </button>
              <button class="img-chip-x icon-btn sm"
                      @click="removePendingImage(i)" :title="t('img.remove')">
                <svg><use href="#i-x"/></svg>
              </button>
              <!-- Slim animated progress bar at the chip's bottom edge.
                   Replaces the previous big spinning overlay (user wanted
                   the chip to feel "uploaded" instantly); a hairline gives
                   the necessary feedback on slow / large uploads without
                   reading as a separate processing step. Disappears the
                   moment upload completes or errors out. -->
              <div x-show="img.uploading" class="chip-upload-bar"></div>
            </div>
          </template>
          <template x-for="(doc, i) in pendingDocs" :key="doc.id || ('d'+i)">
            <div class="doc-chip" :class="{ uploading: doc.uploading, error: doc.error }"
                 :title="doc.name + ' · ' + doc.kind">
              <span class="doc-chip-icon"><svg><use href="#i-file-text"/></svg></span>
              <div class="doc-chip-body">
                <div class="doc-chip-name" x-text="doc.name"></div>
                <div class="doc-chip-kind" x-text="doc.kind"></div>
              </div>
              <button class="doc-chip-x icon-btn sm"
                      @click="removePendingDoc(i)" :title="t('img.remove')">
                <svg><use href="#i-x"/></svg>
              </button>
              <div x-show="doc.uploading" class="chip-upload-bar"></div>
            </div>
          </template>
        </div>
        <!-- VSCode-Claude–style layout:
             row 1: textarea (full width, no neighbors)
             row 2: bottom toolbar with all controls — attach / model /
                    permission / thinking / ctx chip / send -->
        <div class="chat-input-wrap"
             @dragover.prevent="dragHover=true"
             @dragleave="dragHover=false"
             @drop.prevent="dragHover=false; onAttachDrop($event)"
             :class="{ 'drag-hover': dragHover }">
          <!-- No `accept` filter — lets the user pick any file from the OS
               picker. The classifier (frontend + backend) decides what
               actually gets inlined; unsupported types are rejected with
               a clear toast instead of being hidden in the picker. -->
          <input type="file" x-ref="attachInput"
                 multiple style="display:none" @change="onAttachPicked($event)" />
          <!-- No-provider gate banner: when no model is configured the
               composer below is disabled (every send would 401 + lock the
               session to an unreachable model). Point the user at Settings
               so a provider is configured before any turn can fire. -->
          <!-- Two distinct empty states, same `!availableModels.length` gate:
               · has_any_provider=false → genuinely nothing configured.
               · has_any_provider=true  → a provider IS configured (e.g. a
                 third-party key) but no model is ready yet — credentials
                 incomplete or still validating. The old single copy ("配置一个
                 provider") misled users who *had* configured one (2026-06-06).
               No "switch model" CTA here: availableModels is empty, so there's
               nothing to switch to — the fix is to check credentials. -->
          <div class="chat-input-noprov" x-show="!availableModels.length" x-cloak>
            <span x-text="(contextInfo && contextInfo.has_any_provider)
                            ? (lang==='zh'
                                ? '已配置 provider，但当前没有可用模型 —— 凭证可能未填全或仍在校验，打开设置检查一下'
                                : 'A provider is configured, but no model is ready yet — credentials may be incomplete or still validating. Open Settings to check.')
                            : (lang==='zh'
                                ? '还没有可用模型 —— 先配置一个 provider 才能开始对话'
                                : 'No model available — configure a provider to start chatting')"></span>
            <button class="btn-primary" @click="openSettings()"
                    x-text="lang==='zh' ? '打开设置' : 'Open Settings'"></button>
          </div>
          <!-- 包一个 noop form：iOS 17+ AutoFill 会用"页面上下文"决定要不要在
               键盘上方塞快译条；只要 textarea 没有 form 父元素 / form 里有
               type=password input，iOS 就会把它当成账户字段。display:contents
               让这个 form 不参与布局，只提供 DOM 语义。 -->
          <form autocomplete="off" onsubmit="return false" style="display:contents">
          <textarea x-model="input" x-ref="chatInput"
                    rows="1"
                    :disabled="!availableModels.length"
                    class="chat-input-textarea"
                    name="muselab-chat-message"
                    inputmode="text"
                    autocomplete="off" autocorrect="off"
                    autocapitalize="sentences" spellcheck="false"
                    enterkeyhint="enter"
                    data-1p-ignore="" data-lpignore="true" data-form-type="other"
                    @keydown.enter.prevent.stop="onEnter($event)"
                    @keydown.escape="mentionShow=false; slashShow=false"
                    @keydown.ctrl.x="onCutLine($event)"
                    @keydown.meta.x="onCutLine($event)"
                    @keydown.up="onChatArrowUp($event)"
                    @keydown.down="(mentionShow || slashShow) && _navPop(1) && $event.preventDefault()"
                    @input="onChatInput($event); autoGrow($event.target)"
                    @paste="onImagePaste($event)"
                    @focus="onChatInputFocus($event)"
                    @blur="onChatInputBlur()"
                    @click="onChatInputClick($event)"
                    :placeholder="t('chat.placeholder')"></textarea>
          </form>
          <div class="chat-toolbar">
            <!-- Attach button — enabled while streaming too, so attachments
                 can be added to a queued message (upload is independent of
                 the running turn). -->
            <button @click="$refs.attachInput.click()"
                    class="chat-toolbar-btn"
                    :title="t('attach.title')">
              <svg><use href="#i-paperclip"/></svg>
            </button>
            <!-- Command-palette opener lives in the chat pane's TOP bar
                 (global "files / sessions / actions" entry), not here.
                 This bottom toolbar is reserved for per-turn controls
                 (attach / model / permission / effort / context ring).
                 The header button shows on touch too, so mobile still
                 reaches the palette. (2026-05-29: removed the duplicate
                 mobile-only magnifier that doubled the header one.) -->
            <!-- Skills / MCP drawer toggles moved to the top bar (2026-05-29).
                 See the header near the organize / scheduler buttons. -->
            <!-- Model selector -->
            <select x-model="model" @change="onModelChange()"
                    class="chat-toolbar-select"
                    :title="lang==='zh' ? '切换模型' : 'Switch model'">
              <template x-if="model && !availableModels.some(m => m.model === model)">
                <option :value="model" x-text="model"></option>
              </template>
              <template x-for="grp in modelGroups()" :key="grp.name">
                <optgroup :label="grp.name">
                  <template x-for="m in grp.items" :key="m.model">
                    <option :value="m.model" x-text="m.label"></option>
                  </template>
                </optgroup>
              </template>
            </select>
            <!-- Permission mode -->
            <select x-model="permission" class="chat-toolbar-select chat-toolbar-permission"
                    :title="t('set.label.default_permission')">
              <option value="bypassPermissions">bypass</option>
              <option value="acceptEdits">acceptEdits</option>
              <option value="default">default</option>
              <option value="plan">plan</option>
            </select>
            <!-- Reasoning effort. Empty = SDK adaptive default (Opus 4.7's
                 adaptive thinking picks per turn). Overrides apply session-
                 wide and trigger a client rebuild on next turn.

                 Options visibility tracks current model/provider metadata:
                 Claude models always show it; non-Claude providers show it
                 only when /api/chat/providers marks supports_effort=true
                 (currently Codex Gateway). xhigh remains Opus-only — SDK
                 falls back to high elsewhere, so we hide rather than mislead.
                 See _supportsEffort / _effortAllowed in app.js. -->
            <select x-model="effort" @change="onEffortChange()"
                    x-show="_supportsEffort(model)"
                    class="chat-toolbar-select chat-toolbar-effort"
                    :title="t('effort.title')">
              <template x-for="opt in effortChoices(model)" :key="opt.value || 'auto'">
                <option :value="opt.value" x-text="t(opt.labelKey)"></option>
              </template>
            </select>
            <!-- Mobile-only gear: on phones the permission + effort selects
                 above are hidden (CSS) and collapsed in here, so the composer
                 toolbar stays a single row instead of wrapping to two. Desktop
                 hides this whole group and keeps the selects inline. The selects
                 inside share the SAME x-model as the inline ones, so flipping
                 either keeps both in sync — no extra state to reconcile. -->
            <div class="chat-toolbar-more">
              <button type="button"
                      class="chat-toolbar-btn chat-toolbar-more-btn"
                      :class="{ active: composerSettingsOpen }"
                      @click.stop="composerSettingsOpen = !composerSettingsOpen"
                      :title="lang==='zh' ? '会话设置（权限 / Effort）' : 'Session settings (permission / effort)'">
                <svg><use href="#i-cog"/></svg>
              </button>
              <div class="chat-toolbar-more-pop"
                   x-show="composerSettingsOpen"
                   x-cloak
                   @click.outside="composerSettingsOpen = false">
                <label class="chat-toolbar-more-field">
                  <span x-text="t('set.label.default_permission')"></span>
                  <select x-model="permission">
                    <option value="bypassPermissions">bypass</option>
                    <option value="acceptEdits">acceptEdits</option>
                    <option value="default">default</option>
                    <option value="plan">plan</option>
                  </select>
                </label>
                <label class="chat-toolbar-more-field" x-show="_supportsEffort(model)">
                  <span x-text="t('effort.title')"></span>
                  <select x-model="effort" @change="onEffortChange()">
                    <template x-for="opt in effortChoices(model)" :key="opt.value || 'auto'">
                      <option :value="opt.value" x-text="t(opt.labelKey)"></option>
                    </template>
                  </select>
                </label>
              </div>
            </div>
            <!-- Extended-thinking on/off. Default on. Turning it OFF is the
                 escape hatch for the CLI streaming-interleaving 400 ("thinking
                 blocks ... cannot be modified"): a thinking-free session can't
                 produce the interleaved blocks that trip the API. Per-session,
                 PATCH {thinking}; rebuilds the client on next turn. Shown for
                 ALL providers whose endpoint honors the thinking config
                 (provider-level supports_thinking from /api/chat/providers) —
                 hidden only for vendors that reject it (e.g. Qianfan), where
                 the switch would be a no-op. -->
            <!-- HIDDEN 2026-05-31: the bundled CLI (2.1.150, what the SDK
                 actually runs — NOT the system claude on PATH) doesn't honor
                 `--thinking disabled` on current-gen models — Opus 4.7+ and
                 DeepSeek reason adaptively regardless — so the toggle had no
                 visible effect. Backend plumbing + JS left intact; flip
                 x-show back to `_supportsThinking(model)` to restore once the
                 CLI/model actually supports turning thinking off. -->
            <label class="chat-toolbar-think"
                   x-show="false"
                   :title="t('thinking.title')">
              <input type="checkbox" x-model="thinkingEnabled" @change="onThinkingChange()">
              <span x-text="t('thinking.label')"></span>
            </label>
            <!-- Context ring — % used. Click to compact. Right-click
                 opens the SDK breakdown popup (the dedicated magnifier
                 button was removed per user request). -->
            <button class="chat-toolbar-ring"
                    :class="{
                      warn: sessionUsage.context_used_pct >= 70 && sessionUsage.context_used_pct < 90,
                      danger: sessionUsage.context_used_pct >= 90,
                    }"
                    @click="runCompact()"
                    @contextmenu.prevent="showCtxBreakdown()"
                    :title="ctxRingTitle()">
              <svg viewBox="0 0 20 20" width="18" height="18">
                <circle cx="10" cy="10" r="7" fill="none"
                        stroke="var(--c-bg-4)" stroke-width="2.5"/>
                <circle cx="10" cy="10" r="7" fill="none"
                        stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-dasharray="43.98"
                        :stroke-dashoffset="43.98 * (1 - Math.min(100, sessionUsage.context_used_pct||0) / 100)"
                        transform="rotate(-90 10 10)"/>
              </svg>
            </button>
            <!-- Subscription quota badge. Claude uses SDK rate_limit events.
                 Codex Gateway has no authoritative provider quota feed here,
                 so it is hidden like other third-party / API-key providers. -->
            <span class="chat-toolbar-rl"
                  x-show="currentQuotaBadge()"
                  :class="{ warn: currentQuotaBadge() && currentQuotaBadge().warn && !currentQuotaBadge().crit,
                            crit: currentQuotaBadge() && currentQuotaBadge().crit,
                            codex: _isCodexModel(model) }"
                  @click="currentQuotaBadge() && toast(rlBadgeDesc(), currentQuotaBadge().crit ? 'error' : (currentQuotaBadge().warn ? 'warn' : 'info'))"
                  :title="rlBadgeDesc()">
              <svg viewBox="0 0 24 24" width="13" height="13"><use href="#i-gauge"/></svg>
              <span class="chat-toolbar-rl-text" x-text="currentQuotaText()"></span>
            </span>
            <span class="chat-toolbar-spacer"></span>
            <!-- Send / Stop. The button is disabled while ANY attachment is
                 still mid-upload (pendingImages/pendingDocs .uploading) — the
                 user cannot fire a turn until every image/doc finishes, so a
                 half-uploaded attachment can never be sent. `_sendWaitingForUpload`
                 stays as a belt-and-suspenders guard for the resumed-queue path
                 (drained item whose snapshot is still uploading), where the
                 auto-wait inside sendMessage polls to completion. Together they
                 also stop a double-tap from queueing two sends for one upload. -->
            <!-- Send button — always visible. send() routes the click:
                 idle → fire SSE; streaming/compacting → enqueue onto
                 tabState[currentId].pendingQueue. A small badge in the
                 corner surfaces the current backlog count. The title
                 swaps to reflect what the click will actually do, so
                 the user always knows. The neighboring stop button only
                 shows while streaming. Same shape + size + fill — they
                 read as a sibling pair (blue send / red stop). -->
            <button @click="send()"
                    :disabled="!availableModels.length || _sendWaitingForUpload || pendingImages.some(im => im.uploading) || pendingDocs.some(d => d.uploading) || (!input.trim() && !pendingImages.length && !pendingDocs.length)"
                    class="btn-primary chat-toolbar-send chat-toolbar-queue"
                    :title="streaming ? t('queue.button_hint') : t('btn.send')">
              <span class="icon"><svg><use href="#i-send"/></svg></span><span x-text="t('btn.send')"></span>
              <span class="chat-toolbar-queue-badge"
                    x-show="_currentQueueLen() > 0"
                    x-text="_currentQueueLen()"></span>
            </button>
            <button x-show="streaming" @click="stop()" class="btn-danger chat-toolbar-send"
                    :title="_currentQueueLen() > 0
                              ? (lang==='zh'
                                  ? '撤回队尾（队列 ' + _currentQueueLen() + ' 条）'
                                  : 'Pop last queued (' + _currentQueueLen() + ' waiting)')
                              : (t('btn.stop') + ' (Esc)')">
              <span class="icon"><svg><use href="#i-square"/></svg></span><span x-text="t('btn.stop')"></span>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Mobile tab bar — only shown via CSS @media on narrow viewports.
         Sits as a sibling of the panes in the same grid; on mobile, the panes
         become full-width and we swap which one is visible via mobileTab. -->
    <nav class="mobile-tab-bar" x-show="authed">
      <button :class="{active: mobileTab==='files'}" @click="mobileTab='files'">
        <span class="icon"><svg><use href="#i-folder"/></svg></span>
        <span x-text="t('pane.files')"></span>
      </button>
      <button :class="{active: mobileTab==='preview'}" @click="mobileTab='preview'">
        <span class="icon"><svg><use href="#i-file-text"/></svg></span>
        <span x-text="t('pane.preview')"></span>
      </button>
      <button :class="{active: mobileTab==='chat'}" @click="mobileTab='chat'">
        <span class="icon"><svg><use href="#i-brain"/></svg></span>
        <span x-text="t('pane.chat')"></span>
      </button>
    </nav>

  </div>

  <!-- ============ Message outline modal ============
       Lists every user prompt in the current session; tap a row to scroll
       chat to that message + flash highlight. Entry point: chat-tabs-actions
       outline button (☰). On mobile this slides up as a bottom sheet, on
       desktop it centers as a normal modal. -->
  <div class="msg-outline-modal" x-show="msgOutlineOpen"
       x-transition.opacity
       @click.self="msgOutlineOpen = false"
       @keydown.escape.window="msgOutlineOpen = false">
    <div class="msg-outline-panel" @click.stop>
      <div class="msg-outline-head">
        <span class="msg-outline-label"
              x-text="(lang==='zh' ? '会话目录 ' : 'Outline ') + '(' + outlineMessages().length + ')'"></span>
        <button class="msg-outline-close" @click="msgOutlineOpen = false"
                :title="lang==='zh' ? '关闭 (Esc)' : 'Close (Esc)'">×</button>
      </div>
      <ul class="msg-outline-list">
        <template x-for="(m, i) in outlineMessages()" :key="m.uuid || m._k || ('o-' + i)">
          <li @click="_scrollToUserMsg(m); msgOutlineOpen = false"
              :title="m.text || m.body || ''">
            <span class="msg-outline-idx" x-text="'#' + (i + 1)"></span>
            <span class="msg-outline-text ellipsis" x-text="outlineText(m)"></span>
            <span class="msg-outline-time" x-text="m.ts ? fmtHM(m.ts) : ''"></span>
          </li>
        </template>
      </ul>
      <div x-show="outlineMessages().length === 0" class="msg-outline-empty"
           x-text="lang==='zh' ? '此会话还没有 user 消息' : 'No user messages yet'"></div>
    </div>
  </div>

  <!-- ============ Codex / OpenAI image generation ============ -->
  <div class="modal-backdrop image-gen-backdrop"
       x-show="imageGen.show"
       x-cloak
       @click.self="closeImageGen()">
    <div class="modal image-gen-modal"
         @keydown.escape.window="closeImageGen()"
         role="dialog" aria-modal="true"
         :aria-label="lang==='zh' ? 'Codex Image 2 生图' : 'Codex Image 2 image generation'">
      <div class="modal-head">
        <span class="modal-title">
          <svg class="modal-title-icon"><use href="#i-image"/></svg>
          <span x-text="lang==='zh' ? 'Codex Image 2 生图' : 'Codex Image 2'"></span>
        </span>
        <button class="modal-close"
                @click="closeImageGen()"
                :disabled="imageGen.loading"
                :title="lang==='zh' ? '关闭' : 'Close'">×</button>
      </div>
      <div class="modal-body image-gen-body">
        <textarea x-ref="imageGenPrompt"
                  x-model="imageGen.prompt"
                  class="image-gen-prompt"
                  rows="5"
                  :placeholder="lang==='zh' ? '描述你想生成的图片……' : 'Describe the image you want…'"></textarea>
        <div class="image-gen-controls">
          <label>
            <span x-text="lang==='zh' ? '模型' : 'Model'"></span>
            <input x-model="imageGen.model" />
          </label>
          <label>
            <span x-text="lang==='zh' ? '尺寸' : 'Size'"></span>
            <select x-model="imageGen.size">
              <option value="1024x1024">1024×1024</option>
              <option value="1536x1024">1536×1024</option>
              <option value="1024x1536">1024×1536</option>
              <option value="auto">auto</option>
            </select>
          </label>
          <label>
            <span x-text="lang==='zh' ? '质量' : 'Quality'"></span>
            <select x-model="imageGen.quality">
              <option value="low">low</option>
              <option value="medium">medium</option>
              <option value="high">high</option>
              <option value="auto">auto</option>
            </select>
          </label>
          <label>
            <span x-text="lang==='zh' ? '格式' : 'Format'"></span>
            <select x-model="imageGen.output_format">
              <option value="png">png</option>
              <option value="jpeg">jpeg</option>
              <option value="webp">webp</option>
            </select>
          </label>
          <label>
            <span x-text="lang==='zh' ? '张数' : 'Count'"></span>
            <select x-model.number="imageGen.n">
              <option :value="1">1</option>
              <option :value="2">2</option>
              <option :value="3">3</option>
              <option :value="4">4</option>
            </select>
          </label>
        </div>
        <label class="image-gen-ref"
               x-show="pendingImages.some(x => x && x.id && !x.uploading && !x.error)">
          <input type="checkbox" x-model="imageGen.useReferences">
          <span x-text="lang==='zh' ? '用当前待发送图片作为参考' : 'Use current pending images as references'"></span>
        </label>
        <div class="settings-hint warn" x-show="imageGen.error" x-text="imageGen.error"></div>
        <div class="image-gen-history-head">
          <span x-text="lang==='zh' ? '历史生成' : 'History'"></span>
          <button class="btn-ghost sm" type="button"
                  @click="refreshImageGenJobs()"
                  :disabled="imageGen.jobsLoading"
                  x-text="imageGen.jobsLoading ? (lang==='zh' ? '刷新中…' : 'Refreshing…') : (lang==='zh' ? '刷新' : 'Refresh')"></button>
        </div>
        <div class="image-gen-empty" x-show="!imageGen.jobs.length && !imageGen.jobsLoading"
             x-text="lang==='zh' ? '还没有生成记录。' : 'No generated images yet.'"></div>
        <div class="image-gen-results" x-show="imageGen.jobs.length">
          <template x-for="job in imageGen.jobs" :key="job.id">
            <div class="image-gen-job" :class="'status-' + job.status">
              <div class="image-gen-job-head">
                <div class="image-gen-job-title">
                  <span class="image-gen-status" x-text="imageGenStatusLabel(job.status)"></span>
                  <span x-text="job.provider || job.model || 'imagegen'"></span>
                </div>
                <div class="image-gen-job-actions">
                  <button class="btn-ghost sm" type="button"
                          @click="copyImageGenPrompt(job)"
                          x-text="t('image_gen.copy_prompt')"></button>
                  <button class="btn-ghost sm" type="button"
                          @click="reuseImageGenPrompt(job)"
                          x-text="t('image_gen.reuse_prompt')"></button>
                  <span class="image-gen-job-time" x-text="fmtHM((job.updated_at || job.created_at) * 1000)"></span>
                </div>
              </div>
              <div class="image-gen-job-prompt" x-text="job.prompt"></div>
              <div class="settings-hint warn" x-show="job.error" x-text="job.error"></div>
              <div class="image-gen-job-pending"
                   x-show="job.status === 'queued' || job.status === 'running'">
                <span class="thinking-dots"><span></span><span></span><span></span></span>
                <span x-text="lang==='zh' ? '后台生成中，可以关闭这个窗口。' : 'Generating in the background. You can close this window.'"></span>
              </div>
              <div class="image-gen-job-grid" x-show="job.images && job.images.length">
                <template x-for="img in (job.images || [])" :key="img.image_id">
                  <div class="image-gen-card">
                    <button type="button" class="image-gen-preview"
                            @click="openLightbox(img.data_url || img.blob_url, img.name)">
                      <img :src="img.data_url || img.blob_url" alt="" />
                    </button>
                    <div class="image-gen-card-foot">
                      <span x-text="img.name"></span>
                      <button class="btn-primary sm"
                              @click="attachImageGenHistory(job, img)"
                              x-text="lang==='zh' ? '加入消息' : 'Attach'"></button>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-ghost" @click="closeImageGen()"
                x-text="t('btn.cancel')"></button>
        <button class="btn-primary"
                @click="runImageGen()"
                :disabled="imageGen.loading || !imageGen.prompt.trim()"
                x-text="imageGen.loading ? (lang==='zh' ? '提交中…' : 'Submitting…') : (lang==='zh' ? '提交后台任务' : 'Submit job')"></button>
      </div>
    </div>
  </div>

  <!-- ============ Image lightbox ============ -->
  <!-- Click anywhere — backdrop, image itself, or the explicit × button — to
       close. Previously the image swallowed clicks (@click.stop) so users
       had to find the backdrop or hit the corner ×; the image-toggles-itself
       pattern is what every modern photo viewer does (iOS Photos, Telegram). -->
  <div class="lightbox"
       x-show="lightbox.show"
       x-transition.opacity
       @click="lightbox.show = false"
       @keydown.escape.window="lightbox.show = false">
    <!-- x-if so the <img> is only in the DOM when actually shown — prevents
         the same empty-src resource-load-failed warning the preview pane had. -->
    <template x-if="lightbox.show && lightbox.src">
      <img :src="lightbox.src" class="lightbox-img"
           @click.stop="lightbox.show = false" :alt="lightbox.alt || (lang==='zh' ? '图片预览' : 'Image preview')" />
    </template>
    <button class="lightbox-close"
            :title="lang==='zh' ? '关闭 (Esc)' : 'Close (Esc)'"
            :aria-label="lang==='zh' ? '关闭（Esc）' : 'Close (Esc)'"
            @click.stop="lightbox.show = false">×</button>
  </div>

  <!-- ============ Toast ============ -->
  <div class="toast-stack">
    <template x-for="t in toasts" :key="t.id">
      <div :class="'toast ' + (t.type || '')">
        <span class="icon">
          <svg x-show="t.type==='success'"><use href="#i-check-circle"/></svg>
          <svg x-show="t.type==='error'"><use href="#i-alert-circle"/></svg>
          <svg x-show="t.type==='warn'"><use href="#i-alert-triangle"/></svg>
          <svg x-show="!t.type || t.type==='info'"><use href="#i-info"/></svg>
        </span>
        <div class="body" x-text="t.msg"></div>
        <button x-show="t.action" class="toast-action"
                @click="runToastAction(t)" x-text="t.action && t.action.label"></button>
        <button class="close"
                :title="lang==='zh' ? '关闭' : 'Dismiss'"
                @click="dismissToast(t.id)"><svg style="width:14px;height:14px"><use href="#i-x"/></svg></button>
      </div>
    </template>
  </div>

  <!-- ============ Context Menu ============ -->

       :style="`top:${ctxMenu.y}px; left:${ctxMenu.x}px`"
       @click.away="ctxMenu.show=false">
    <!-- 批量模式：右键命中多选集合时，只显示批量操作 -->
    <button class="ctx-item danger" @click="ctxMenu.show=false; deleteSelected()" x-show="ctxMenu.multi > 1">
      <span class="icon"><svg><use href="#i-trash"/></svg></span>
      <span x-text="(lang==='zh' ? '删除选中 ' : 'Delete ') + ctxMenu.multi + (lang==='zh' ? ' 项' : ' selected')"></span>
    </button>
    <!-- 目录专属：新建 -->
    <button class="ctx-item" @click="ctxAction('newFile')" x-show="!ctxMenu.multi && (ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-file"/></svg></span><span x-text="t('btn.new_file')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('newDir')" x-show="!ctxMenu.multi && (ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-folder-plus"/></svg></span><span x-text="t('btn.new_dir')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('upload')" x-show="!ctxMenu.multi && (ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-upload"/></svg></span><span x-text="t('btn.upload')"></span>
    </button>
    <div class="ctx-sep" x-show="!ctxMenu.multi && (ctxMenu.node && ctxMenu.node.is_dir)"></div>

    <button class="ctx-item" @click="ctxAction('open')" x-show="!ctxMenu.multi && !(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-eye"/></svg></span><span x-text="t('btn.preview')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('mention')" x-show="!ctxMenu.multi && !(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-at"/></svg></span><span x-text="t('btn.at_mention')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('download')" x-show="!ctxMenu.multi && !(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-download"/></svg></span><span x-text="t('btn.download')"></span>
    </button>
    <!-- 文件专属：复制为 .bak -->
    <button class="ctx-item" @click="ctxAction('copyAsBak')" x-show="!ctxMenu.multi && !(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-copy"/></svg></span><span x-text="t('btn.copy_as_bak')"></span>
    </button>
    <!-- 通用 -->
    <button class="ctx-item" @click="ctxAction('copyPath')" x-show="!ctxMenu.multi">
      <span class="icon"><svg><use href="#i-copy"/></svg></span><span x-text="t('btn.copy_path')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('rename')" x-show="!ctxMenu.multi">
      <span class="icon"><svg><use href="#i-edit"/></svg></span><span x-text="t('btn.rename')"></span>
    </button>

    <button class="ctx-item danger" @click="ctxAction('delete')" x-show="!ctxMenu.multi">
      <span class="icon"><svg><use href="#i-trash"/></svg></span><span x-text="t('btn.delete')"></span>

  </div>
  <!-- 隐藏 input：右键"上传文件到这里"复用 -->
  <input type="file" x-ref="ctxUpload" style="display:none" @change="ctxUploadHandler($event)" />

  <!-- ============ Settings Modal ============ -->
  <div class="modal-backdrop" x-show="settings.show" @click.self="settings.show=false">
    <div class="modal settings-modal" @keydown.escape.window="settings.show=false"
         role="dialog" aria-modal="true" :aria-label="t('set.title')">
      <div class="modal-head">
        <span class="modal-title">
          <svg class="modal-title-icon"><use href="#i-cog"/></svg>
          <span x-text="t('set.title')"></span>
        </span>
        <button class="modal-close" @click="settings.show=false"
                :title="lang==='zh' ? '关闭' : 'Close'" aria-label="Close">×</button>
      </div>
      <div class="modal-body settings-modal-body">
        <!-- Settings nav. Desktop (isWideScreen=true): a persistent left
             sidebar of tabs — only the section matching activePage renders
             in the content pane to the right. Mobile (isWideScreen=false):
             iOS-style drill-down — when activePage is null this menu fills
             the screen; tapping a row sets activePage to show only that
             section + a Back button. The `.active` class highlights the
             current tab on desktop. -->
        <ul class="settings-menu"
            x-show="isWideScreen || !settings.activePage">
          <li class="settings-menu-item" @click="settings.activePage='lang'"
              :class="{ active: settings.activePage==='lang' }">
            <span class="settings-menu-icon"><svg><use href="#i-globe"/></svg></span>
            <span class="settings-menu-title" x-text="t('set.sec.lang')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='provider'"
              :class="{ active: settings.activePage==='provider' }">
            <span class="settings-menu-icon"><svg><use href="#i-key"/></svg></span>
            <span class="settings-menu-title" x-text="t('set.sec.provider')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='appearance'"
              :class="{ active: settings.activePage==='appearance' }">
            <span class="settings-menu-icon"><svg><use href="#i-palette"/></svg></span>
            <span class="settings-menu-title" x-text="t('set.sec.appearance')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='notification'"
              :class="{ active: settings.activePage==='notification' }">
            <span class="settings-menu-icon"><svg><use href="#i-bell"/></svg></span>
            <span class="settings-menu-title"
                  x-text="lang==='zh' ? '通知' : 'Notifications'"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='defaults'"
              :class="{ active: settings.activePage==='defaults' }">
            <span class="settings-menu-icon"><svg><use href="#i-cog"/></svg></span>
            <span class="settings-menu-title" x-text="t('set.sec.defaults')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='skills'"
              :class="{ active: settings.activePage==='skills' }">
            <span class="settings-menu-icon"><svg><use href="#i-puzzle"/></svg></span>
            <span class="settings-menu-title" x-text="t('set.sec.skills')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='mcp'"
              :class="{ active: settings.activePage==='mcp' }">
            <span class="settings-menu-icon"><svg><use href="#i-plug"/></svg></span>
            <span class="settings-menu-title" x-text="t('set.sec.mcp')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='versions'"
              :class="{ active: settings.activePage==='versions' }">
            <span class="settings-menu-icon"><svg><use href="#i-tool"/></svg></span>
            <span class="settings-menu-title"
                  x-text="lang==='zh' ? '版本与升级' : 'Versions & upgrade'"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item"
              @click="settings.activePage='cost'; loadCostDashboard();"
              :class="{ active: settings.activePage==='cost' }">
            <span class="settings-menu-icon"><svg><use href="#i-dollar"/></svg></span>
            <span class="settings-menu-title" x-text="t('set.sec.cost')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
        </ul>

        <!-- Content pane: holds the back button (mobile) + every section.
             On desktop this is the right-hand flex column; only the section
             whose data-page === activePage is shown. -->
        <div class="settings-content">
        <!-- Mobile-only back button — shown on detail pages. -->
        <button class="settings-back"
                x-show="!isWideScreen && settings.activePage"
                @click="settings.activePage = null">
          <span>‹</span>
          <span x-text="lang==='zh' ? '返回' : 'Back'"></span>
        </button>

        <div class="settings-section" data-page="lang"
             x-show="settings.activePage === 'lang'">
          <div class="settings-section-title">
            <span x-text="t('set.sec.lang')"></span>
            <span class="settings-save-mode live" x-text="t('set.mode.live')"></span>
          </div>
          <div class="settings-row">
            <label x-text="t('set.label.lang')"></label>
            <div class="lang-picker">
              <button class="btn-ghost" :class="{active: lang==='zh'}" @click="setLang('zh')" x-text="t('set.lang.zh')"></button>
              <button class="btn-ghost" :class="{active: lang==='en'}" @click="setLang('en')" x-text="t('set.lang.en')"></button>
            </div>
          </div>
        </div>

        <div class="settings-section" data-page="provider"
             x-show="settings.activePage === 'provider'">
          <div class="settings-section-title">
            <span x-text="t('set.sec.provider')"></span>
            <span class="settings-save-mode live" x-text="t('set.mode.live')"></span>
          </div>

          <!-- Claude Auth — first-class OAuth provider, no API key field.
               Distinct UX from the generic provider rows: shows identity
               (email/plan/expiry) when connected, Connect button when not. -->
          <div class="claude-auth-card">
            <div class="claude-auth-head">
              <div class="claude-auth-title-wrap">
                <div class="claude-auth-title" x-text="t('claude_auth.title')"></div>
                <div class="claude-auth-subtitle" x-text="t('claude_auth.subtitle')"></div>
              </div>
              <!-- In-flight: backend hasn't responded yet. Without this,
                   the head row stays empty during the fetch and visually
                   matches "未连接" — users assume the worst. -->
              <span x-show="!claudeAuth.loaded" class="settings-badge"
                    x-text="lang==='zh' ? '检测中…' : 'Checking…'"></span>
              <span x-show="claudeAuth.logged_in" class="settings-badge ok"
                    x-text="t('claude_auth.status_connected')"></span>
              <span x-show="claudeAuth.loaded && !claudeAuth.logged_in" class="settings-badge"
                    x-text="t('claude_auth.status_disconnected')"></span>
            </div>

            <!-- Connected: identity panel + action buttons -->
            <div x-show="claudeAuth.logged_in" class="claude-auth-connected">
              <div class="claude-auth-field">
                <span class="claude-auth-label" x-text="t('claude_auth.email_label')"></span>
                <span class="claude-auth-value" x-text="claudeAuth.email || '—'"></span>
              </div>
              <div class="claude-auth-field">
                <span class="claude-auth-label" x-text="t('claude_auth.plan_label')"></span>
                <span class="claude-auth-value" x-text="claudeAuthPlanLabel()"></span>
              </div>
              <div class="claude-auth-field">
                <span class="claude-auth-label" x-text="t('claude_auth.expires_label')"></span>
                <span class="claude-auth-value" x-text="claudeAuthExpiresHuman()"></span>
              </div>
              <div class="claude-auth-actions">
                <button class="btn-ghost sm" @click="reauthClaude()"
                        x-text="t('claude_auth.reauth_btn')"></button>
                <button class="btn-ghost sm danger" @click="disconnectClaudeAuth()"
                        x-text="t('claude_auth.disconnect_btn')"></button>
              </div>
            </div>

            <!-- Not connected: Connect button + CLI install hint if missing -->
            <div x-show="claudeAuth.loaded && !claudeAuth.logged_in" class="claude-auth-disconnected">
              <div x-show="!claudeAuth.cli_installed" class="claude-auth-cli-warn">
                <span x-text="t('claude_auth.cli_missing')"></span>
                <code x-text="t('claude_auth.cli_install_cmd')"></code>
              </div>
              <!-- Surface `reason` so the user can self-debug a wrong
                   "未连接" verdict (e.g. cli-timeout, not-logged-in,
                   cli-bad-json, token-expired). Hidden when reason is null.
                   `token-expired` gets a friendly amber treatment because
                   it's the common "session went stale" case, not an error. -->
              <div x-show="claudeAuth.reason"
                   :class="claudeAuth.reason === 'token-expired' ? 'claude-auth-reason expired' : 'claude-auth-reason'"
                   :style="claudeAuth.reason === 'token-expired'
                           ? 'font-size:13px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 10px;'
                           : 'font-size:12px;color:var(--fg-soft,#6b7280);'">
                <template x-if="claudeAuth.reason === 'token-expired'">
                  <span x-text="lang==='zh' ? '登录已过期，请重新连接。' : 'Session expired — please reconnect.'"></span>
                </template>
                <template x-if="claudeAuth.reason !== 'token-expired'">
                  <span>
                    <span x-text="lang==='zh' ? '探测原因：' : 'Probe reason: '"></span>
                    <code x-text="claudeAuth.reason"></code>
                  </span>
                </template>
              </div>
              <div class="claude-auth-actions" style="border-top:none;padding-top:0;">
                <button class="btn-primary" @click="openClaudeAuthModal()"
                        x-text="t('claude_auth.connect_btn')"></button>
                <button class="btn-ghost sm" @click="loadClaudeAuthStatus()"
                        x-text="lang==='zh' ? '重新检测' : 'Recheck'"></button>
              </div>
            </div>
          </div>

          <div class="settings-hint" x-text="lang==='zh' ? '填入新值并保存即可生效；留空表示不修改。' : 'Enter new value and save to apply; leave blank to keep existing.'"></div>
          <template x-for="(p, idx) in settings.providers" :key="p.id || idx">
            <div class="settings-row provider-row" x-data="{ editing: false }">

              <!-- ===== Anthropic / non-editable: simple api-key row ===== -->
              <template x-if="!p.editable">
                <div>
                  <label x-text="localizeProviderDisplay(p.display) + ' (' + p.env_key + ')'"></label>
                  <div class="settings-input-wrap">
                    <input x-show="!p.configured || editing"
                           type="password" class="settings-input"
                           :placeholder="editing ? t('set.key_edit_placeholder') : t('set.placeholder_key')"
                           x-model="settings.draftKeys[p.env_key]" />
                    <span x-show="p.configured && !editing" class="settings-badge ok" x-text="t('set.key_set')"></span>
                    <button x-show="!p.configured || editing" class="btn-primary sm"
                            :disabled="!(settings.draftKeys[p.env_key] || '').trim()"
                            @click="(async () => { if (await saveProviderKey(p.env_key)) editing = false })()"
                            x-text="t('btn.save')"></button>
                    <button x-show="p.configured && editing" class="btn-ghost sm"
                            @click="editing = false; settings.draftKeys[p.env_key] = ''"
                            x-text="t('set.key_cancel')"></button>
                    <button x-show="p.configured && !editing" class="btn-ghost sm"
                            @click="probeProvider(p.env_key, p.probe_model)" :title="t('set.probe_tip')"
                            x-text="t('set.probe')"></button>
                    <button x-show="p.configured && !editing" class="btn-ghost sm"
                            @click="editing = true"
                            x-text="t('set.key_edit')"></button>
                  </div>
                  <div x-show="PROVIDER_HELP[p.env_key]" class="provider-help">
                    <span x-text="PROVIDER_HELP[p.env_key]?.[lang]"></span>
                    <a x-show="PROVIDER_HELP[p.env_key]?.url"
                       :href="PROVIDER_HELP[p.env_key]?.url"
                       target="_blank" rel="noopener"
                       x-text="PROVIDER_HELP[p.env_key]?.url?.startsWith('docs/')
                         ? (lang==='zh' ? '打开文档 ↗' : 'Open docs ↗')
                         : (lang==='zh' ? '打开控制台 ↗' : 'Open console ↗')"></a>
                  </div>
                  <div x-show="settings.probeResults[p.probe_model]"
                       class="probe-result"
                       :class="{ ok: settings.probeResults[p.probe_model]?.ok,
                                  err: !settings.probeResults[p.probe_model]?.ok }">
                    <svg class="probe-result-icon ok" x-show="settings.probeResults[p.probe_model]?.ok"><use href="#i-check-circle"/></svg>
                    <svg class="probe-result-icon err" x-show="!settings.probeResults[p.probe_model]?.ok"><use href="#i-alert-circle"/></svg>
                    <span x-text="settings.probeResults[p.probe_model]?.text"></span>
                  </div>

                  <!-- Claude model list — the one editable knob on the
                       otherwise special-auth Anthropic row. Auth (above)
                       stays OAuth/key; this just curates the picker list. -->
                  <label x-show="p.models_editable" style="grid-column:1;align-self:center"
                         x-text="lang==='zh' ? 'Claude 模型' : 'Claude models'"></label>
                  <div x-show="p.models_editable" class="settings-input-wrap" style="grid-column:2;margin-top:0">
                    <button class="btn-ghost sm" @click="toggleAnthropicModels(p)"
                            x-text="settings.providerDrafts[p.id]?.open ? t('btn.cancel') : (lang==='zh' ? '编辑模型列表' : 'Edit models')"></button>
                    <span x-show="p.is_overridden" class="provider-meta-tag edited"
                          x-text="lang==='zh' ? '已改' : 'edited'"></span>
                  </div>
                  <div x-show="p.models_editable && settings.providerDrafts[p.id]?.open" class="provider-editor">
                    <div class="settings-row">
                      <label x-text="t('set.prov.models')"></label>
                      <textarea class="settings-input mono" rows="4"
                                x-model="settings.providerDrafts[p.id].models"
                                :placeholder="t('set.prov.models_ph')"></textarea>
                    </div>
                    <div class="settings-hint"
                         x-text="lang==='zh' ? '每行一个 Claude 模型 id（如 claude-opus-4-8）。认证沿用上方的 OAuth / API key，端点固定为 Anthropic。' : 'One Claude model id per line (e.g. claude-opus-4-8). Auth uses the OAuth / API key above; endpoint is fixed to Anthropic.'"></div>
                    <div class="settings-row provider-editor-actions">
                      <button class="btn-primary sm" @click="saveAnthropicModels(p)" x-text="t('btn.save')"></button>
                      <button class="btn-ghost sm" @click="toggleAnthropicModels(p)" x-text="t('btn.cancel')"></button>
                      <button x-show="p.is_overridden" class="btn-ghost sm"
                              @click="restoreProvider(p)" x-text="t('set.prov.restore')"></button>
                    </div>
                  </div>
                </div>
              </template>

              <!-- ===== Third-party editable provider (full editor) ===== -->
              <template x-if="p.editable">
                <div>
                  <label>
                    <span x-text="localizeProviderDisplay(p.display)"></span>
                    <span x-show="p.is_builtin && p.is_overridden" class="provider-meta-tag edited"
                          x-text="lang==='zh' ? '已改' : 'edited'"></span>
                    <span x-show="!p.is_builtin" class="provider-meta-tag custom"
                          x-text="lang==='zh' ? '自定义' : 'custom'"></span>
                  </label>
                  <div class="settings-input-wrap">
                    <label class="switch sm" :title="p.disabled ? (lang==='zh' ? '关掉 → 不出现在模型菜单' : 'Off → hidden from model picker') : (lang==='zh' ? '开启 → 出现在模型菜单' : 'On → shown in model picker')">
                      <input type="checkbox" :checked="!p.disabled"
                             @change="toggleProvider(p.id, !$event.target.checked)" />
                      <span class="switch-slider"></span>
                    </label>
                    <span x-show="p.configured" class="settings-badge ok" x-text="t('set.key_set')"></span>
                    <span x-show="!p.configured" class="settings-badge" x-text="lang==='zh' ? '未配置' : 'No key'"></span>
                    <button x-show="p.configured" class="btn-ghost sm"
                            @click="probeProvider(p.env_key, p.probe_model)" :title="t('set.probe_tip')"
                            x-text="t('set.probe')"></button>
                    <button class="btn-ghost sm"
                            @click="toggleProviderEditor(p)"
                            x-text="settings.providerDrafts[p.id]?.open ? t('btn.cancel') : t('set.key_edit')"></button>
                  </div>

                  <!-- Expanded editor: endpoint / prefix / models / api-key -->
                  <div x-show="settings.providerDrafts[p.id]?.open" class="provider-editor">
                    <div class="settings-row">
                      <label x-text="t('set.prov.endpoint')"></label>
                      <input class="settings-input mono" x-model="settings.providerDrafts[p.id].base_url"
                             :placeholder="t('set.prov.endpoint_ph')" />
                    </div>
                    <div class="settings-row">
                      <label x-text="t('set.prov.prefix')"></label>
                      <input class="settings-input mono" x-model="settings.providerDrafts[p.id].prefix"
                             :placeholder="t('set.prov.prefix_ph')" />
                    </div>
                    <div class="settings-row">
                      <label x-text="t('set.prov.models')"></label>
                      <textarea class="settings-input mono" rows="4"
                                x-model="settings.providerDrafts[p.id].models"
                                :placeholder="t('set.prov.models_ph')"></textarea>
                    </div>
                    <div class="settings-row">
                      <label x-text="t('set.prov.apikey')"></label>
                      <input type="password" class="settings-input"
                             x-model="settings.providerDrafts[p.id].api_key"
                             :placeholder="p.configured ? t('set.key_edit_placeholder') : t('set.placeholder_key')" />
                    </div>
                    <div class="settings-hint" x-text="t('set.prov.hint')"></div>
                    <div class="settings-row provider-editor-actions">
                      <button class="btn-primary sm" @click="saveProvider(p)" x-text="t('btn.save')"></button>
                      <button class="btn-ghost sm" @click="toggleProviderEditor(p)" x-text="t('btn.cancel')"></button>
                      <button x-show="p.is_builtin && p.is_overridden" class="btn-ghost sm"
                              @click="restoreProvider(p)" x-text="t('set.prov.restore')"></button>
                      <button class="btn-ghost sm danger" @click="deleteProvider(p)"
                              x-text="p.is_builtin ? t('set.prov.hide') : t('set.prov.delete')"></button>
                    </div>
                  </div>

                  <div x-show="settings.probeResults[p.probe_model]"
                       class="probe-result"
                       :class="{ ok: settings.probeResults[p.probe_model]?.ok,
                                  err: !settings.probeResults[p.probe_model]?.ok }">
                    <svg class="probe-result-icon ok" x-show="settings.probeResults[p.probe_model]?.ok"><use href="#i-check-circle"/></svg>
                    <svg class="probe-result-icon err" x-show="!settings.probeResults[p.probe_model]?.ok"><use href="#i-alert-circle"/></svg>
                    <span x-text="settings.probeResults[p.probe_model]?.text"></span>
                  </div>
                </div>
              </template>

            </div>
          </template>

          <!-- Add a brand-new provider from scratch -->
          <div class="settings-row mcp-add-row">
            <button class="btn-ghost sm" @click="settings.providerNew.show = !settings.providerNew.show"
                    x-text="settings.providerNew.show ? t('btn.cancel') : t('set.prov.add')"></button>
          </div>
          <div x-show="settings.providerNew.show" class="provider-editor">
            <div class="settings-row">
              <label x-text="t('set.prov.endpoint')"></label>
              <input class="settings-input mono" x-model="settings.providerNew.base_url"
                     :placeholder="t('set.prov.endpoint_ph')" />
            </div>
            <div class="settings-row">
              <label x-text="t('set.prov.prefix')"></label>
              <input class="settings-input mono" x-model="settings.providerNew.prefix"
                     :placeholder="t('set.prov.prefix_ph')" />
            </div>
            <div class="settings-row">
              <label x-text="t('set.prov.models')"></label>
              <textarea class="settings-input mono" rows="4"
                        x-model="settings.providerNew.models"
                        :placeholder="t('set.prov.models_ph')"></textarea>
            </div>
            <div class="settings-row">
              <label x-text="t('set.prov.apikey')"></label>
              <input type="password" class="settings-input"
                     x-model="settings.providerNew.api_key"
                     :placeholder="t('set.placeholder_key')" />
            </div>
            <div class="settings-hint" x-text="t('set.prov.hint')"></div>
            <div class="settings-row">
              <button class="btn-primary sm" @click="addProviderFromDraft()" x-text="t('set.prov.add')"></button>
            </div>
          </div>
        </div>

        <div class="settings-section" data-page="appearance"
             x-show="settings.activePage === 'appearance'">
          <div class="settings-section-title">
            <span x-text="t('set.sec.appearance')"></span>
            <span class="settings-save-mode live" x-text="t('set.mode.live')"></span>
          </div>
          <div class="settings-row">
            <label x-text="t('set.label.theme')"></label>
            <div class="theme-picker">
              <button class="btn-ghost" :class="{active: theme==='light'}" @click="setTheme('light')" x-text="t('set.theme.light')"></button>
              <button class="btn-ghost" :class="{active: theme==='dark'}" @click="setTheme('dark')" x-text="t('set.theme.dark')"></button>
              <button class="btn-ghost" :class="{active: theme==='eyecare'}" @click="setTheme('eyecare')" x-text="t('set.theme.eyecare')"></button>
            </div>
          </div>
          <div class="settings-row">
            <label x-text="t('set.label.accent')"></label>
            <div class="accent-picker">
              <template x-for="c in ACCENT_PRESETS" :key="c.value">
                <button class="accent-swatch"
                        :class="{active: accent===c.value}"
                        :style="`background:${c.value}`"
                        :title="c.name[lang] || c.name.zh"
                        @click="setAccent(c.value)"></button>
              </template>
              <input type="color" :value="accent" @input="setAccent($event.target.value)"
                     class="accent-custom" :title="lang==='zh' ? '自定义' : 'Custom'" />
            </div>
          </div>
        </div>

        <!-- Versions + upgrade — shows current vs latest SDK / CLI, one-click bump. -->
        <div class="settings-section" data-page="versions"
             x-show="settings.activePage === 'versions'">
          <div class="settings-section-title">
            <span x-text="lang==='zh' ? '版本与升级' : 'Versions & upgrade'"></span>
            <button class="btn-ghost sm" @click="loadVersions()"
                    :disabled="settings.versionsLoading"
                    x-text="settings.versionsLoading ? (lang==='zh' ? '检查中…' : 'Checking…') : (lang==='zh' ? '检查更新' : 'Check')"></button>
            <span class="settings-save-mode reload" x-text="t('set.mode.reload')"></span>
          </div>
          <template x-if="settings.versions">
            <div>
              <table class="version-table">
                <thead>
                  <tr>
                    <th x-text="lang==='zh' ? '组件' : 'Component'"></th>
                    <th x-text="lang==='zh' ? '已安装' : 'Installed'"></th>
                    <th x-text="lang==='zh' ? '最新' : 'Latest'"></th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>claude-agent-sdk</td>
                    <td><code x-text="settings.versions.current?.sdk || '—'"></code></td>
                    <td><code x-text="settings.versions.latest?.sdk || '?'"></code></td>
                    <td>
                      <span x-show="settings.versions.sdk_upgrade_available" class="upgrade-badge"
                            x-text="lang==='zh' ? '有更新' : 'update'"></span>
                      <span x-show="!settings.versions.sdk_upgrade_available && settings.versions.current?.sdk" class="upgrade-badge ok"
                            x-text="lang==='zh' ? '最新' : 'latest'"></span>
                      <button x-show="settings.versions.sdk_upgrade_available"
                              class="btn-ghost xs"
                              :disabled="settings.upgradeRunning"
                              @click="runUpgrade('sdk')"
                              x-text="lang==='zh' ? '升级' : 'Upgrade'"></button>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <span x-text="lang==='zh' ? 'bundled CLI（随 SDK 自动更新）' : 'bundled CLI (auto with SDK)'"></span>
                    </td>
                    <td><code x-text="settings.versions.current?.bundled_cli || '—'"></code></td>
                    <td>—</td>
                    <td>
                      <span class="upgrade-badge ok" x-text="lang==='zh' ? '内置' : 'bundled'"></span>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <span x-text="lang==='zh' ? 'system CLI（仅 Pro 登录用）' : 'system CLI (Pro login only)'"></span>
                    </td>
                    <td><code x-text="settings.versions.current?.system_cli || (lang==='zh' ? '未安装（可选）' : 'not installed (optional)')"></code></td>
                    <td><code x-text="settings.versions.latest?.cli || '?'"></code></td>
                    <td>
                      <span x-show="settings.versions.system_cli_upgrade_available" class="upgrade-badge"
                            x-text="lang==='zh' ? '有更新' : 'update'"></span>
                      <span x-show="!settings.versions.system_cli_upgrade_available && settings.versions.current?.system_cli" class="upgrade-badge ok"
                            x-text="lang==='zh' ? '最新' : 'latest'"></span>
                      <span x-show="!settings.versions.current?.system_cli" class="upgrade-badge ok"
                            x-text="lang==='zh' ? '可不装' : 'optional'"></span>
                      <button x-show="settings.versions.system_cli_upgrade_available"
                              class="btn-ghost xs"
                              :disabled="settings.upgradeRunning"
                              @click="runUpgrade('cli')"
                              x-text="lang==='zh' ? '升级' : 'Upgrade'"></button>
                    </td>
                  </tr>
                  <tr>
                    <td>python</td>
                    <td><code x-text="settings.versions.current?.python || '—'"></code></td>
                    <td>—</td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
              <div x-show="settings.versions.expected_cli_version && settings.versions.current?.cli &&
                            settings.versions.expected_cli_version !== settings.versions.current?.cli"
                   class="settings-hint warn">
                <svg class="settings-hint-icon"><use href="#i-alert-triangle"/></svg>
                <span x-text="(lang==='zh' ? 'SDK 期望 CLI 版本 ' : 'SDK expects CLI ') + (settings.versions.expected_cli_version || '?')"></span>
              </div>
              <div class="settings-row" style="margin-top: 10px;">
                <button class="btn-primary sm" @click="runUpgrade()"
                        :disabled="settings.upgradeRunning ||
                                    (!settings.versions.sdk_upgrade_available && !settings.versions.system_cli_upgrade_available)"
                        x-text="settings.upgradeRunning ? (lang==='zh' ? '升级中… (可能需要 30s)' : 'Upgrading… (30s)') : (lang==='zh' ? '一键全部升级' : 'Upgrade all')"></button>
              </div>
              <template x-if="settings.upgradeResult">
                <div class="upgrade-result" :class="{ ok: settings.upgradeResult.ok, err: !settings.upgradeResult.ok }">
                  <div x-show="settings.upgradeResult.ok" class="upgrade-result-status ok">
                    <svg class="upgrade-result-icon"><use href="#i-check-circle"/></svg>
                    <span x-text="lang==='zh' ? '升级完成' : 'Upgrade complete'"></span>
                  </div>
                  <div x-show="!settings.upgradeResult.ok" class="upgrade-result-status err">
                    <svg class="upgrade-result-icon"><use href="#i-alert-circle"/></svg>
                    <span x-text="lang==='zh' ? '升级失败 — 查看下方步骤' : 'Upgrade failed — see steps below'"></span>
                  </div>
                  <div x-show="settings.upgradeResult.needs_restart" class="restart-hint">
                    <div x-text="lang==='zh' ? '需要重启服务以加载新版 SDK：' : 'Restart service to load new SDK:'"></div>
                    <div class="restart-actions">
                      <button class="btn-ghost sm"
                              :disabled="settings.restarting"
                              @click="restartService()"
                              x-text="settings.restarting ? (lang==='zh' ? '重启中…' : 'Restarting…') : (lang==='zh' ? '一键重启' : 'Restart now')">
                      </button>
                      <span class="settings-hint" style="margin-left:8px"
                            x-text="lang==='zh' ? '或手动执行：' : 'Or run manually:'"></span>
                    </div>
                    <pre x-text="settings.upgradeResult.restart_hint"></pre>
                  </div>
                  <details>
                    <summary x-text="lang==='zh' ? '查看升级日志' : 'View upgrade log'"></summary>
                    <template x-for="(s, i) in settings.upgradeResult.steps" :key="i">
                      <div class="upgrade-step">
                        <div class="upgrade-step-name" x-text="s.step + (s.rc != null ? ' (rc=' + s.rc + ')' : '')"></div>
                        <pre x-show="s.output" x-text="s.output"></pre>
                      </div>
                    </template>
                  </details>
                </div>
              </template>
            </div>
          </template>
          <!-- Standalone restart button — useful any time, not just after upgrade.
               Button + hint wrapped in a single .settings-row-col div so the
               .settings-row grid (220px label + 1fr content) treats them as
               ONE cell. Without the wrapper the button was a direct grid
               item and `justify-self: stretch` (default) blew it up to the
               full 1fr width = ~700px-wide grey block (2026-05-28 screenshot).
               The hint was a 3rd grid child that wrapped to (row 2, col 1)
               and got crushed into the 220px label column. -->
          <div class="settings-row" style="margin-top:12px; padding-top:12px; border-top:1px solid var(--c-border)">
            <label x-text="lang==='zh' ? '重启服务' : 'Restart service'"></label>
            <div class="settings-row-col">
              <button class="btn-ghost sm"
                      :disabled="settings.restarting"
                      @click="restartService()"
                      x-text="settings.restarting ? (lang==='zh' ? '重启中…' : 'Restarting…') : (lang==='zh' ? '重启' : 'Restart')">
              </button>
              <div class="settings-hint"
                   x-text="lang==='zh' ? '升级 SDK / 修改 .env 后，重启让新配置生效。' : 'Use after upgrading the SDK or editing .env.'"></div>
            </div>
          </div>
          <template x-if="!settings.versions && !settings.versionsLoading">
            <div class="settings-hint"
                 x-text="lang==='zh' ? '点击「检查更新」查询 PyPI + npm 上的最新版本。' : 'Click Check to query PyPI + npm for the latest versions.'"></div>
          </template>
        </div>

        <!-- Cost dashboard — aggregated per-turn usage across all sessions.
             Loads lazily when the user navigates to this section; Codex quota
             refresh is intentionally tied to that user action. -->
        <div class="settings-section" data-page="cost"
             x-show="settings.activePage === 'cost'">
          <div class="settings-section-title">
            <span x-text="t('set.sec.cost')"></span>
            <button class="btn-ghost sm" @click="loadCostDashboard(true)"
                    :disabled="cost.loading"
                    x-text="cost.loading ? t('set.cost.loading') : t('set.cost.refresh')"></button>
          </div>
          <template x-if="!cost.data && !cost.loading">
            <div class="settings-hint" x-text="t('set.cost.empty')"></div>
          </template>
          <div class="codex-quota-card" x-show="codexLimit && codexLimit.updated_at">
            <div class="codex-quota-head">
              <div>
                <div class="cost-block-title" x-text="t('set.cost.codex_quota')"></div>
                <div class="settings-hint"
                     x-text="t('set.cost.codex_quota_hint') + (codexLimitUpdatedText() ? ' · ' + codexLimitUpdatedText() : '')"></div>
              </div>
              <span class="settings-badge ok"
                    x-show="codexLimit.plan_type"
                    x-text="codexLimit.plan_type"></span>
            </div>
            <div class="codex-quota-grid">
              <template x-for="w in codexLimitRows()" :key="w.key">
                <div class="codex-quota-window"
                     :class="{ warn: w.used_percent >= 75 && w.used_percent < 90,
                               crit: w.used_percent >= 90 || w.status === 'rejected' }">
                  <div class="codex-quota-label" x-text="rateLimitWindowLabel(w.rate_limit_type) || w.key"></div>
                  <div class="codex-quota-value"
                       x-text="(w.remaining_percent ?? '—') + '%'"></div>
                  <div class="codex-quota-sub"
                       x-text="t('set.cost.remaining') + ' · ' + t('set.cost.used') + ' ' + (w.used_percent ?? '—') + '%'"></div>
                  <div class="codex-quota-reset"
                       x-show="w.resets_at"
                       x-text="t('rl.resets', { t: rateLimitResetText(w.resets_at) })"></div>
                </div>
              </template>
            </div>
          </div>
          <template x-if="codexLimit && !codexLimit.updated_at">
            <div class="settings-hint" x-text="t('set.cost.codex_quota_empty')"></div>
          </template>
          <!-- Skeleton while the (uncached / cold) dashboard scan runs — the
               first load on a large archive reads every session JSONL and can
               take several seconds. Showing the layout's shape beats a blank
               pane with only the button reading "Loading…". -->
          <template x-if="cost.loading && !cost.data">
            <div class="cost-skeleton" aria-busy="true"
                 :aria-label="lang==='zh' ? '用量看板加载中' : 'Loading usage dashboard'">
              <div class="cost-skeleton-chips">
                <div class="sk-chip"></div><div class="sk-chip"></div><div class="sk-chip"></div>
              </div>
              <div class="cost-skeleton-kpis">
                <div class="sk-kpi"></div><div class="sk-kpi"></div>
                <div class="sk-kpi"></div><div class="sk-kpi"></div>
              </div>
              <div class="cost-skeleton-bars">
                <template x-for="i in 14" :key="i"><div class="sk-bar"></div></template>
              </div>
              <div class="cost-skeleton-rows">
                <div class="sk-row"></div><div class="sk-row"></div><div class="sk-row"></div>
              </div>
            </div>
          </template>
          <template x-if="cost.data">
            <div>
              <!-- Filter chips — click to include/exclude a token class
                   from every aggregate below (KPI cards, day bars, vendor
                   rollup, per-model rows). Per user feedback 2026-05-22:
                   the old dashboard piled $ figures + turn counts + vendor
                   USD-not-reported notes; user wanted pure token view with
                   one click to hide individual classes. Numbers on the
                   chips are the last-30-day totals for that class so the
                   filter row also serves as a quick legend. -->
              <div class="cost-token-filters"
                   x-show="cost.data.all_time.input_tokens + cost.data.all_time.output_tokens
                           + cost.data.all_time.cache_read_tokens + cost.data.all_time.cache_creation_tokens > 0">
                <button class="cost-token-chip in"
                        :class="{ inactive: !cost.filters.input }"
                        @click="cost.filters.input = !cost.filters.input"
                        :title="lang==='zh' ? '点击隐藏 / 显示输入 token' : 'Toggle input tokens'"
                        x-text="t('set.cost.in_tokens') + ': ' + fmtTokens(cost.data.last_30d.input_tokens)"></button>
                <button class="cost-token-chip out"
                        :class="{ inactive: !cost.filters.output }"
                        @click="cost.filters.output = !cost.filters.output"
                        :title="lang==='zh' ? '点击隐藏 / 显示输出 token' : 'Toggle output tokens'"
                        x-text="t('set.cost.out_tokens') + ': ' + fmtTokens(cost.data.last_30d.output_tokens)"></button>
                <button class="cost-token-chip cache"
                        :class="{ inactive: !cost.filters.cache }"
                        @click="cost.filters.cache = !cost.filters.cache"
                        :title="lang==='zh' ? '点击隐藏 / 显示缓存 token' : 'Toggle cache tokens'"
                        x-text="t('set.cost.cache_tokens') + ': ' + fmtTokens(cost.data.last_30d.cache_read_tokens + cost.data.last_30d.cache_creation_tokens)"></button>
              </div>

              <!-- 4 KPI cards: token total only. No $ figure (vendors don't
                   report USD consistently — user only wants token counts).
                   No turns-count ("Nx" looked like a multiplier per user
                   feedback). -->
              <div class="cost-kpis">
                <template x-for="key in ['today','last_7d','last_30d','all_time']" :key="key">
                  <div class="cost-kpi">
                    <div class="cost-kpi-label"
                         x-text="key === 'today'    ? t('set.cost.today')
                               : key === 'last_7d'  ? t('set.cost.7d')
                               : key === 'all_time' ? t('set.cost.all')
                               : t('set.cost.30d')"></div>
                    <div class="cost-kpi-value"
                         x-text="fmtTokens(totalTokens(cost.data[key]))"></div>
                  </div>
                </template>
              </div>

              <!-- Per-day bar chart. Tooltip shows the per-class breakdown
                   so the user can drill down without cluttering the bar. -->
              <div class="cost-block-title" x-text="t('set.cost.by_day')"></div>
              <div class="cost-bars">
                <template x-for="d in cost.data.by_day" :key="d.date">
                  <div class="cost-bar"
                       :title="`${d.date} — in=${fmtTokens(d.input_tokens)} · out=${fmtTokens(d.output_tokens)} · cache=${fmtTokens(d.cache_read_tokens + d.cache_creation_tokens)}`">
                    <div class="cost-bar-fill"
                         :style="`height: ${costBarHeight(totalTokens(d))}%`"></div>
                    <div class="cost-bar-label" x-text="d.date.slice(5)"></div>
                  </div>
                </template>
              </div>

              <!-- Per-model breakdown — token total only. by_vendor rollup
                   dropped 2026-05-22 per user feedback "就按模型汇总就行了":
                   model granularity is what users actually want to see;
                   vendor totals are easy to mentally sum from the per-model
                   list (≤ 5 vendors), and the extra section ate vertical
                   space without earning it. -->
              <!-- ===== by_model ===== -->
              <div class="cost-block-title" x-text="t('set.cost.by_model')"></div>
              <div class="cost-models">
                <template x-for="m in cost.data.by_model" :key="m.model">
                  <div class="cost-model-row">
                    <!-- Friendly label only; raw model id on title= so power
                         users can hover to see e.g. "claude-sonnet-4-6"
                         while the row reads "Sonnet 4.6". Vendor chip + the
                         by_vendor rollup section were both dropped
                         2026-05-22 — model granularity is what users
                         actually want, vendor totals are easy to mentally
                         sum from the per-model list. -->
                    <div class="cost-model-name" :title="m.model">
                      <span x-text="m.label || m.model"></span>
                    </div>
                    <div class="cost-model-bar-track">
                      <div class="cost-model-bar-fill"
                           :style="`width: ${costModelPct(totalTokens(m))}%`"></div>
                    </div>
                    <div class="cost-model-amount"
                         x-text="fmtTokens(totalTokens(m))"></div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>

        <div class="settings-section" data-page="defaults"
             x-show="settings.activePage === 'defaults'">
          <div class="settings-section-title">
            <span x-text="t('set.sec.defaults')"></span>
            <span class="settings-save-mode batch" x-text="t('set.mode.batch')"></span>
          </div>
          <div class="settings-row">
            <label x-text="t('set.label.default_model')"></label>
            <select x-model="settings.draftDefaults.model" class="settings-input">
              <template x-for="m in availableModels" :key="m.model">
                <option :value="m.model" x-text="m.group + ' · ' + m.label"></option>
              </template>
            </select>
          </div>
          <div class="settings-row">
            <label x-text="t('set.label.default_permission')"></label>
            <select x-model="settings.draftDefaults.permission" class="settings-input">
              <option value="bypassPermissions" x-text="lang==='zh' ? 'bypass（无提示）' : 'bypass (no prompts)'"></option>
              <option value="acceptEdits">acceptEdits</option>
              <option value="default">default</option>
              <option value="plan">plan</option>
            </select>
          </div>
          <div class="settings-hint warn"
               x-show="settings.draftDefaults.permission === 'bypassPermissions'"
               x-text="lang==='zh'
                 ? '⚠ bypass 模式下 Muse 可以读 / 改 / 删 archive 内任意文件，不会弹窗确认。仅在你充分信任当前对话内容时使用。'
                 : '⚠ In bypass mode Muse can read / edit / delete any file under your archive without confirmation. Only use it when you fully trust what you ask.'"></div>
        </div>

        <!-- Notifications — single switch (2026-05-28, collapsed from 4
             toggles into one). ON does best-effort across capabilities:
             foreground vibration when scheduler unread ticks up, Web Push
             subscription for background. The backend gates both event
             classes (scheduled task done, chat turn done) on
             presence.recently_active() so the user is never double-
             notified while actively at a device — no per-class server-
             side mute needed. -->
        <div class="settings-section" data-page="notification"
             x-show="settings.activePage === 'notification'">
          <div class="settings-section-title">
            <span x-text="lang==='zh' ? '通知' : 'Notifications'"></span>
