<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,interactive-widget=resizes-content,viewport-fit=cover" />
<!-- noindex defense: muselab is a personal archive. If a user accidentally
     exposes their instance (Cloudflare tunnel, port-forward, misconfigured
     reverse proxy), search engines should not slurp it up. Belt + suspenders
     with /robots.txt served from main.py. -->
<meta name="robots" content="noindex, nofollow, noarchive" />
<!-- Asset version this HTML was served with. Substituted by main.py's
     index() handler at request time (placeholder replaced with current
     _asset_version()). Read by app.js on boot / visibilitychange to
     detect stale-PWA scenarios (mobile Safari often resumes a
     backgrounded tab without re-fetching HTML — the JS keeps running
     last week's code against today's API). When the live /api/meta
     reports a newer version, the client hard-reloads. -->
<meta name="muselab-asset-version" content="__MUSELAB_ASSET_VERSION__" />
<title>muselab — Meet Muse</title>

<!-- PWA: manifest + icons + iOS standalone behavior. Added so "Add to
     Home Screen" produces an app-like icon, full-screen launch (no
     browser chrome), and theme-colored status bar. -->
<link rel="manifest" href="/static/assets/manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="/static/assets/icon.svg" />
<link rel="alternate icon" type="image/png" href="/static/assets/icon-512.png" />
<link rel="apple-touch-icon" href="/static/assets/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="muselab" />
<!-- 'default' lets iOS auto-tint the status bar to follow theme-color
     below, rather than forcing a translucent overlay that would need
     extra safe-area padding throughout the layout. -->
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#f5f0e0" />

<link rel="stylesheet" href="/static/styles.css" />
<!-- highlight.js theme CSS preloaded (4 KB) so highlighted code blocks
     don't FOUC when hljs lazy-loads. The 124 KB hljs script itself is
     lazy-loaded via `_loadHljs()` in app.js on first highlightCode()
     call — only ~25 % of paint cycles need it (chat without code blocks
     never triggers). Mirrors the KaTeX / CodeMirror / Mermaid pattern.
     2026-05-28: lazy-loaded to shave ~150 KB off cold-start payload. -->
<link id="hljs-theme" rel="stylesheet" href="/static/vendor/highlight-theme.css" />
<!-- i18n + static UI data must load BEFORE app.js (which reads
     window.MUSELAB_* at module top-level). `defer` preserves order for
     same-attribute scripts. -->
<script defer src="/static/i18n/index.js"></script>
<script defer src="/static/data/constants.js"></script>
<script defer src="/static/app.js"></script>
<script defer src="/static/vendor/marked.min.js"></script>
<script defer src="/static/vendor/purify.min.js"></script>
<!-- KaTeX (math rendering for $...$ / $$...$$) and CodeMirror (preview-pane
     edit mode) are NOT preloaded here — both together account for ~870 KB
     of cold-start payload that only the math-using or edit-mode-using
     minority of users actually needs. They're lazy-loaded via
     `_loadKatex()` / `_loadCodemirror()` in app.js on first use, mirroring
     the existing pattern for Mermaid (~3.2 MB lazy-loaded on first
     mermaid block render). -->
<!-- Production: minified Alpine. The dev build (alpine.dev.js) ships
     more verbose error messages + heavier source size; only swap back
     when actively chasing an Alpine-internal bug. (The TEMP comment
     here used to defer the switch — root cause found, switched back
     2026-05-23.) -->
<script defer src="/static/vendor/alpine.min.js"></script>
</head>

<!-- Pre-Alpine fallback splash. Uses the same `.splash` styles as the Alpine
     version so the transition is invisible. Removed by x-init the moment
     Alpine takes over. -->
<div id="loading" class="splash">
  <span class="muse-mascot lg splash-mascot" style="width:72px;height:72px;display:inline-flex">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;color:#6093ff">
      <path d="M12 3 L20 7.5 L20 16.5 L12 21 L4 16.5 L4 7.5 Z"/>
    </svg>
  </span>
  <div class="splash-logo">muse<span class="accent">·lab</span></div>
  <div class="splash-text" id="splash-text">正在唤醒 Muse</div>
</div>
<script>
  // Localize the pre-Alpine splash based on browser language so a
  // non-Chinese first-time visitor doesn't see a Chinese-only "正在唤
  // 醒 Muse" before Alpine boots.
  (function () {
    var lang = (navigator.language || "").toLowerCase();
    if (!lang.startsWith("zh")) {
      var el = document.getElementById("splash-text");
      if (el) el.textContent = "Waking Muse…";
    }
  })();
</script>
<div id="jserr"></div>
<script>
// Dev-only on-screen error banner. Gated to localhost / 127.0.0.1 /
// *.local so end-users on a deployed muselab never see raw JS stack
// traces in a red strip across the top — that's a "looks broken / I'm
// in over my head" UX moment users don't recover from. Errors still
// flow through the app.js capture path (window.__museErrors__ + POST
// /api/log/client-error) so the operator can debug from server logs.
// Opting back in on a deployed instance: set localStorage.muselab_devmode = "1"
// (manual escape hatch for remote debugging).
(function () {
  var h = location.hostname;
  var isDev = h === "localhost" || h === "127.0.0.1" || h === "::1"
            || /\.local$/.test(h);
  var optIn = false;
  try { optIn = localStorage.getItem("muselab_devmode") === "1"; } catch (_) {}
  if (!isDev && !optIn) return;
  window.addEventListener("error", function (e) {
    var d = document.getElementById("jserr");
    if (!d) return;
    d.style.cssText = "display:block;padding:20px;color:red;background:#fff;font-family:monospace;white-space:pre-wrap;position:fixed;top:0;left:0;right:0;z-index:9999;max-height:50vh;overflow:auto";
    d.textContent += "[error] " + e.message + " at " + e.filename + ":" + e.lineno + "\n";
  });
})();
</script>

  <symbol id="i-dollar" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></symbol>
  <!-- Gauge — Pro/Max rate-limit utilization badge in the chat toolbar. -->
  <symbol id="i-gauge" viewBox="0 0 24 24"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></symbol>
  <!-- List — "configured tasks" section header. -->
  <symbol id="i-list" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></symbol>
  <!-- History — clock with circular arrow, "recent runs" section header. -->
  <symbol id="i-history" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><polyline points="3 3 3 8 8 8"/><polyline points="12 7 12 12 15 14"/></symbol>
  <!-- ===== Image annotation editor tools (added 2026-05-28) ===== -->
  <!-- Pen — freedraw stroke tool. -->
  <symbol id="i-pen" viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></symbol>
  <!-- Arrow up-right — arrow tool. -->
  <symbol id="i-arrow-ur" viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></symbol>
  <!-- Eraser. -->
  <symbol id="i-eraser" viewBox="0 0 24 24"><path d="M20 20H7L3 16a2 2 0 0 1 0-3l8.5-8.5a2 2 0 0 1 3 0L21 11a2 2 0 0 1 0 3l-6 6"/><line x1="18" y1="13" x2="9" y2="4"/></symbol>
  <!-- Undo — Lucide-style "left-arrow with up-curving return path".
       The previous shape (`M3 7v6h6` + a half-circle arc) rendered as
       an ellipsis-with-hook that nobody could read as "undo" — user
       feedback 2026-05-28 with a screenshot. This is the universally
       recognized undo glyph: clear `<` arrowhead on the left + line
       turning up and right, mirrored from Lucide's `undo-2`. -->
  <symbol id="i-undo" viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></symbol>

  <!-- ===== Nine Muses (希腊九缪斯) — 抽象几何形象，按日期+小时哈希挑一个 =====
       每个 id 对应 app.js MASCOTS 表里的一位缪斯（Calliope/Clio/Erato/...）。 -->
  <symbol id="m-hex"      viewBox="0 0 24 24"><path d="M12 3 L20 7.5 L20 16.5 L12 21 L4 16.5 L4 7.5 Z"/></symbol>           <!-- Calliope: 六边形，史诗的结构基底 -->
  <symbol id="m-bars"     viewBox="0 0 24 24"><line x1="4" y1="7" x2="20" y2="7"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="17" x2="14" y2="17"/></symbol> <!-- Clio: 卷轴/史册的层叠 -->
  <symbol id="m-lens"     viewBox="0 0 24 24"><circle cx="9" cy="12" r="6"/><circle cx="15" cy="12" r="6"/></symbol>          <!-- Erato: vesica piscis，古典爱与结合的几何 -->
  <symbol id="m-wave"     viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M5 12 Q 8.5 6 12 12 T 19 12"/></symbol> <!-- Euterpe: 声波 -->
  <symbol id="m-crescent" viewBox="0 0 24 24"><path d="M16 3 A 9 9 0 1 0 16 21 A 7 7 0 1 1 16 3 Z"/></symbol>                  <!-- Melpomene: 残月，悲剧之夜 -->
  <symbol id="m-halo"     viewBox="0 0 24 24"><circle cx="12" cy="14" r="5"/><path d="M5 8 A 7 4 0 0 1 19 8"/></symbol>      <!-- Polyhymnia: 圣光环 -->
  <symbol id="m-trio"     viewBox="0 0 24 24"><path d="M12 6 L6 17 L18 17 Z"/><circle cx="12" cy="6" r="2" fill="currentColor"/><circle cx="6" cy="17" r="2" fill="currentColor"/><circle cx="18" cy="17" r="2" fill="currentColor"/></symbol> <!-- Terpsichore: 三美神舞步 -->
  <symbol id="m-spark"    viewBox="0 0 24 24"><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/><circle cx="12" cy="12" r="2" fill="currentColor"/></symbol> <!-- Thalia: 火花/喜剧的灵光 -->
  <symbol id="m-orbit"    viewBox="0 0 24 24"><circle cx="11" cy="13" r="5"/><circle cx="18.5" cy="6" r="1.6" fill="currentColor"/></symbol> <!-- Urania: 行星 + 卫星 -->
</defs>
</svg>

<!-- x-init removes the no-JS splash only. Alpine 3 auto-invokes the
     component's init() method when x-data evaluates — calling it again
     here would double-fire _checkInterruptedTurns() and toast every
     interrupted-turn notice twice. See 2026-05-22 fix. -->
<div id="app" x-data="portal()" x-init="document.getElementById('loading').remove()"
     x-effect="document.title = pageTitle()" x-cloak>

  <!-- Splash — first load / hard refresh, before initial data arrives -->
  <div class="splash" x-show="!appReady" x-transition.opacity.duration.300ms x-cloak>
    <span class="muse-mascot lg splash-mascot">
      <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
    </span>
    <div class="splash-logo">muse<span class="accent">·lab</span></div>
    <div class="splash-text" x-text="t('splash.greet')"></div>
    <div class="splash-hint" x-show="splashHint" x-text="splashHint"></div>
  </div>

  <!-- Connection banner — slim sticky bar when backend is briefly unreachable -->
  <div class="conn-banner" x-show="connState !== 'ok'"
       :class="{ reconnecting: connState === 'reconnecting',
                  reconnected:  connState === 'reconnected' }"
       x-transition.opacity x-cloak>
    <span x-show="connState === 'reconnecting'" x-text="t('conn.reconnecting')"></span>
    <span x-show="connState === 'reconnected'"  x-text="t('conn.reconnected')"></span>
  </div>

  <!-- 登录 — 用 template+x-if 而不是 x-show，让 input type=password 在认证后
       真的从 DOM 移除。否则它一直挂着，iOS 17+ 会把整页识别成"账户上下文"，
       chat textarea 一聚焦就被 AutoFill 快译条占一行。 -->
  <template x-if="!authed && appReady">
    <div class="login">
      <span class="muse-mascot lg" :class="{'greet': mascotGreet}">
        <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
      </span>
      <h2 class="login-logo">muse<span class="accent">lab</span></h2>
      <p class="login-tagline" x-text="t('login.tagline')"></p>
      <p class="login-sub" x-html="t('login.sub')"></p>
      <input type="password" :placeholder="t('login.token_placeholder')" x-model="tokenInput"
             @keydown.enter="login()" autofocus />
      <button @click="login()" class="btn-primary" x-text="t('login.go')"></button>
      <p class="err" x-text="loginErr"></p>
      <p class="login-hint" x-show="loginErr" x-text="t('login.hint_on_err')"></p>
    </div>
  </template>

  <!-- 主界面 -->
  <div class="layout" x-show="authed" :style="layoutStyle()"
       :data-mobile-tab="mobileTab" :data-desktop-full="desktopFullPane">

    <!-- ============ 左：文件树 ============ -->
    <aside class="pane files" :class="{'pane-hidden': !leftOpen}">
      <header class="pane-head">
        <span class="pane-title"><span class="icon"><svg><use href="#i-folder"/></svg></span><span x-text="t('pane.files')"></span></span>
        <span class="spacer"></span>
        <button @click="$refs.upload.click()" class="icon-btn files-keep-mobile" :title="t('btn.upload')"><svg><use href="#i-upload"/></svg></button>
        <button @click="mkdirPrompt()" class="icon-btn" :title="t('btn.new_dir')"><svg><use href="#i-folder-plus"/></svg></button>
        <button @click="toggleHidden()" class="icon-btn"
                :class="showHidden ? 'active' : ''"
                :title="showHidden ? t('btn.hide_hidden') : t('btn.show_hidden')">
          <svg><use href="#i-eye"/></svg>
        </button>
        <button @click="toggleTheme()" class="icon-btn files-keep-mobile"
                :title="theme==='light' ? t('btn.theme_dark') : theme==='dark' ? t('btn.theme_eyecare') : t('btn.theme_light')">
          <svg x-show="theme==='light'"><use href="#i-moon"/></svg>
          <svg x-show="theme==='dark'"><use href="#i-leaf"/></svg>
          <svg x-show="theme==='eyecare'"><use href="#i-sun"/></svg>
        </button>
        <!-- Command palette — mobile-only here. On desktop it lives in the
             chat header; on phones the chat header is cramped, so per user
             request (2026-05-30) the magnifier moves next to the theme
             toggle in the files header. `files-keep-mobile` exempts it from
             the files-head mobile declutter; `files-palette-mobile` keeps it
             hidden on desktop so it isn't duplicated. -->
        <button @click="openPalette()" class="icon-btn files-keep-mobile files-palette-mobile"
                :title="lang==='zh' ? '命令面板（搜索文件 / 会话 / 操作）' : 'Command palette'"
                aria-label="Command palette">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <input type="file" x-ref="upload" multiple style="display:none" @change="upload($event)" />
      </header>
      <div class="searchbar">
        <div class="searchbar-wrap">
          <span class="searchbar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input type="text" :placeholder="t('files.search_placeholder')" x-model="searchQ"
                 @input.debounce.300ms="doSearch()" />
        </div>
        <button x-show="searchMode" @click="clearSearch()" class="icon-btn" :title="lang==='zh'?'清空':'Clear'"><svg><use href="#i-x"/></svg></button>
      </div>

      <!-- "打开的文件" — 当前打开的 preview tab 列表。
           Row layout: grid (icon · name · ×) — name 中段 truncate，× 不重叠。
           高度调节：底部 splitter bar（draggable），不依赖 CSS resize 手柄。 -->
      <div class="open-files" x-show="!searchMode && tabs.length > 0">
        <div class="open-files-head"
             @click="openFilesCollapsed = !openFilesCollapsed"
             :title="openFilesCollapsed ? (lang==='zh'?'展开':'Expand') : (lang==='zh'?'折叠':'Collapse')">
          <button class="open-files-toggle" type="button" tabindex="-1"
                  aria-hidden="true">
            <svg x-show="!openFilesCollapsed"><use href="#i-chevron-down"/></svg>
            <svg x-show="openFilesCollapsed"><use href="#i-chevron-right"/></svg>
          </button>
          <span class="open-files-label"
                x-text="(lang==='zh'?'打开的文件 ':'Open ') + '(' + tabs.length + ')'"></span>
          <button class="open-files-close-all icon-btn sm"
                  @click.stop="closeAllTabs()"
                  :title="lang==='zh'?'关闭全部':'Close all'"><svg><use href="#i-x"/></svg></button>
        </div>
        <ul class="open-files-list" x-show="!openFilesCollapsed"
            :style="openFilesHeight ? `height: ${openFilesHeight}px; max-height: none` : ''"
            @dragover="onListDragAutoScroll($event, $el)"
            @drop="_stopDragAutoScroll()">
          <template x-for="t in tabs" :key="'opf-' + t.path">
            <li :class="{sel: selected === t.path, 'drag-over': previewDragOverPath === t.path}"
                :data-path="t.path"
                :data-ext="fileExtClass({path: t.path, name: t.name, is_dir: false})"
                :draggable="isPointerDevice"
                @dragstart="onPreviewTabDragStart($event, t.path)"
                @dragover.prevent="onPreviewTabDragOver($event, t.path)"
                @dragleave="onPreviewTabDragLeave(t.path)"
                @drop.prevent="onPreviewTabDrop($event, t.path)"
                @dragend="onPreviewTabDragEnd()"
                @click="switchTab(t.path)"
                @contextmenu.prevent="showPreviewTabMenu($event, t.path)"
                :title="t.path">
              <span class="icon"><svg><use :href="iconRef({name: t.name, is_dir: false})"/></svg></span>
              <span class="name" x-text="t.name"></span>
              <span class="tab-dirty" x-show="selected===t.path && _editorDirty()"
                    :title="lang==='zh'?'有未保存的改动':'Unsaved changes'"></span>
              <button class="open-files-x"
                      @click.stop="closeTab(t.path)"
                      :title="lang==='zh'?'关闭':'Close'">×</button>
            </li>
          </template>
        </ul>
        <!-- Splitter — drag to resize the list height. -->
        <div class="open-files-splitter"
             x-show="!openFilesCollapsed"
             @mousedown="startOpenFilesResize($event)"
             :title="lang==='zh'?'拖动调整高度':'Drag to resize'"></div>
      </div>

      <!-- File tree — wrapped so the root-path bar can sticky at the top of
           the scrollable area (always visible while user scrolls deep into
           subdirs). The wrap + bar also act as a visual divider against the
           "Open files" section above. -->
      <div class="filelist-wrap" x-show="!searchMode">
        <div class="filelist-sticky-root"
             :class="{ 'drag-over': dragOverRoot }"
             :title="contextInfo.archive_root || ''"
             @dragover.prevent="onTreeRootDragOver($event)"
             @dragleave="dragOverRoot = false"
             @drop.prevent="onTreeRootDrop($event)">
          <span class="icon"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12L12 3l9 9M5 10v10h14V10"/></svg></span>
          <span class="path" x-text="contextInfo.archive_root || '—'"></span>
          <!-- Root-level quick actions. Same doNewFile/doNewDir the per-dir
               "+" and ctx menu use — both already handle path:'' (root), so
               these are pure entry points, no new write paths. @click.stop
               keeps the bar's drag/drop handlers out of the click. -->
          <span class="root-actions">
            <button class="root-action" type="button"
                    @click.stop="doNewFile({ path: '', is_dir: true })"
                    :title="lang==='zh' ? '在根目录新建文件' : 'New file at root'"
                    aria-label="New file at root">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><use href="#i-plus"/></svg>
            </button>
            <button class="root-action" type="button"
                    @click.stop="doNewDir({ path: '', is_dir: true })"
                    :title="lang==='zh' ? '在根目录新建目录' : 'New folder at root'"
                    aria-label="New folder at root">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><use href="#i-folder-plus"/></svg>
            </button>
            <button class="root-action" type="button"
                    @click.stop="reloadTree()"
                    :title="t('btn.refresh')"
                    aria-label="Refresh file tree">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><use href="#i-refresh"/></svg>
            </button>
          </span>
        </div>
      <ul class="filelist" x-init="_attachPTR($el, () => reloadTree())"
          @mousedown="onMarqueeStart($event)">
        <template x-for="n in visible" :key="n.path">
          <li :class="{file: !n.is_dir, dir: n.is_dir, sel: isRowSelected(n), 'drag-over': dragOver===n.path}"
              :style="`padding-left:${10 + n.depth*14}px; --depth: ${n.depth}`"
              :data-path="n.path"
              :data-depth="n.depth"
              :data-ext="fileExtClass(n)"
              :draggable="isPointerDevice && isRowSelected(n)"
              @dragstart="onTreeNodeDragStart($event, n)"
              @dragend="dragOver=''; dragOverRoot=false; _dragSrcPath=null; _dragSrcPaths=null"
              @click="onNodeClick($event, n)"
              @touchstart="onTreeTouchStart($event, n)"
              @touchmove="onTreeTouchMove($event)"
              @touchend="onTreeTouchEnd($event)"
              @touchcancel="onTreeTouchEnd($event)"
              @dblclick="onNodeDblClick(n)"
              @contextmenu.prevent="openCtxMenu($event, n)"
              @dragover.prevent="onTreeNodeDragOver($event, n)"
              @dragleave="dragOver=''"
              @drop.prevent="onDrop($event, n)">
            <span class="caret">
              <svg x-show="n.is_dir && expanded.has(n.path)"><use href="#i-chevron-down"/></svg>
              <svg x-show="n.is_dir && !expanded.has(n.path)"><use href="#i-chevron-right"/></svg>
            </span>
            <span class="icon"><svg><use :href="iconRef(n)"/></svg></span>
            <span class="name" x-text="n.name" :title="n.name"></span>
            <!-- VSCode-style inline actions. Hidden by default; revealed on
                 hover (desktop) or always faded (touch — no hover). The "⋯"
                 more-menu renders for BOTH files and dirs — plain files used
                 to rely on @contextmenu only, which iOS Safari long-press
                 intercepts (system callout), leaving touch users no way to
                 rename / delete / copy a file. The "+" (new file here) stays
                 dir-only. @click.stop so the action doesn't also toggle the row. -->
            <span class="tree-actions">
              <button class="tree-action" type="button"
                      x-show="n.is_dir"
                      @click.stop="doNewFile(n)"
                      :title="lang==='zh' ? '在此目录新建文件' : 'New file here'"
                      aria-label="New file">+</button>
              <button class="tree-action" type="button"
                      @click.stop="openCtxMenu($event, n)"
                      :title="lang==='zh' ? '更多操作（重命名 / 删除 / 复制 / 上传…）' : 'More (rename / delete / copy / upload…)'"
                      aria-label="More">⋯</button>
            </span>
            <span class="size" x-show="!n.is_dir" x-text="fmtSize(n.size)"></span>
          </li>
        </template>
      </ul>
      <!-- Marquee (rubber-band) selection box. Lives in .filelist-wrap (which
           is position:relative + overflow:hidden, so the box is clipped to the
           pane) and is drawn in viewport-relative coords so it tracks a fixed
           screen region while the list auto-scrolls underneath. Desktop only. -->
      <div class="tree-marquee" x-show="marquee.active"
           :style="`left:${marquee.x}px; top:${marquee.y}px; width:${marquee.w}px; height:${marquee.h}px`"></div>
      </div>

      <!-- 搜索结果 -->
      <div class="search-results" x-show="searchMode">
        <div class="search-section" x-show="searchHits.length">
          <div class="search-heading">
            <span class="icon"><svg><use href="#i-file"/></svg></span>
            <span x-text="lang==='zh' ? '文件名' : 'File names'"></span>
            <span class="count" x-text="'('+searchHits.length+(searchTruncated?'+':'')+')'"></span>
          </div>
          <template x-for="n in searchHits" :key="'name-'+n.path">
            <div :class="'srow ' + (selected===n.path?'sel':'')" @click="onSearchClick(n)">
              <span class="icon"><svg><use :href="iconRef(n)"/></svg></span>
              <div class="body">
                <div class="name" x-text="n.name"></div>
                <div class="path-hint" x-text="n.path"></div>
              </div>
            </div>
          </template>
        </div>
        <div class="search-section" x-show="grepHits.length">
          <div class="search-heading">
            <span class="icon"><svg><use href="#i-file-search"/></svg></span>
            <span x-text="lang==='zh' ? '内容' : 'Content'"></span>
            <span class="count" x-text="'('+grepHits.length+(grepTruncated?'+':'')+')'"></span>
          </div>
          <template x-for="(h,i) in grepHits" :key="'grep-'+i">
            <div :class="'srow ' + (selected===h.path?'sel':'')" @click="openByPath(h.path)">
              <span class="icon"><svg><use :href="iconRef(h)"/></svg></span>
              <div class="body">
                <div class="name" x-text="h.name + ':' + h.line"></div>
                <div class="snippet" x-text="h.snippet"></div>
                <div class="path-hint" x-text="h.path"></div>
              </div>
            </div>
          </template>
        </div>
        <div class="hint-row" x-show="!searchHits.length && !grepHits.length && !searching" x-text="t('files.empty_search')"></div>
        <div class="hint-row" x-show="searching" x-text="t('files.searching')"></div>
      </div>
      <!-- Trash footer: docked at the bottom of the files pane.
           - Click → open trash modal
           - Drag a file-tree node onto it → move that file to trash
             (no confirm — the drag IS the intent; Undo toast covers
             accidental drops, same UX as Finder / Files apps).
           - dragOverTrash state drives a red-highlight + scale-up
             animation so the user sees they've hit a valid target.
           Badge shows count when > 0. -->
      <footer class="files-foot"
              @dragover.prevent="onTrashDragOver($event)"
              @dragleave.prevent="dragOverTrash = false"
              @drop.prevent="onTrashDrop($event)">
        <button class="files-foot-trash"
                :class="{ 'drag-over': dragOverTrash, 'has-items': trash.count > 0 }"
                @click="openTrashModal()"
                :title="lang==='zh' ? '垃圾桶 · 点击查看，拖文件进来删除' : 'Trash · click to view, drag files here to delete'">
          <span class="icon"><svg><use href="#i-trash"/></svg></span>
        </button>
      </footer>
    </aside>

    <!-- resizer between files and preview -->
    <div class="resizer" :class="{'pane-hidden': !leftOpen}" @mousedown="startResize('left', $event)"></div>

    <!-- ============ 中：预览 ============ -->
    <section class="pane preview">
      <header class="pane-head">
        <button @click="toggleFilesPane()" class="icon-btn"
                :title="desktopFullPane === 'preview'
                  ? (lang==='zh' ? '退出全屏并显示文件区' : 'Exit fullscreen & show files')
                  : (leftOpen ? t('btn.hide_left') : t('btn.show_left'))">
          <!-- In preview-fullscreen the chevron always reads as "show left"
               (chevron-right) since files pane is hidden by the fullscreen
               layout — tapping it exits fullscreen + un-hides the pane. -->
          <svg x-show="leftOpen && desktopFullPane !== 'preview'"><use href="#i-chevron-left"/></svg>
          <svg x-show="!leftOpen || desktopFullPane === 'preview'"><use href="#i-chevron-right"/></svg>
        </button>
        <span class="pane-title" x-text="selected ? selected.split('/').pop() : t('pane.preview')"></span>
        <!-- File path + last-modified strip. Fills the gap between the title
             and the action icons; when no file is open it's empty but still
             flex:1, so it doubles as the old `.spacer`. Light/muted styling. -->
        <div class="pane-fileinfo" x-cloak>
          <template x-if="selected">
            <div class="pane-fileinfo-row">
              <span class="pane-fileinfo-path" :title="selected" x-text="selected"></span>
              <span class="pane-fileinfo-mtime"
                    x-show="selectedMeta && selectedMeta.mtime">
                <span class="pane-fileinfo-mtime-label"
                      x-text="lang === 'zh' ? '上次修改 ' : 'modified '"></span><span
                      x-text="selectedMeta && selectedMeta.mtime ? fmtMtime(selectedMeta.mtime) : ''"></span>
              </span>
            </div>
          </template>
        </div>
        <!-- Preview zoom (browser-like −/percentage/+). Shown only for the
             zoomable modes (md/text/img/xlsx/csv/html); pdf has native zoom.
             Click the percentage to reset to 100%. -->
        <div class="preview-zoom" x-show="previewZoomable()">
          <button class="preview-zoom-btn" @click="zoomPreviewOut()"
                  :disabled="previewZoom <= PREVIEW_ZOOM_MIN"
                  :title="lang==='zh' ? '缩小' : 'Zoom out'"
                  :aria-label="lang==='zh' ? '缩小' : 'Zoom out'">−</button>
          <button class="preview-zoom-pct" @click="resetPreviewZoom()"
                  :title="lang==='zh' ? '重置为 100%' : 'Reset to 100%'"
                  x-text="previewZoomPct()"></button>
          <button class="preview-zoom-btn" @click="zoomPreviewIn()"
                  :disabled="previewZoom >= PREVIEW_ZOOM_MAX"
                  :title="lang==='zh' ? '放大' : 'Zoom in'"
                  :aria-label="lang==='zh' ? '放大' : 'Zoom in'">+</button>
        </div>
        <button x-show="selected && !editing && (previewMode==='md' || previewMode==='text')"
                @click="togglePreviewFind()" class="icon-btn preview-keep-mobile"
                :class="{ active: previewFind.open }"
                :title="lang==='zh' ? '搜索内容' : 'Find in file'"
                :aria-label="lang==='zh' ? '搜索内容' : 'Find in file'"
                :aria-pressed="previewFind.open">
          <svg><use href="#i-search"/></svg>
        </button>
        <button x-show="selected" @click="reloadPreview()" class="icon-btn preview-keep-mobile"
                :title="lang==='zh' ? '刷新预览' : 'Reload preview'"
                :aria-label="lang==='zh' ? '刷新预览' : 'Reload preview'">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
        <button x-show="selected && isEditable(selected)" @click="toggleEdit()" class="icon-btn"
                @mouseenter="_loadCodemirror().catch(()=>{})" @focus="_loadCodemirror().catch(()=>{})"
                :title="editing ? t('btn.preview') : t('btn.edit')">
          <svg x-show="!editing"><use href="#i-edit"/></svg>
          <svg x-show="editing"><use href="#i-eye"/></svg>
        </button>
        <button x-show="editing" @click="saveEdit()" class="btn-primary btn-compact" x-text="t('btn.save')"></button>
        <button x-show="selected" @click="insertFileMention(selected)" class="icon-btn preview-keep-mobile" :title="t('btn.at_mention')"><svg><use href="#i-at"/></svg></button>
        <!-- Desktop fullscreen toggle (hidden on mobile via .pane-fullscreen-btn
             @media in styles.css). Click → preview pane takes whole viewport;
             click again to restore the 3-column layout. -->
        <button @click="toggleDesktopFull('preview')" class="icon-btn pane-fullscreen-btn"
                :title="desktopFullPane==='preview' ? (lang==='zh' ? '退出全屏' : 'Exit fullscreen') : (lang==='zh' ? '全屏预览' : 'Fullscreen preview')"
                :aria-pressed="desktopFullPane==='preview'">
          <svg x-show="desktopFullPane!=='preview'"><use href="#i-maximize"/></svg>
          <svg x-show="desktopFullPane==='preview'"><use href="#i-minimize"/></svg>
        </button>
        <button @click="toggleChatPane()" class="icon-btn"
                :title="desktopFullPane === 'preview'
                  ? (lang==='zh' ? '退出全屏并显示 Muse' : 'Exit fullscreen & show Muse')
                  : (rightOpen ? t('btn.hide_right') : t('btn.show_right'))">
          <!-- In preview-fullscreen the chevron always reads as "show Muse"
               (chevron-left) since the Muse pane is hidden by the fullscreen
               layout — tapping it exits fullscreen + un-hides the pane. -->
          <svg x-show="rightOpen && desktopFullPane !== 'preview'"><use href="#i-chevron-right"/></svg>
          <svg x-show="!rightOpen || desktopFullPane === 'preview'"><use href="#i-chevron-left"/></svg>
        </button>
      </header>
      <!-- Tab bar (VSCode-style multi-file) -->
      <div class="tab-bar" x-show="tabs.length">
        <!-- Open-tabs quick picker — fixed at the left edge, OUTSIDE the
             horizontally-scrolling .tab-bar-list (same structure as the chat
             pane's history button). Keeping it out of the scroll container
             avoids the iOS Safari hit-test bug where taps on a position:sticky
             element inside an overflow-x container are swallowed. The dropdown
             lists only the currently-open file tabs (not the whole tree). -->
        <div class="tab-picker" @click.outside="editorTabPickerOpen = false">
          <button class="tab-picker-btn" type="button"
                  @click="toggleEditorTabPicker($event)"
                  :title="lang==='zh' ? '打开的标签' : 'Open tabs'">
            <svg><use href="#i-list"/></svg>
          </button>
          <div x-show="editorTabPickerOpen" x-transition.opacity.duration.150ms
               class="session-picker-pop tab-picker-pop"
               :style="editorTabPickerStyle"
               role="listbox">
            <template x-for="t in tabs" :key="t.path">
              <div class="session-picker-row"
                   :class="{ active: selected === t.path }"
                   @click="pickEditorTab(t.path)"
                   role="option"
                   :title="t.path">
                <span class="icon"><svg><use :href="iconRef({name: t.name, is_dir: false})"/></svg></span>
                <span class="ellipsis" x-text="t.name"></span>
              </div>
            </template>
          </div>
        </div>
        <!-- Scrolling tab strip — only this part overflows horizontally. -->
        <div class="tab-bar-list">
        <template x-for="t in tabs" :key="t.path">
          <div :class="'tab' + (selected===t.path ? ' active' : '') + (t.preview ? ' preview' : '') + (previewDragOverPath===t.path ? ' drag-over' : '')"
               :draggable="isPointerDevice"
               :data-path="t.path"
               @dragstart="onPreviewTabDragStart($event, t.path)"
               @dragover.prevent="onPreviewTabDragOver($event, t.path)"
               @dragleave="onPreviewTabDragLeave(t.path)"
               @drop.prevent="onPreviewTabDrop($event, t.path)"
               @dragend="onPreviewTabDragEnd()"
               @click="switchTab(t.path)"
               @dblclick="pinTab(t.path)"
               @contextmenu.prevent="showPreviewTabMenu($event, t.path)"
               @auxclick.prevent="onPreviewTabAuxClick($event, t.path)"
               :title="t.path">
            <span class="icon"><svg><use :href="iconRef({name: t.name, is_dir: false})"/></svg></span>
            <span class="tab-name" x-text="t.name"></span>
            <!-- Unsaved-edits dot: only the currently-open file can be edited
                 (single editing buffer keyed by `selected`), so the dot tracks
                 selected===t.path && dirty. -->
            <span class="tab-dirty" x-show="selected===t.path && _editorDirty()"
                  :title="lang==='zh'?'有未保存的改动':'Unsaved changes'"></span>
            <button class="tab-close" @click.stop="closeTab(t.path)" :title="lang==='zh'?'关闭（中键也可）':'Close (middle-click also)'">×</button>
          </div>
        </template>
        </div>
      </div>

      <!-- Preview tab right-click menu. Uses a fullscreen overlay to catch
           "outside" clicks instead of Alpine's @click.outside — the latter
           was firing on the same right-click event sequence and dismissing
           the menu instantly. -->
      <template x-if="previewTabCtxMenu">
        <div class="ctx-menu-overlay"
             @click="previewTabCtxMenu = null"
             @contextmenu.prevent="previewTabCtxMenu = null"
             @keydown.escape.window="previewTabCtxMenu = null">
          <div class="tab-ctx-menu"
               :style="previewTabCtxMenuStyle()"
               @click.stop @contextmenu.prevent.stop>
            <button @click="previewTabMenuAction('close')"
                    x-text="lang==='zh' ? '关闭' : 'Close'"></button>
            <button @click="previewTabMenuAction('closeOthers')"
                    x-text="lang==='zh' ? '关闭其他' : 'Close others'"></button>
            <button @click="previewTabMenuAction('closeRight')"
                    x-text="lang==='zh' ? '关闭右侧标签' : 'Close to the right'"></button>
            <button @click="previewTabMenuAction('closeAll')"
                    x-text="lang==='zh' ? '关闭全部' : 'Close all'"></button>
            <hr/>
            <button @click="previewTabMenuAction('reveal')"
                    x-text="lang==='zh' ? '在文件树定位' : 'Reveal in tree'"></button>
            <button @click="previewTabMenuAction('mention')"
                    x-text="lang==='zh' ? '@ 引用到 chat' : '@-mention in chat'"></button>
            <button @click="previewTabMenuAction('copyPath')"
                    x-text="lang==='zh' ? '复制路径' : 'Copy path'"></button>
          </div>
        </div>
      </template>

      <!-- Floating immersive (fullscreen reading) toggle — only shown on mobile
           via @media in styles.css. Sole entry point for immersive mode;
           scroll-direction auto-toggle was removed per user request because
           reclaiming the bar space mid-scroll drifts the content on touch. -->
      <button class="preview-immersive-toggle"
              @click="toggleImmersive()"
              :title="previewImmersive ? (lang==='zh' ? '退出全屏阅读' : 'Exit immersive') : (lang==='zh' ? '全屏阅读' : 'Immersive reading')">
        <svg x-show="!previewImmersive" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/>
        </svg>
        <svg x-show="previewImmersive" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3v6H3M15 3v6h6M9 21v-6H3M15 21v-6h6"/>
        </svg>
      </button>

      <div class="preview-body"
           :class="{ 'drag-hover': previewDragHover || osFileDragging }"
           @dragover.prevent="previewDragHover = true"
           @dragenter.prevent="previewDragHover = true"
           @dragleave.prevent="previewDragHover = false"
           @drop.prevent="onPreviewDrop($event)">
        <!-- Drag overlay — visible during any OS file drag (osFileDragging is
             set by document-level listeners in init()) so it covers the
             HTML preview iframe / image element and intercepts the drop.
             Without this, dragging onto a previewed iframe would fall
             through to the browser's "open file as navigation" default.
             pointer-events: auto (in styles.css) makes the overlay the
             real drop target whenever it's visible. -->
        <div class="preview-drop-overlay"
             x-show="previewDragHover || osFileDragging"
             x-transition.opacity
             @dragover.prevent
             @drop.prevent="onPreviewDrop($event); previewDragHover = false; osFileDragging = false; _dragCounter = 0">
          <div class="preview-drop-inner">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
            <div x-text="lang==='zh' ? '放下以上传 / 打开' : 'Drop to upload / open'"></div>
          </div>
        </div>
        <!-- Find-in-preview bar (magnifier). Floats top-right over the
             scrolling content. Only ever mounted for md/text modes since the
             toggle button is hidden elsewhere. Case-insensitive keyword search;
             ↑/↓ cycle hits, the ≣ button reveals a context-snippet results
             list, Esc closes. -->
        <div class="preview-find" x-show="previewFind.open && !editing" x-cloak
             @keydown.escape.stop="closePreviewFind()">
          <div class="preview-find-bar">
            <svg class="preview-find-icon" viewBox="0 0 24 24" width="14" height="14"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input class="preview-find-input" type="text"
                   x-model="previewFind.query"
                   @input.debounce.150ms="runPreviewFind()"
                   @keydown.enter.prevent="previewFind.query && (previewFind.matches.length ? previewFindNext() : runPreviewFind())"
                   @keydown.shift.enter.prevent="previewFindPrev()"
                   :placeholder="lang==='zh' ? '搜索内容' : 'Find'" />
            <span class="preview-find-count"
                  x-text="previewFind.query
                    ? (previewFind.count ? (previewFind.active + 1) + '/' + previewFind.count : (lang==='zh' ? '无结果' : 'No results'))
                    : ''"></span>
            <button class="preview-find-btn" @click="previewFindPrev()" :disabled="!previewFind.count"
                    :title="lang==='zh' ? '上一个' : 'Previous'">↑</button>
            <button class="preview-find-btn" @click="previewFindNext()" :disabled="!previewFind.count"
                    :title="lang==='zh' ? '下一个' : 'Next'">↓</button>
            <button class="preview-find-btn" @click="previewFind.listOpen = !previewFind.listOpen"
                    :class="{ active: previewFind.listOpen }" :disabled="!previewFind.count"
                    :title="lang==='zh' ? '结果列表' : 'Results list'">☰</button>
            <button class="preview-find-btn" @click="closePreviewFind()"
                    :title="lang==='zh' ? '关闭' : 'Close'">×</button>
          </div>
          <div class="preview-find-list" x-show="previewFind.listOpen && previewFind.count">
            <template x-for="(m, i) in previewFind.matches" :key="i">
              <div class="preview-find-item" :class="{ active: i === previewFind.active }"
                   @click="previewFindGoto(i)">
                <span class="preview-find-item-idx" x-text="(i + 1)"></span>
                <span class="preview-find-item-snip" x-html="m.snippet"></span>
              </div>
            </template>
          </div>
        </div>
        <div x-show="editing" class="editor-wrap" :class="'editor-view-' + editorView">
          <!-- View switch: only markdown files get the live preview. The split
               pane renders mdRender(buffer) live as you type (debounced). -->
          <div class="editor-toolbar" x-show="editorIsMd">
            <div class="editor-view-switch" role="group"
                 :aria-label="lang==='zh' ? '编辑视图' : 'Editor view'">
              <button type="button" :class="{ active: editorView==='edit' }"
                      @click="setEditorView('edit')"
                      x-text="lang==='zh' ? '编辑' : 'Edit'"></button>
              <button type="button" :class="{ active: editorView==='split' }"
                      @click="setEditorView('split')"
                      x-text="lang==='zh' ? '分屏' : 'Split'"></button>
              <button type="button" :class="{ active: editorView==='preview' }"
                      @click="setEditorView('preview')"
                      x-text="lang==='zh' ? '预览' : 'Preview'"></button>
            </div>
          </div>
          <div class="editor-main">
            <div x-ref="cmHost" class="editor-cm" x-show="editorView !== 'preview'"></div>
            <div class="editor-live-preview" x-show="editorIsMd && editorView !== 'edit'">
              <div class="markdown" x-html="livePreviewHtml" @click="onPreviewImgClick($event)"></div>
            </div>
          </div>
          <div class="editor-status">
            <span class="seg">Ln <b x-text="cmStatus.line"></b>, Col <b x-text="cmStatus.col"></b></span>
            <span class="seg" x-show="cmStatus.sel" x-text="(lang==='zh'?'(选 ':'(sel ') + cmStatus.sel + ')'"></span>
            <span class="spacer"></span>
            <span class="seg" x-text="cmStatus.lines + (lang==='zh' ? ' 行' : ' lines')"></span>
            <span class="seg" x-text="fmtSize(cmStatus.chars) + ' / ' + cmStatus.chars + (lang==='zh' ? ' 字符' : ' chars')"></span>
            <span class="seg" x-text="cmStatus.mode"></span>
            <span class="seg" :class="cmStatus.dirty ? 'dirty' : ''" x-text="cmStatus.dirty ? (lang==='zh' ? '● 未保存' : '● Unsaved') : (lang==='zh' ? '○ 已保存' : '○ Saved')"></span>
          </div>
        </div>
        <!-- Loading state — shown briefly between selecting a new file and the
             fetch completing. Without this, fast clicks across tabs left the
             previous file's content visible while the new one loaded. -->
        <div x-show="!editing && previewMode==='loading'" class="preview-loading">
          <span class="spinner-lg"></span>
          <span class="preview-loading-text"
                x-text="lang==='zh' ? '加载中…' : 'Loading…'"></span>
        </div>
        <!-- :style MUST be object form, not a string. A string :style makes
             Alpine call el.setAttribute("style", ...) on every reactive update,
             which overwrites the whole inline style attribute — including the
             display:none that x-show wrote — so the hidden element reappears.
             That's how the raw <pre> below leaked under the rendered markdown
             (2026-06-26 user report: md preview dumping its own source). Object
             form uses style.setProperty per key and leaves display alone. -->
        <div x-show="!editing && previewMode==='md' && rawText" class="markdown" x-html="renderedMd" :style="{ zoom: previewZoom }" @click="onPreviewImgClick($event)"></div>
        <pre x-show="!editing && previewMode==='text' && rawText" class="text" :style="{ zoom: previewZoom }"><code :class="'language-' + previewLang" x-text="rawText"></code></pre>
        <!-- 0-byte / empty file: a blank md/text pane is indistinguishable from
             "still loading" or "render broke". Show an explicit placeholder. -->
        <div x-show="!editing && (previewMode==='md' || previewMode==='text') && selected && !rawText" class="empty">
          <span class="icon"><svg><use href="#i-file"/></svg></span>
          <div class="empty-title" x-text="lang==='zh' ? '空文件' : 'Empty file'"></div>
          <div class="empty-hint" x-text="lang==='zh' ? '该文件没有内容。' : 'This file has no content.'"></div>
        </div>
        <!-- src 仅在该模式激活时才指向真实 URL，否则空字符串/about:blank，
             避免隐藏元素请求 raw URL 触发对 md/txt 的下载。 -->
        <!-- Zoom via transform:scale (NOT `zoom`): `zoom` is non-standard and
             Safari scales the iframe box down to the top-left, leaving an empty
             right/bottom gutter, while Chrome reflows it to fill. transform +
             inverse width/height (e.g. 0.5 → 200% box scaled to 100%) gives the
             same "reflow & fill, show more, smaller" result on every engine.
             (2026-06-26 user report: html preview zoom gutters on mobile.) -->
        <iframe x-show="!editing && previewMode==='html'"
                x-ref="htmlFrame"
                :src="previewMode==='html' ? rawUrl(selected, {preview:true}) : 'about:blank'"
                :style="previewZoom === 1 ? {} : { transform: 'scale(' + previewZoom + ')', transformOrigin: 'top left', width: 'calc(100% / ' + previewZoom + ')', height: 'calc(100% / ' + previewZoom + ')' }"
                class="frame" sandbox="allow-scripts"></iframe>
        <!-- Use template x-if (not x-show) so the <img> isn't even in the DOM
             when not active — :src="" would otherwise resolve to the page URL
             and fire a spurious resource-load-failed error in console. -->
        <template x-if="!editing && previewMode==='img' && selected">
          <img :src="rawUrl(selected)" :alt="selected ? selected.split('/').pop() : ''" class="preview-img" :style="'zoom:' + previewZoom" />
        </template>
        <iframe x-show="!editing && previewMode==='pdf'"
                :src="previewMode==='pdf' ? rawUrl(selected) : 'about:blank'"
                class="frame"></iframe>

        <!-- xlsx preview: per-sheet tabs + scrollable table. Backend caps to
             500 rows × 50 cols per sheet and 20 sheets; truncation surfaces
             as a small banner below the table. Formulas are NOT evaluated —
             cells show the last-cached value from the spreadsheet app. -->
        <div x-show="!editing && previewMode==='xlsx'" class="xlsx-preview">
          <div class="xlsx-tabs" x-show="xlsxSheets.length > 1">
            <template x-for="sh in xlsxSheets" :key="sh.name">
              <button class="xlsx-tab"
                      :class="{ active: xlsxActive === sh.name }"
                      @click="xlsxActive = sh.name"
                      x-text="sh.name"></button>
            </template>
            <span class="xlsx-trunc-note" x-show="xlsxSheetsTruncated"
                  x-text="lang==='zh' ? '（仅显示前 20 个 sheet）' : '(showing first 20 sheets only)'"></span>
          </div>
          <!-- Only the ACTIVE sheet's grid is instantiated. Iterating ALL
               sheets and merely x-show-hiding the inactive ones meant a large
               multi-sheet workbook materialized every sheet's rows×cols
               reactive bindings at once (20 sheets × 500 × 50 ≈ 1M bindings →
               the tab froze on open). Narrowing the x-for to the active sheet
               keeps a single grid live; switching tabs swaps it (keyed by
               sh.name). The sheet-tab buttons above still list all sheets.
               (perf: RED — index.html xlsx renders all sheets' DOM) -->
          <template x-for="sh in xlsxSheets.filter(s => s.name === xlsxActive)" :key="sh.name">
            <div class="xlsx-sheet-wrap">
              <div class="xlsx-scroll">
                <table class="xlsx-table" :style="'zoom:' + previewZoom">
                  <tbody>
                    <template x-for="(row, ri) in sh.rows" :key="ri">
                      <tr>
                        <td class="xlsx-rownum" x-text="ri + 1"></td>
                        <template x-for="(cell, ci) in row" :key="ci">
                          <td x-text="cell" :title="cell"></td>
                        </template>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
              <div class="xlsx-meta" x-show="sh.rows_truncated || sh.cols_truncated">
                <span x-show="sh.rows_truncated"
                      x-text="lang==='zh'
                        ? `（行数超过 ${xlsxLimits && xlsxLimits.max_rows} 已截断）`
                        : `(rows truncated at ${xlsxLimits && xlsxLimits.max_rows})`"></span>
                <span x-show="sh.cols_truncated"
                      x-text="lang==='zh'
                        ? `（列数超过 ${xlsxLimits && xlsxLimits.max_cols} 已截断）`
                        : `(cols truncated at ${xlsxLimits && xlsxLimits.max_cols})`"></span>
              </div>
            </div>
          </template>
        </div>

        <!-- CSV preview — same table style as xlsx, but with pagination
             since CSV files in the wild are often million-row exports. -->
        <div x-show="!editing && previewMode==='csv'" class="xlsx-preview csv-preview">
          <div class="csv-toolbar">
            <button class="btn-text sm" @click="csvPrevPage()"
                    :disabled="csvOffset === 0 || csvLoading"
                    x-text="lang==='zh' ? '← 上页' : '← Prev'"></button>
            <span class="csv-range" x-show="csvData"
                  x-text="(csvOffset + 1) + '–' + csvWindowEnd() + ' / ' + (csvData && csvData.total_rows || 0)"></span>
            <button class="btn-text sm" @click="csvNextPage()"
                    :disabled="!csvData || csvWindowEnd() >= (csvData && csvData.total_rows || 0) || csvLoading"
                    x-text="lang==='zh' ? '下页 →' : 'Next →'"></button>
            <span class="csv-meta" x-show="csvData"
                  x-text="(lang==='zh' ? '分隔符: ' : 'Delim: ')
                          + (csvData && csvData.delimiter === '\t' ? 'TAB' : (csvData && csvData.delimiter || ','))"></span>
            <span class="csv-meta" x-show="csvData && csvData.cols_truncated"
                  x-text="lang==='zh' ? '（列数已截断）' : '(cols truncated)'"></span>
          </div>
          <div class="xlsx-scroll" x-show="csvData">
            <table class="xlsx-table" :style="'zoom:' + previewZoom">
              <thead x-show="csvData && csvData.has_header && csvData.header && csvData.header.length">
                <tr>
                  <th class="xlsx-rownum"></th>
                  <template x-for="(h, ci) in (csvData && csvData.header || [])" :key="ci">
                    <th x-text="h" :title="h"></th>
                  </template>
                </tr>
              </thead>
              <tbody>
                <template x-for="(row, ri) in (csvData && csvData.rows || [])" :key="ri">
                  <tr>
                    <td class="xlsx-rownum"
                        x-text="csvOffset + ri + 1"></td>
                    <template x-for="(cell, ci) in row" :key="ci">
                      <td x-text="cell" :title="cell"></td>
                    </template>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div class="csv-loading" x-show="csvLoading"
               x-text="lang==='zh' ? '加载中…' : 'Loading…'"></div>
        </div>

        <div x-show="!editing && previewMode==='unsupported'" class="empty">
          <span class="icon"><svg><use href="#i-file"/></svg></span>
          <!-- previewError set ⇒ a READ failed (404/413/403/…): show the real
               reason. null ⇒ genuinely-unsupported file type: keep the original
               "download it instead" copy. -->
          <div class="empty-title"
               x-text="previewError ? previewError.title : (lang==='zh' ? '不支持预览' : 'Preview not supported')"></div>
          <template x-if="previewError">
            <div class="empty-hint">
              <span x-text="previewError.hint"></span>
              <template x-if="previewError.status === 413">
                <a :href="downloadUrl(selected)" x-text="lang==='zh' ? ' 点这里下载' : ' Download instead'"></a>
              </template>
            </div>
          </template>
          <template x-if="!previewError">
            <div class="empty-hint">
              <span x-text="lang==='zh' ? '该文件类型无法在浏览器中预览。' : 'This file type cannot be previewed in browser. '"></span>
              <a :href="downloadUrl(selected)" x-text="lang==='zh' ? '点这里下载' : 'Download it instead'"></a><span x-show="lang==='zh'">。</span>
            </div>
          </template>
        </div>
        <div x-show="!selected" class="brand-empty">
          <span class="muse-mascot lg" :class="{'greet': mascotGreet}" @click="cycleMascot()">
            <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
          </span>
          <div class="brand-logo">muse<span class="accent">·lab</span></div>
          <div class="brand-tagline" x-text="t('empty.preview_tagline')"></div>
          <!-- Quick actions — surface the most useful things when no file is selected -->
          <div class="preview-quick-actions">
            <button class="preview-action" @click="quickNewNote()">
              <span class="icon"><svg><use href="#i-edit"/></svg></span>
              <span x-text="t('preview.action_new_note')"></span>
            </button>
            <button class="preview-action" @click="$refs.upload?.click()">
              <span class="icon"><svg><use href="#i-upload"/></svg></span>
              <span x-text="t('preview.action_upload')"></span>
            </button>
          </div>
          <!-- 2026-05-23: 移除 preview 空态下方的三行操作提示
               （「从左侧选文件」/「@ 递给 Muse」/「右键查看更多操作」）。
               用户反馈：「新建笔记/上传文档」两个按钮已经把核心操作摆明，
               下方再堆三行小字解释左侧/右侧/右键反而是噪音。
               i18n keys empty.preview_tip{1,2,3} 暂时保留在 i18n/index.js
               里以防别处引用，但 UI 不再渲染。 -->
        </div>
      </div>
    </section>

    <!-- resizer between preview and chat -->
    <div class="resizer" :class="{'pane-hidden': !rightOpen}" @mousedown="startResize('right', $event)"></div>

    <!-- ============ 右：chat ============ -->
    <aside class="pane chat" :class="{'pane-hidden': !rightOpen}">
      <header class="pane-head">
        <span class="pane-title">
          <span class="muse-mascot sm" :class="{'greet': mascotGreet, 'is-streaming': streaming}"
                @click="cycleMascot()" :title="mascotLabel() + (lang==='zh'?'（点击换一位）':' (click for next muse)')">
            <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
          </span>
          <span x-text="t('pane.chat')"></span>
        </span>
        <span class="spacer"></span>
        <!-- CLAUDE.md status chip — only shown when MISSING (intake creates it
             by default, so the "present" state is implicit). When missing,
             clicking opens a help dialog with how-to-fix instructions. -->
        <span class="ctx-chip warn"
              x-show="contextInfo._fetched && !contextInfo.claude_md_exists"
              :title="claudeMdChipTitle()"
              @click="openClaudeMdHelp()">
          <svg class="ctx-chip-icon"><use href="#i-alert-triangle"/></svg>
          <span x-text="lang==='zh' ? '未配档案' : 'no archive'"></span>
        </span>
        <!-- Skills + MCP drawer toggles. 2026-05-29: 从 chat-input 底 bar 移到
             顶 bar，与其它「能力 / 会话」入口（整理档案、定时任务、命令面板）
             并列；底 bar 只留 attach / 模型 / 权限 / effort / context ring 等
             与「这一轮怎么发」直接相关的控件。两者都回答「这个会话有哪些能力
             可用」，放顶 bar 更符合其全局属性，也给移动端底 bar 腾出空间。-->
        <button @click="toggleSkillsDrawer()" class="icon-btn"
                :title="t('set.skills.drawer_open')"
                aria-label="Open skills list">
          <svg><use href="#i-puzzle"/></svg>
        </button>
        <button @click="openImageGen()" class="icon-btn"
                :title="lang==='zh' ? 'Codex Image 2 生图' : 'Codex Image 2 image generation'"
                aria-label="Codex Image 2">
          <svg><use href="#i-image"/></svg>
        </button>
        <button @click="toggleMcpDrawer()" class="icon-btn"
                :title="(lang==='zh'?'MCP 服务 (':'MCP servers (') + mcp.servers.length + ')'"
                aria-label="Open MCP servers">
          <svg><use href="#i-plug"/></svg>
        </button>

        <!-- Set up / refresh profile — opens a dedicated chat session
             where Muse walks the user through CLAUDE.md interactively,
             one or two questions at a time, Edit-ing the file as
             answers come in. Distinct from the ctx-chip warning: the
             chip flags the missing state, this button is the
             always-available "let's update my profile with Muse"
             entry point.

             Deliberately NOT a "raw edit" button — direct editing of
             CLAUDE.md works (it's just a file) but is a worse UX:
             nobody wants to stare at a 9-section form. -->
        <!-- 2026-05-23: 「设置档案」按钮已并入「整理档案」。整理档案 workflow
             现在同时覆盖 archive 整理 + CLAUDE.md profile 补全（curator prompt
             第 3 步 3b 节）。两个按钮职责重合 + 移动端 toolbar 拥挤，合并为一。
             历史 startProfileIntake / /sessions/profile-intake 端点保留做向后
             兼容，外部 API 调用不会断；但 UI 不再暴露独立入口。-->
        <!-- Organize archive — creates a curator-mode session that walks
             Muse through scan → suggest → confirm-per-item → execute,
             AND walks the user through any blank CLAUDE.md profile
             sections conversationally. Sits next to the scheduled-tasks
             bell because both are "agent-driven background work" entry
             points. -->
        <button @click="startOrganize()" class="icon-btn"
                :title="lang==='zh' ? '整理档案 — 让 Muse 帮我梳理 archive' : 'Organize — have Muse tidy the archive'"
                aria-label="Organize archive">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/>
          </svg>
        </button>
        <!-- Manual hard-refresh escape hatch. When the chat pane gets
             stuck (SSE wedged, Alpine state out of sync after a flaky
             reconnect, etc.), users have no way out except closing the
             browser tab or PWA. `location.reload()` is the bluntest fix
             but always works — loadPrefs restores currentId / openTabIds
             / preview state on boot, and the SSE auto-reconnect path
             picks up any still-running backend turn. The toast gives a
             visible confirmation so the user knows the click registered
             before the page actually unloads. -->
        <button @click="reloadApp()" class="icon-btn"
                :title="lang==='zh' ? '重新加载（卡住时的兜底：完整刷新页面，等同关掉再打开）' : 'Reload (escape hatch when stuck: full page reload, like closing and reopening)'"
                aria-label="Reload app">
          <svg><use href="#i-refresh"/></svg>
        </button>
        <!-- Desktop fullscreen toggle — pair of preview-pane's button. Click
             → chat pane takes whole viewport for immersive conversation;
             click again or ESC → restore 3-column. Hidden on mobile (the
             single-pane @media already covers focus mode there). -->
        <button @click="toggleDesktopFull('chat')" class="icon-btn pane-fullscreen-btn"
                :title="desktopFullPane==='chat' ? (lang==='zh' ? '退出全屏' : 'Exit fullscreen') : (lang==='zh' ? '全屏聊天' : 'Fullscreen chat')"
                :aria-pressed="desktopFullPane==='chat'">
          <svg x-show="desktopFullPane!=='chat'"><use href="#i-maximize"/></svg>
          <svg x-show="desktopFullPane==='chat'"><use href="#i-minimize"/></svg>
        </button>
        <!-- Scheduled-tasks bell — unread badge when any scheduled
             prompt has produced output since the user last opened
             the drawer. Heartbeat keeps the count fresh. -->
        <button @click="openScheduler()" class="icon-btn bell-btn"
                :title="lang==='zh' ? '定时任务' : 'Scheduled tasks'"
                aria-label="Scheduled tasks">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="bell-badge" x-show="scheduler.unreadCount > 0"
                x-text="scheduler.unreadCount > 99 ? '99+' : scheduler.unreadCount"></span>
        </button>
        <!-- Command palette entry — slim icon-btn alongside settings.
             Discoverability comes from the first-run toast (init()) +
             a tooltip showing the keyboard shortcut. Visual weight is
             intentionally low so the palette doesn't read as "chat
             search" — it's app-global. -->
        <button @click="openPalette()" class="icon-btn chat-head-palette"
                :title="lang==='zh' ? '命令面板  ⌘K' : 'Command palette  ⌘K'"
                aria-label="Command palette">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <button @click="openSettings()" class="icon-btn" :title="t('btn.settings')"><svg><use href="#i-settings"/></svg></button>
      </header>

      <!-- Context breakdown popup — shows SDK get_context_usage() output
           with per-category token counts so the user can see which slice
           (system prompt / tools / memory / messages / mcp) is dominating. -->
      <div x-show="ctxBreakdown.show"
           @click.outside="ctxBreakdown.show = false"
           x-transition.opacity
           class="ctx-breakdown-pop">
        <div class="ctx-breakdown-head">
          <span x-text="lang==='zh' ? 'Context 拆分（SDK 真值）' : 'Context breakdown'"></span>
          <button class="icon-btn sm"
                  :title="lang==='zh' ? '关闭' : 'Close'"
                  @click="ctxBreakdown.show = false">×</button>
        </div>
        <div x-show="ctxBreakdown.loading" class="ctx-breakdown-body"
             x-text="lang==='zh' ? '查询中…' : 'Loading…'"></div>
        <div x-show="ctxBreakdown.error && !ctxBreakdown.loading"
             class="ctx-breakdown-body err" x-text="ctxBreakdown.error"></div>
        <template x-if="ctxBreakdown.data && !ctxBreakdown.loading">
          <div class="ctx-breakdown-body">
            <div class="ctx-breakdown-summary"
                 x-text="((ctxBreakdown.data.totalTokens||0)/1000).toFixed(1) + 'K / ' + ((ctxBreakdown.data.maxTokens||0)/1000).toFixed(0) + 'K (' + (ctxBreakdown.data.percentage||0).toFixed(1) + '%)'"></div>
            <!-- Stacked bar — shows each category as a colored segment so the
                 user can eyeball "where did 50K go" at a glance. -->
            <div class="ctx-breakdown-stack">
              <template x-for="cat in (ctxBreakdown.data.categories || [])" :key="cat.name">
                <div class="ctx-breakdown-stack-seg"
                     :style="`width: ${ctxCategoryPct(cat)}%; background: ${ctxCategoryColor(cat)}`"
                     :title="cat.name + ' · ' + ctxFormatTokens(cat.tokens)"></div>
              </template>
            </div>
            <template x-for="cat in (ctxBreakdown.data.categories || [])" :key="cat.name">
              <div class="ctx-breakdown-row"
                   :class="{ expandable: ctxRowChildren(cat.name).length, expanded: ctxExpanded[cat.name] }"
                   @click="ctxToggleRow(cat.name)">
                <span class="ctx-breakdown-swatch"
                      :style="`background: ${ctxCategoryColor(cat)}`"></span>
                <span class="ctx-breakdown-name" x-text="cat.name"></span>
                <span class="ctx-breakdown-bar">
                  <span class="ctx-breakdown-bar-fill"
                        :style="`width: ${ctxCategoryPct(cat)}%; background: ${ctxCategoryColor(cat)}`"></span>
                </span>
                <span class="ctx-breakdown-tokens"
                      x-text="ctxFormatTokens(cat.tokens)"></span>
                <span class="ctx-breakdown-caret"
                      x-show="ctxRowChildren(cat.name).length"
                      x-text="ctxExpanded[cat.name] ? '▾' : '▸'"></span>
              </div>
              <template x-if="ctxExpanded[cat.name] && ctxRowChildren(cat.name).length">
                <div class="ctx-breakdown-sub">
                  <template x-for="item in ctxRowChildren(cat.name)" :key="item.name + '-' + item.tokens">
                    <div class="ctx-breakdown-subrow">
                      <span class="ctx-breakdown-subname" x-text="item.name"></span>
                      <span class="ctx-breakdown-subtokens"
                            x-text="ctxFormatTokens(item.tokens)"></span>
                    </div>
                  </template>
                </div>
              </template>
            </template>
            <div class="ctx-breakdown-hint"
                 x-text="lang==='zh' ? '说明：tools / system prompt 是 Claude Code CLI 内置；memoryFiles 是 CLAUDE.md union；messages 含所有历史 + tool_result' : 'Note: tools / system_prompt are CLI built-in; memoryFiles is CLAUDE.md union; messages include full history + tool results'"></div>
          </div>
        </template>
      </div>

      <!-- Tab strip — like VS Code Claude. Each tab is an open session;
           click switches, double-click renames inline, right-click opens
           the context menu (rename / edit prompt / close / delete).
           The picker on the right is the "history" entry point: clicking a
           row promotes that session into a tab. -->
      <!-- Two-container layout: .chat-tabs-list scrolls horizontally when tabs
           overflow; .chat-tabs-actions stays pinned right (new-session + history
           picker always visible regardless of how many tabs are open). -->
      <div class="chat-tabs-wrap">
        <!-- History picker — leftmost slot so it's the first thing the
             eye hits on the top bar. Click opens the all-sessions picker
             (search + grouped list); click a row to open it as a tab. -->
        <div class="session-picker chat-tab-history" @click.outside="sessionPickerOpen = false">
          <button class="chat-tab-history-btn" @click="toggleHistoryPicker($event)" type="button"
                  :title="lang==='zh' ? '历史会话' : 'Session history'">
            <svg><use href="#i-folder"/></svg>
          </button>
          <div x-show="sessionPickerOpen" x-transition.opacity.duration.150ms
               class="session-picker-pop"
               :style="historyPickerStyle"
               role="listbox">
            <input class="session-picker-search"
                   type="text"
                   x-model="sessionPickerSearch"
                   x-ref="sessionPickerSearchInput"
                   :placeholder="lang==='zh' ? '搜索会话名…' : 'Search sessions…'"
                   @input.debounce.300ms="_searchSessions()"
                   @keydown.escape="sessionPickerOpen = false" />
            <template x-for="g in groupedFilteredSessions()" :key="g.key">
              <div class="session-picker-group">
                <div class="session-picker-group-label" x-text="g.label + (g.hiddenCount > 0 ? ' (' + g.items.length + ')' : '')"></div>
                <template x-for="s in g.visibleItems" :key="s.id">
                  <div class="session-picker-row"
                       :class="historyRowClass(s.id) + (s.pinned ? ' pinned' : '')"
                       @click="pickerOpenSession(s.id)"
                       @mouseenter="prefetchSession(s.id)"
                       @contextmenu.prevent="pickerRowMenu($event, s.id)"
                       role="option">
                    <button class="session-picker-pin"
                            :class="{ active: s.pinned }"
                            @click.stop="togglePinSession(s.id)"
                            :title="s.pinned ? (lang==='zh'?'取消置顶':'Unpin') : (lang==='zh'?'置顶':'Pin to top')">
                      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="17" x2="12" y2="22"/>
                        <path d="M5 17h14l-1.5-5H6.5L5 17z"/>
                        <path d="M9 12V5h6v7"/>
                      </svg>
                    </button>
                    <!-- Row content has two states:
                         a) normal — name + count + actions (rename / kebab / del)
                         b) renaming — inline input + ✓ commit / ✕ cancel
                         x-show (not x-if) keeps the input mounted so its
                         focus() call from pickerStartInlineRename stays in
                         the original user-gesture context (iOS Safari only
                         shows the on-screen keyboard for focus() inside the
                         same synchronous tick as the click). -->
                    <!-- Streaming / unread dots — mirrors tab-strip behavior -->
                    <span class="chat-tab-stream-dot picker-status-dot"
                          x-show="renamingPickerSid !== s.id && isTabStreaming(s.id)"
                          :title="lang==='zh' ? '正在生成…' : 'Streaming…'"></span>
                    <span class="chat-tab-unread-dot picker-status-dot"
                          x-show="renamingPickerSid !== s.id && isTabUnread(s.id)"
                          :title="lang==='zh' ? '有新回复' : 'New reply ready'"></span>
                    <span class="ellipsis"
                          x-show="renamingPickerSid !== s.id"
                          x-text="s.name"></span>
                    <button class="session-picker-rename"
                            x-show="renamingPickerSid !== s.id"
                            @click="pickerStartInlineRename($event, s.id)"
                            :title="lang==='zh' ? '重命名' : 'Rename'">
                      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"/>
                        <path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                      </svg>
                    </button>
                    <button class="session-picker-kebab"
                            x-show="renamingPickerSid !== s.id"
                            @click="pickerRowMenu($event, s.id)"
                            :title="lang==='zh' ? '更多操作' : 'More'">⋮</button>
                    <button class="session-picker-del"
                            x-show="renamingPickerSid !== s.id"
                            @click="pickerDeleteSession(s.id, $event)"
                            :title="lang==='zh' ? '删除此会话' : 'Delete this session'">×</button>
                    <!-- Renaming state: inline input + commit / cancel buttons -->
                    <input class="session-picker-rename-input"
                           type="text"
                           x-show="renamingPickerSid === s.id"
                           :data-sid="s.id"
                           x-model="pickerRenameDraft"
                           @click.stop
                           @keydown.enter.prevent="pickerCommitInlineRename()"
                           @keydown.escape.prevent="pickerCancelInlineRename()"
                           @blur="pickerCommitInlineRename()" />
                    <button class="session-picker-rename-ok"
                            x-show="renamingPickerSid === s.id"
                            @click.stop="pickerCommitInlineRename()"
                            :title="lang==='zh' ? '确定' : 'Save'">
                      <svg><use href="#i-check"/></svg>
                    </button>
                    <button class="session-picker-rename-cancel"
                            x-show="renamingPickerSid === s.id"
                            @click.stop="pickerCancelInlineRename()"
                            :title="lang==='zh' ? '取消' : 'Cancel'">
                      <svg><use href="#i-x"/></svg>
                    </button>
                  </div>
                </template>
                <!-- "展开更多" button — only when group is limited and has hidden items -->
                <button x-show="g.hiddenCount > 0"
                        class="session-picker-show-more"
                        @click.stop="pickerGroupExpanded = { ...pickerGroupExpanded, [g.key]: true }"
                        x-text="(lang==='zh' ? '展开更多 · ' : 'Show more · ') + g.hiddenCount + (lang==='zh' ? ' 条' : ' more')">
                </button>
              </div>
            </template>
            <div x-show="filteredSessions().length === 0" class="session-picker-empty"
                 x-text="lang==='zh' ? (sessionPickerSearch ? '没有匹配' : '暂无会话') : (sessionPickerSearch ? 'No match' : 'No sessions')"></div>
            <!-- Footer: one-click bulk-clear of stale history. Sits at the very
                 bottom of the list so it's out of the way of normal row clicks.
                 Hidden during a search (the visible set is filtered, so the
                 count would mislead). Deletes only sessions older than 7 days;
                 pinned + currently-open are always kept (see purgeOldSessions). -->
            <div class="session-picker-footer" x-show="!sessionPickerSearch && filteredSessions().length > 0">
              <button class="session-picker-clear-old"
                      @click.stop="purgeOldSessions()"
                      :title="lang==='zh' ? '删除 7 天前的会话（置顶和当前会话保留）' : 'Delete sessions older than 7 days (pinned & current kept)'">
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
                </svg>
                <span x-text="lang==='zh' ? '清理 7 天前的会话' : 'Clear sessions older than 7 days'"></span>
              </button>
            </div>
          </div>
        </div>
        <div class="chat-tabs-list" @wheel="onChatTabsWheel($event)">
          <template x-for="tid in openTabIds" :key="tid">
            <div class="chat-tab" :class="{active: tid === currentId, 'drag-over': tabDragOverId === tid}"
                 :data-tid="tid"
                 :draggable="isPointerDevice"
                 @dragstart="onTabDragStart($event, tid)"
                 @dragover.prevent="onTabDragOver($event, tid)"
                 @dragleave="onTabDragLeave(tid)"
                 @drop.prevent="onTabDrop($event, tid)"
                 @dragend="onTabDragEnd()"
                 @click="activateTab(tid)"
                 @mouseenter="prefetchSession(tid)"
                 @dblclick="startRenameTab(tid)"
                 @contextmenu.prevent="showTabMenu($event, tid)"
                 @auxclick="onTabAuxClick($event, tid)"
                 :title="tabTitle(tid)">
              <span class="chat-tab-stream-dot"
                    x-show="isTabStreaming(tid)"
                    :title="lang==='zh' ? '该会话正在生成…' : 'Streaming…'"></span>
              <!-- Green dot when the tab finished a turn while you were
